支持的基础研究投入机制","允许科研类事业单位实行比一般事业单位更灵活的管理制度","限制开展高风险、高投入基础研究","降低科技人员在科技成果转化收益分配上的自主权"],a:1},{q:"习近平总书记强调，要牢牢扭住自主创新这个“牛鼻子”。关于 自主创新的举措，下列表述正确的有几项？ ①主动对接国家战略需求，整合和优化科教创新资源 ②培育产业园区，加强对口合作，加快科研成果落地转化 ③培育新能源、新材料、先进制造、电子信息等战略性新兴产业 ④建设风光火核储一体化能源基地 ⑤逐步弱化央地合作，鼓励各地自主发展新兴产业",o:["2 项","3 项","4 项","5 项"],a:2},{q:"习近平总书记指出，马克思主义是为人民立言、为人民代言的理 论，是为改变人民命运而创立、在人民求解放的实践中丰富和发展的，人民的创造性实践是 马克思主义理论创新的不竭源泉。下列说法与这一论述相符的是： ①人民不仅是物质财富的创造者，也是精神财富的创造者 ②要坚持以理论工作者的首创精神为引领，注重从理论创新中总结实践经验 ③无论是毛泽东思想、中国特色社会主义理论体系，还是习近平新时代特色社会主义思 想，无不源自于人民的智慧、人民的探索、人民的创造 ④各级领导干部身处实践最前沿，对实践变化感知最敏感、感受最深切，也最聪慧",o:["①②","①③","②④","③④"],a:1},{q:"习近平总书记强调，加强党风廉政建设，一体推进不敢腐、不能 腐、不想腐，严格落实中央八项规定精神，督促党员、干部特别是领导干部清廉自守、廉洁 从政、干净做事。根据《中国共产党纪律处分条例》，下列违纪情况属于违反廉洁纪律的是：",o:["在重大原则问题上不同党中央保持一致且有实际言论、行为或者造成不良后果的","拒不执行党组织的分配、调动、交流等决定的","干涉生产经营自主权，致使群众财产遭受较大损失的","滥用职权或者职务上的影响操办婚丧喜庆事宜，造成不良影响的"],a:3},{q:"深化医药卫生体制改革，是进一步全面深化改革的重要任务。关 于深化医药卫生体制改革，下列举措不恰当的是：",o:["促进优质医疗资源扩容下沉和区域均衡布局","加快建设分级诊疗体系，强化基层医疗卫生服务","完善公立医院薪酬制度，严格限制、缩减编制数量","促进医疗、医保、医药协同发展和治理"],a:2},{q:"习近平总书记指出，宣传思想文化工作事关党的前途命运，事关 国家长治久安，事关民族凝聚力和向心力，是一项极端重要的工作。宣传思想文化工作的首 要政治任务是：",o:["培育和践行社会主义核心价值观","用党的创新理论武装全党、教育人民","提升国家文化软实力和中华文化影响力","赓续中华文脉、推动中华优秀传统文化创造性转化和创新性发展"],a:1},{q:"习近平总书记指出：“中国共产党人的理想信念，建立在马克思 主义科学真理的基础之上，建立在马克思主义揭示的人类社会发展规律的基础之上，建立在 为最广大人民谋利益的崇高价值的基础之上。我们坚定，是因为我们追求的是真理。我们坚 定，是因为我们遵循的是规律。我们坚定，是因为我们代表的是最广大人民根本利益。”这 一论述最直接体现了马克思主义的哪一基本观点？",o:["真理尺度与价值尺度的辩证统一","认识世界与改造世界的辩证统一","量变与质变的辩证统一","矛盾的特殊性与普遍性的辩证统一"],a:0},{q:"完善大统战工作格局，是习近平总书记关于做好新时代党的统一 战线工作的重要思想的重要内容，是做好新时代统战工作的重要保障，也是进一步全面深化 改革、为推进中国式现代化凝心聚力的重要举措。下列各项不属于完善大统战格局措施的是：",o:["更好发挥党外人士作用，健全党外代表人士队伍建设制度","制定民族团结进步促进法，健全铸牢中华民族共同体意识制度机制","全面构建亲清政商关系，健全促进非公有制经济健康发展、非公有制经济人士健康成 长工作机制","健全人大议事规则和论证、评估、评议、听证制度"],a:3},{q:"西部地区在全国改革发展稳定大局中举足轻重。要一以贯之抓好 党中央推动西部大开发政策举措的贯彻落实，进一步形成大保护、大开放、高质量发展新格 局。关于新时代推动西部大开发，下列表述不正确的是：",o:["要坚持把全面发展新兴产业作为主攻方向，加快西部地区产业转型升级","要坚持以大开放促进大开发，提高西部地区对内对外开放水平","要坚持统筹发展和安全，提升能源资源等重点领域安全保障能力","要坚持推进新型城镇化和乡村全面振兴有机结合，在发展中保障和改善民生"],a:0},{q:"党的二十届三中全会提出，健全绿色低碳发展机制，实施支持绿 色低碳发展的财税、金融、投资、价格政策和标准体系，发展绿色低碳产业，健全绿色消费 激励机制，促进绿色低碳循环发展经济体系建设。关于健全绿色低碳发展机制，下列举措不 恰当的是：",o:["优化政府绿色采购政策，完善绿色税制","建立碳排放双控向能耗双控全面转型新机制","完善资源总量管理和全面节约制度，健全废弃物循环利用体系","加快规划建设新型能源体系，完善新能源消纳和调控政策措施"],a:1},{q:"完善收入分配制度，构建初次分配、再分配、第三次分配协调配 套的制度体系，是进一步全面深化改革的重要任务。关于完善收入分配制度，下列表述不准 确的是：",o:["提高劳动报酬在初次分配中的比重","完善劳动者工资决定、合理增长、支付保障机制，健全按要素分配政策制度","规范财富积累机制，多渠道增加城乡居民财产性收入","完善税收、社会保障、转移支付等第三次分配调节机制"],a:3},{q:"高质量发展是全面建设社会主义现代化国家的首要任务，金融要 为经济社会发展提供高质量服务。下列与之相关的表述不准确的是：",o:["优化资金供给结构，把更多金融资源用于促进科技创新、绿色发展、传统制造和国有 企业","要着力营造良好的货币金融环境，切实加强对重大战略、重点领域和薄弱环节的优质 金融服务","始终保持货币政策的稳健性，更加注重做好跨周期和逆周期调节，充实货币政策工具 箱","完善机构定位，支持国有大型金融机构做优做强，当好服务实体经济的主力军和维护 金融稳定的压舱石"],a:0},{q:"习近平总书记强调，粮食安全是“国之大者”。下列保障粮食安 全的举措正确的有几项？ ①全面落实粮食安全党政同责，坚持稳面积、增单产两手发力 ②树立大农业观、大食物观，农林牧渔并举，构建多元化食物供给体系 ③加大高标准农田建设投入和管护力度，确保耕地数量有保障、质量有提升 ④扩大粮食领域高水平对外开放，逐步加大国外优质种业资源和海外粮食产品在我国市 场的占有率 ⑤强化科技和改革双轮驱动，加大核心技术攻关力度",o:["2 项","3 项","4 项","5 项"],a:2},{q:"习近平总书记指出，问题是事物矛盾的表现形式，我们强调增强 问题意识、坚持问题导向，就是承认矛盾的普遍性、客观性，就是要善于把认识和化解矛盾 作为打开工作局面的突破口。关于矛盾的普遍性、客观性，下列说法正确的是：",o:["矛盾的普遍性是有条件的，并根据条件的变化而变化","矛盾的客观性从属于主观性，不能脱离人的认知、情感、意志而存在","矛盾的普遍性是矛盾的共性，矛盾的特殊性是矛盾的个性","矛盾的普遍性、客观性决定了事物的不同性质，是认清事物本质和发展规律的基础"],a:2},{q:"习近平总书记指出，要推动各级领导班子认真践行正确政绩观， 切实形成正确工作导向。下列表述与正确政绩观要求相符合的是：",o:["领导干部要树牢竞争优先、力争上游的政绩观","坚持高质量发展，要完善推动高质量发展的政绩考核评价办法","坚持打基础利长远，要注重在做强发展指标、做优发展数据上下功夫","坚持出实招求实效，要大力发展高标准、大气派的工程"],a:1},{q:"完善市场经济基础制度是构建高水平社会主义市场经济体制的重 要内容。下列不属于完善市场经济基础制度内容的是：",o:["完善财政转移支付体系","完善市场信息披露制度","完善市场准入制度","完善产权制度"],a:0},{q:"党的十八大以来，在推进全面从严治党的伟大实践中，我们不断 进行实践探索和理论思考，在毛泽东同志当年给出“让人民来监督政府”的第一个答案基础 上，给出了第二个答案，那就是不断推进党的自我革命。关于深入推进党的自我革命实践， 下列表述不准确的是：",o:["以引领伟大社会革命为根本目的","以跳出历史周期率为战略目标","以解决大党独有难题为主攻方向","以自我监督和法律监督相结合为强大动力"],a:3},{q:"关于马克思主义政治经济学，下列说法正确的是：",o:["商品的价值量是由生产该商品所需的个别劳动时间决定的","货币的价值尺度职能是通过实际的物质交换来实现的","具体劳动和抽象劳动是不同商品生产过程中的不同劳动","具体劳动创造商品的使用价值，抽象劳动形成商品的价值"],a:3},{q:"中国共产党十九届六中全会总结了党的百年奋斗重大成就和历史 经验，将百年历史分为四个时期。下列关于四个历史时期党面临的重要任务表述，正确的有 几项？ ①新民主主义革命时期，党面临的主要任务是反对帝国主义、封建主义、官僚资本主义， 争取民族独立、人民解放，为实现中华民族伟大复兴创造根本社会条件 ②社会主义革命和建设时期，党面临的主要任务是实现从新民主主义到社会主义的转变， 进行社会主义革命，推进社会主义建设，为实现中华民族伟大复兴奠定根本政治前提和制度 基础 ③改革开放和社会主义现代化建设新时期，党面临的主要任务是继续探索中国建设社会 主义的正确道路，解放和发展社会生产力，使人民摆脱贫困、尽快富裕起来，为实现中华民 族伟大复兴提供充满新的活力的体制保证和快速发展的物质条件 ④党的十八大以来，中国特色社会主义进入新时代。党面临的主要任务是实现第一个百 年奋斗目标，开启实现第二个百年奋斗目标新征程，朝着实现中华民族伟大复兴的宏伟目标 继续前进",o:["1","2","3","4"],a:3},{q:"关于海南自由贸易港，下列说法不正确的是：",o:["海南自由贸易港的实施范围是海南岛全岛","零关税、低税率、简税制是海南自由贸易港税收制度的主要特征","货物由海南自由贸易港贸易进入内地，原则上按进口规定办理相关手续","海南自由贸易港贸易、投资及相关管理活动法规应当由全国人民代表大会常务委员会 制定"],a:3},{q:"党的二十大报告提出，中国式现代化是中国共产党领导的社会主 义现代化。下列对中国式现代化的理解不准确的是：",o:["物质富足、精神富有是社会主义现代化的根本要求","既有各国现代化的共同特征，更有基于自己国情的中国特色","实现高质量发展，实现“双碳”目标是中国式现代化的本质要求之一","是人与自然和谐共生的现代化，要坚持可持续发展，坚持节约优先、保护优先、自然 恢复为主的方针"],a:2},{q:"习近平总书记在党的二十大报告中明确提出“六个必须坚持”， 即必须坚持人民至上、必须坚持自信自立、必须坚持守正创新、必须坚持问题导向、必须坚 持系统观念、必须坚持胸怀天下。“六个必须坚持”深刻彰显了习近平新时代中国特色社会 主义思想的（ ），以及贯穿其中的立场观点方法，为中国共产党团结带领中国人民认识 世界和改造世界提供了强大思想武器。",o:["时代性和科学性","世界观和方法论","世界观和价值观","认识论和方法论"],a:1},{q:"人们在生活实践中，不仅存在主观符合客观的问题，而且存在按 照主体的需要认识世界和改造世界的问题。这属于（ ）。",o:["真理和价值的关系问题","价值和判断的关系问题","社会实践与社会意识的关系问题","主观认识对客观世界的能动性问题"],a:3},{q:"习近平新时代中国特色社会主义思想作为马克思主义中国 化最近成果，坚持和运用马克思主义基本原理，对马克思主义哲学、政治经济学、科学社会 主义作出了许多重大原理性创新。关于习近平新时代中国特色社会主义思想，下列表述不正 确的是：（ ）",o:["提出新时代我国社会主要矛盾发生变化的思想，是对马克思主义社会矛盾学说的新发 展","强调要坚持系统观念，要强化问题导向，要抓重点、抓关键、抓“牛鼻子”等，是对 马克思主义认识论、实践论的新发展","提出坚持和加强党的全面领导、推进党的自我革命的思想，是对马克思主义建党学说 的新发展","提出坚持和完善中国特色社会主义制度、推进国家治理体系和治理能力现代化的思想， 是对马克思主义世界历史理论的新发展"],a:3},{q:"党的二十届三中全会，高度评价新时代以来全面深化改革 的成功实践和伟大成就，研究了进一步全面深化改革、推进中国式现代化问题，认为当前和 今后一个时期是以中国式现代化全面推进强国建设、民族复兴伟业的关键时期。关于中国式 现代化与改革的关系，下列说法不正确的是：（ ）",o:["中国式现代化是在改革开放中不断推进的，也必将在改革开放中开辟广阔前景","进一步全面深化改革的总目标是继续完善和发展中国特色社会主义制度，推进国家治 理体系和治理能力现代化","必须自觉把改革摆在更加突出位置，紧紧围绕推进中国式现代化进一步全面深化改革","改革越是彻底，中国式现代化就越早实现，推进中国式现代化建设的进度取决于改革 的力度"],a:3},{q:"2024 年 9 月 1 日，《求是》杂志发表了习近平总书记的重 要文章《培养德智体美劳全面发展的社会主义建设者和接班人》，文章强调，培养什么人是 教育的首要问题。要健全全员育人、全过程育人、全方位育人的体制机制，不断培养一代又 一代社会主义建设者和接班人。关于全员，全过程，全方位育人，下列说法正确的是：（ ） ①要以立德树人贯穿到教育的各个环节和各个领域 ②教材是教育的物质载体，是教育的决定性因素 ③学校和教师承担着育人的全部重任，是教育育人的主导力量 ④必须以培养社会主义建设者和接班人作为教育的根本任务",o:["①②","①④","①②④","①②③④"],a:1}],"言语理解":[{q:"淮扬菜被称为“士大夫菜”，同时也是国宴的标准菜系，但这与淮扬菜深 受国民喜爱，成为国民菜并不矛盾，淮扬菜历经 2000 多年，绵延不绝的基础就在民间。淮 扬菜有许多大众耳熟能详的菜品，可能很多人吃过，但却不知道吃的就是淮扬菜。淮扬地区， 至今仍有斗菜的习俗，春节期间，主妇都要做出拿手好菜来宴请宾客，亲朋好友间还会进行 厨艺比拼，这让淮扬菜不断涌现出新菜品。淮扬菜就是在这样的氛围中，一代代传承创新。 这段文字重在强调：",o:["淮扬地区斗菜习俗历史悠久","淮扬菜符合当代人的养生理念","淮扬菜是国宴菜，更是国民菜","民间传承为淮扬菜绵延不绝提供基础"],a:3},{q:"2012 年至 2021 年，国家知识产权局累计授权发明专利 395.3 万件，年均增 长 13.8%，累计注册商标 3556.3 万件，年均增长 25.5%，累计评出中国专利金奖 310 项，获 奖项目新增销售额超过 2.5 万亿元。我国知识产权使用费进出口总额累计 2.19 万亿元，年 均增长 13.7%，其中出口年均增长 31.2%，超过进口增速近 20 个百分点。知识产权有力支撑 了创新型经济、品牌经济、区域特色经济和开放型经济发展。 这段文字旨在说明：",o:["知识产权运用的效益快速增长","知识产权助力优化营商环境","知识产权创新专利的数量上升","知识产权国际合作持续深化"],a:1},{q:"如今，许多人将公共图书馆视为图书借阅室，甚至自习室，而实际上，图 书馆同博物馆、美术馆一样，有文物存藏和展示展览的功能。因为古籍不仅是可供人们阅读 研究的文献，还是必须收藏保护的文物，将古籍等同于一些当代文献，视为普通的“公版书”， 正是忽视了古籍的文物属性。人们常说的“一页宋版一两金”，指的就是珍贵的宋版书。纸 寿千年，绢寿八百，古籍的修复、存藏、复制，每个环节都是颇具难度的“技术活”。目前， 学界公认的解决古籍“藏”与“用”矛盾的重要方式，就是古籍数字化。古籍数字化是文明 传承的必由之路，更是需要徐徐图之的文化工程，需要全社会赋之信心、细心和耐心。 这段文字意在说明（ ）。",o:["现代图书馆具有多重公共功能与属性","应当重视古籍的文化价值和历史价值","古籍数字化工程需要全社会久久为功","要发挥图书馆存藏与展示古籍的功能"],a:3},{q:"司法公正是维护社会公平正义的最后一道防线。党的二十大报告指出， 要规范司法权力运行，不断健全公安机关、检察机关、审判机关、司法行政机关各司其职、 相互配合的体制机制。强化司法活动的规范性，促进司法公正。二十大报告还强调，要把握 好新时代中国特色社会主义思想的世界观和方法论，坚持好、运用好贯穿其中的立场观点方 法，进一步强化对司法活动的制约监督，着力构建与新型审判权力运行机制相适应的规范高 效的制约监督体系，从而坚定不移推进司法公正。 这段文字最适合做下列哪一观点的例证？",o:["建立规范高效的制约监督体系，需要坚定不移推进司法公正","确保司法公正要求公安机关、检察机关等相互配合，不断强化司法活动的规范性","促进司法公正需要高举新时代中国特色社会主义旗帜","规范和监督司法权力运行是确保司法公正的重要条件"],a:1},{q:"西方的历史比较语言学和索绪尔的现代语言学理论在 19 世纪末与 20 世纪初相继进入中国。从此，中国的语言文字历史研究走上了在西方语言学主导下前进的道 路。当然，在这个过程中，我们取得了丰硕的成果，但也一直因“委心远西”“仪型西方” 而深受“西化”模式的困扰。中国语言文字历史研究的综合性，特别是人文性诉求至为突出， 将中国的语言文字历史研究纳入西方语言学的分析体系之中，终究是方枘圆凿、治丝益棼。 这段文字意在说明：",o:["我国语言文字历史研究存在“西化”的弊端","语言学的分析体系需要体现鲜明的人文特性","中国语言文字历史研究应着重凸显本国特质","西方影响下的语言文字历史研究有利也有弊"],a:0},{q:"当技术的进步逐渐拨开传统“战争迷雾”之时，网络和电磁等虚拟空间因 素也给侦察情报带来了相应的挑战。一方面，网络空间的开放互联、庞大的用户群体、被动 的防御特性、未知的安全漏洞，使得网络攻击的隐蔽性不断增强、难以防范。同时，情报的 处理、分发离不开安全稳定的网络支撑。另一方面，战场上的无人化侦察装备种类繁多，特 别是重点区域和要害目标附近，用频装备数量庞大，导致局部电磁拥挤，容易出现频率自扰 现象。而且交战双方极易互相实施电磁干扰和压制，使得无人化侦察装备的稳定运行遭受严 峻考验。 这段文字主要介绍了：",o:["新形势下驱散传统“战争迷雾”的关键","无人化侦察装备升级引发的连锁反应","虚拟空间因素对侦察情报工作的影响","侦察情报技术信息化进程中遭遇的困境"],a:2},{q:"在古法酱坊里，蒸煮过的大豆和面粉拌均匀后，需要到曲房发酵大约 25 个 小时，这时要把混合物翻松一次，否则混合物温度过高会使产生的菌种受影响，进而影响酱 油风味。手工拌曲的过程靠的是师傅们极具敏感度的双手，师傅们凭借丰富的经验让每粒豆 都能均匀地与面粉糅合。在酱油工坊的曲房内，较高的温度与湿度能够保证大豆最适合的发 酵条件，如今工坊虽已采用温度计和湿度计来提高监测的准确性，但酿造师傅的经验依然不 可缺少，迈进曲房时，经验丰富的师傅就能敏锐地感知曲房的温度和湿度是否适宜。 这段文字意在强调：",o:["古法酱油酿造依然要靠老师傅经验的判断","温度和湿度是酱油工坊制曲室的关键因素","时间把握是制作上佳风味酱油的前提条件","古法酱坊手工制曲靠的是老师傅们的手感"],a:3},{q:"汗水在细菌的分解下产生乳酸、尿素和其他物质，更容易吸引蚊子。 除此之外，运动后的人、孕妇、儿童等呼吸频率较快的人，在呼吸时会产生更多的二氧化碳， 即他们周围的二氧化碳浓度相对较高，因此更容易吸引蚊子。另外，美国和赞比亚科研人员 进行的一项实验显示，人体散发的气味分子可吸引蚊子从几十米外追踪而至，不同“配方” 的气味对蚊子的吸引力大不相同。与此同时，蚊子还有自己偏爱的颜色。研究人员发现，蚊 子喜欢红色、橙色、黑色等颜色，却容易忽略绿色、蓝色、紫色等颜色。要想避免被蚊子“叮” 上，也可以考虑换换衣服的颜色。 这段文字针对的主要问题是：",o:["蚊子是如何确定它们的攻击对象的","炎炎夏日如何避免被蚊子叮咬","蚊子选择叮咬对象有偏好吗","二氧化碳可以让蚊子“看”到人类"],a:2},{q:"语文素养和语言能力的提高，不是靠学理论所能达到的，更没有什么捷径 可走，唯一的办法就是要多读书、读好书、勤于写作，有的名篇名段需要适度背诵。这是古 人留给我们培养孩子语文素养和能力的有益经验。阅读能让孩子不断提高语言能力、思维能 力，获得心灵滋养，打开丰富多彩世界的大门。 这段文字意在强调：",o:["学好语文是学好一切的根本","语文素养的提高无捷径可走","学好语文的关键在于写作和背诵","阅读对于提升语言能力的重要性"],a:0},{q:"老字号是数百年商业和手工业竞争中留下的宝贵遗产，具有鲜明的民 族文化背景，拥有世代相承的独特工艺或经营特色，是珍贵的自主品牌，品牌价值无可替代。 老字号在品牌保护过程中，既需要对传统的技艺、技术、流程、营销渠道、经营管理等特色 进行传承与保护，也需要根据技术、社会与时代的变更，进行多方面的创新，以适应新的形 势变化。坚守品牌特色，坚守“老”的品质，而又有所创新，这是老字号品牌保护的重要方 面。 文段意在说明：",o:["老字号品牌保护需要坚持品质注重创新","老字号品牌保护要实现传承与创新的联动","老字号品牌保护应坚守自身的品牌特色","老字号品牌保护必须挖掘好自身的内涵"],a:3},{q:"从微观的动力学角度看，水结冰是一种结晶现象，结晶首先需要有凝 结核，然后凝结核不断长大，最终长成大块晶体。结晶速率主要受到两个因素的影响：成核 速率和生长速率。流动的水中，质点不容易聚集，成核困难；受水流作用，水分子在凝结核 表面比较难长时间停留，晶体生长速率变缓。从宏观上考虑，流动的水一般都是紊流，不是 层流，因此水流下方温度比较高的水会到表层来，那么，就需要带走更多热量才能让表层的 水结冰，这也会使得流动的水更难结冰。 这段文字意在：",o:["从热量方面介绍水难成冰的原理","说明流动的水更加难以凝结成冰","分析影响水凝结成冰的诸多因素","强调流动的水结冰时散热要更多"],a:2},{q:"艺术家和艺术的成长需要经历漫长的过程，这其中揉进了时光沉淀和情感 累积，艺术品更大的价值来源于其背后沧桑岁月里的人的魅力。从技术角度看，肌理、笔触、 效果等画面元素或许能被技术替代，但从画家的生平、阅历、思想情感、艺术追求等角度看， 没有任何生活阅历、情绪和自我认知的机器，是否同样可以自由创作艺术品，实际上取决于 一个大前提，即：人工智能想要取代人类的艺术创作，则必须要取代人类自身，首先成为社 会生活的主宰。 作者要强调的是：",o:["人工智能在艺术创作领域尚不能取代人类","艺术家和艺术的成长需要漫长的沉淀和积累","缺乏生活阅历的人工智能无法自由创作艺术品","人工智能主宰社会生活就能取代人类艺术创作"],a:0},{q:"对于古希腊人来说，各种形式和内容的比赛活动无所不在，凡是有竞赛的 地方就有规则的存在。体育比赛有严格和严密的竞赛规则，裁判员在赛场上依据规则来进行 判罚，只有如此才能产生没有任何争议的优胜者。这些活动的背后，如何用好的规则引导竞 争，规范竞争，使人向善，使社会更为公正，是古希腊思想家们热衷探讨的话题。 这段文字意在说明：",o:["古希腊人强调竞争中规则的重要性","公平是古希腊思想家们持续关注的话题","遵守规则是古希腊体育比赛的核心理念","严密的规则才能实现社会的公正"],a:1},{q:"传统文化中生态伦理思想有助于人们树立节约资源、保护环境的意识，选 择适度的消费方式。儒家的“取之有度，用之有节”思想和道家的“知足去奢”思想，告诫 人类应当克制自身欲望，珍惜、节约资源，既考虑到当前，也应该考虑到未来；引导人们树 立正确合理的消费理念，更加注重环境、资源在代际之间的公正分配，给自然留下更多的修 复空间，给子孙留下地绿、天蓝、水净的生存环境。这一思想与当今社会存在的享乐主义、 消费主义思潮是针锋相对的。 这段文字主要谈论的是：",o:["生态伦理思想的传统文化渊源","生态伦理思想对消费理念的影响","传统文化中生态伦理思想的当代价值","儒家与道家在生态伦理方面的相同之处"],a:0},{q:"药品集中采购，降价减负只是基础，如何保障患者能够及时用上药， 享受到集采红利，才是关键。一款新药好药，只有运用到医疗临床实践中，才能确保患者受 益。一方面，要继续在相关政策法规的要求下，强化中选产品的供应保障；另一方面，还要 提升药品的配送能力，尤其是调配和“替补”供应机制。而对于医疗机构端来说，相关部门 需畅通其优先配备使用的政策通道，优化医疗机构使用集采中选药品的考核评价方式。 这段文字意在说明：",o:["多措并举保障患者及时用上集采药品","如何让药品及时高效地送到患者手中","让集采政策的红利扎扎实实惠及群众","综合施策不断完善集采药品的供应端"],a:0},{q:"除了探矿队员，很多矿石收藏家也对铀矿石感兴趣，因为它们实在太漂亮 了。然而学过物理、化学的人都知道，不管化学上结合成什么物质，铀元素的放射性都是不 会变的。那么把含铀的“毒花”放在博物馆甚至家里，真的没事吗？实际上，只要隔着一层 玻璃，这些铀矿石就算放在卧室里都伤不了人，因为它们所含的铀，几乎全是放射性较弱的 铀-238（俗称“贫铀”），只有极少量是用于制造核弹头的同位素铀-235。不过千万不要吸 入它的粉尘，因为哪怕它所放出的最弱的α射线，也会造成辐射伤害。 这段文字意在说明：",o:["铀矿石为什么应该保存在玻璃柜中","铀矿石作为矿石收藏是比较安全的","铀-238 与同位素铀-235 有本质不同","粉尘态铀矿石的放射性会大大增强"],a:3},{q:"广义地讲，只要如实记录身边的人与事、景与物，都属于纪实摄影，它们 虽然较为零散、碎片化，但拍摄者和存世数量巨大，蕴藏着丰富的社会生活信息。在专业摄 影领域，很多摄影师通过深度采访与调研，全面、系统、生动地进行图文记录与展示，大大 地拓展了纪实摄影的概念、范畴和价值。当今时代，人人都是摄影师，拍摄传播便利及时， 为时代造像的广度和深度得到了空前的拓展，摄影的价值渐趋超越其本体意义，成为厚重的 人文、社会、历史价值的视觉承载。 这段文字意在说明：",o:["人人都是摄影师的时代已经来临","纪实摄影是对现实社会的生动记录","摄影反映时代的深度和宽度日益拓展","纪实摄影承载着厚重的人文和社会价值"],a:0},{q:"社会信用体系建设是一个系统性工程。从政府的角度来看，除了要从 顶层设计层面加强谋划，还要更好发挥“有形之手”的作用，在组织协调、示范引领、监督 管理方面下更大功夫，既要立足当下解决好信用体系建设的突出问题，更要着眼长远建立法 治化、规范化的长效机制。从市场主体的角度来看，要充分发挥征信市场积极作用，鼓励创 新信用融资服务和产品，强化市场信用约束，使诚实守信成为市场运行的价值导向和各类主 体的自觉追求。从个人角度来看，每个人都是诚信文化的建设者、受益者，必须依法推进个 人诚信建设，推动形成崇尚诚信、践行诚信的良好风尚。 这段文字意在说明：",o:["社会信用体系建设是一个系统性工程任重而道远","系统推进社会信用体系建设离不开“有形之手”","政府、市场、个人共同助力诚信文化的弘扬传播","多措并举形成推进社会信用体系建设的发展合力"],a:3},{q:"南极的环境变化很大，同一区域的不同年份或者同一年份不同的区域环境 差异都很大，所以需要进行监测。在此之前，人们已经可以通过企鹅、海豹和海鸟的数量变 化来监测南极环境。而关于磷虾复眼直径与体长比率关系变化的发现，使人们可以通过这些 大型动物的饵料——磷虾的生长状况来反演南大洋的环境变化，从而更容易推断出整个南极 生态系统的健康状态。同时，人们还可以通过环绕南大洋进行磷虾生长状态的测定来了解南 大洋不同扇区的环境差异，通过长期观测来监测南大洋海洋环境的年际变化。 这段文字意在说明：",o:["南大洋海洋环境差异十分巨大","可利用南极磷虾了解南大洋环境信息","通过南极磷虾监测南大洋环境很便利","南极环境变化大影响到当地动物生存"],a:1},{q:"就地域差异来说，城市里的课外美育机构看似热闹，但缺乏系统教育 体系，师资及教学质量参差不齐。而基于经济发展不平衡的客观现实，个别地区特别是乡村 儿童的家庭美育和社会美育尚处于比较匮乏的状态。从家庭层面来看，美育功利化也是当前 我国儿童美育的典型症候。儿童往往四五岁时就被家长送去学习艺术，虽然幼儿时期是艺术 启蒙的最好时期，但家长们普遍存在功利心态，大多希望孩子通过艺术考级助力升学，对美 育陶冶情操、涵养性情的价值意识不足。 这段文字意在说明：",o:["课外美育机构缺乏系统教育且过于功利","我国儿童美育发展至今仍存在诸多问题","城市和乡村的美育教学存在不同的困难","应努力为儿童提供更为完善的美育资源"],a:3},{q:"面对中西方文明比较与交流的全球化语境，中华民族的伟大复兴离不 开中国式现代化的实现。但在有关现代化的世界话语体系中，“西方现代性”曾垄断了现代 化的定义，西方现代化甚至被直接等同于唯一模式。因此，只有反思西方范式，确立自身在 全球格局中的主体性位置，才能以中国式现代化赋予“中国现代性”，实现“现代性”话语 体系的重释和改写。在此过程中，国家与人民都正在经历“何为中国”的思考，“我是谁” 的追问反映着当代中国社会渴望巩固文化主体性，凝聚身份认同的集体心态与共同情感诉求。 而优秀传统文化是中华民族的“根”和“魂”，是区分“他者”与“自我”以及获得主体性 与认同感的重要方式。 这段文字意在强调：",o:["应以中国式现代化推进中华民族伟大复兴","巩固中国文化主体性才能发扬优秀传统文化","优秀传统文化是确立中国文化主体性的切入点","确立中国的主体性地位有助于实现中国式现代化"],a:1},{q:"恐龙胚胎化石“英良贝贝”，是迄今为止发现的最完整的恐龙胚胎。该胚 胎被认为属于一种非鸟类兽脚类恐龙——窃蛋龙。胚胎以一种奇怪的姿势蜷缩在蛋壳内。此 姿势从未在恐龙胚胎中发现，反倒是现代鸟类胚胎的常见姿势。现代鸟类的胚胎会在孵化后 期经历预折叠、折叠、后折叠 3 个阶段，而“英良贝贝”的姿势相当于处在“预折叠”阶段。 研究人员推断，这种先前被认为是鸟类特有的预孵化行为，可能起源于几千万年甚至上亿年 前的兽脚类恐龙。 这段文字意在强调：",o:["“英良贝贝”的胚胎姿势在已知的恐龙胚胎中是独一无二的","现代鸟类的许多特征最初是从兽脚类恐龙祖先身上演化来的","孵蛋姿势同现代鸟类相似，证明恐龙存在孵化抚育后代行为","姿势奇特的胚胎为恐龙与现代鸟类之间的联结提供了新线索"],a:3},{q:"作为经典的艺术门类，绘画在历史长河中并非独立发展。在原始艺术中， 音乐、诗歌、舞蹈三位一体，密不可分，绘画则将载歌载舞的场景留存于世。不同艺术门类 成熟之后各自独立，但在发展的过程中又相互吸收、相互依托、相互影响。各艺术门类之间 的吸收与借鉴、配合与结合，是艺术发展创新的重要手段。古典名画是人类审美情趣的集中 体现，很长一段时间是深藏在博物馆中的高雅艺术，名画想要真正“活”化，还需要借助跨 界融合。 这段文字意在强调：",o:["绘画是诗歌和舞蹈传承的重要载体","不同艺术门类的跨界融合由来已久","古典名画可以借助跨界融合重焕生机","打破形式壁垒是艺术创新的重要手段"],a:2},{q:"南朝文学批评家钟嵘在《诗品》中评论晋人刘琨的作品“善为凄戾之词， 自有清拔之气。琨既体良才，又罹厄运，故善叙丧乱，多感恨之词”。这是用刘琨罹逢厄运 的经历，来解释其诗作何以多感慨悲愤之词。当代的文学评论家更是自觉地运用这种方法考 察作品。某位研究清末小说《孽海花》的学者曾说，要理解这部作品，就要“知人论世”， 有必要探索曾朴的生活、思想历程与创作过程。可知，“知人论世”是他研究《孽海花》的 重要方法。 这段文字意在说明：",o:["“知人论世”历来是重要的文学研究方法","作家的经历会对作品产生深刻的影响","“知人论世”被奉为古代作品研究的圭臬","当代学者继承了中国古人的文学研究模式"],a:0},{q:"当前，我国粮食安全形势总体较好，粮食安全保障水平显著提升。同 时也要清醒认识到，我国粮食安全基础仍不稳固，粮食供求在中长期仍是紧平衡态势。经国 利民，法是重器。新形势下保障粮食安全，既需要行政手段引导、经济手段调控，还需要法 治手段护航。一方面，要把近年来实践中保障粮食安全的有益经验做法，以制度和法律的形 式固化下来、推广开来；另一方面，要坚持问题导向，筑牢保障粮食安全的法治屏障，着力 应对和化解粮食安全面临的各种风险挑战。不断提升粮食安全保障的法治化水平，这不仅是 实施国家粮食安全战略的必然要求，而且是推进全面依法治国的题中应有之义。 作者通过这段文字想说的是：",o:["应提升粮食安全法制化水平","以法律的形式固化有益经验","以法治方式保障好粮食安全","健全粮食安全保障制度体系"],a:3},{q:"当前，经济社会发展中各种错综复杂的关系交织，社会行为模式多元， 人民群众权利意识增强。作为守护公平正义的审判机关，人民法院不仅要办好案，还要把对 当下社会关系中是与非、对与错的价值判断传导至全社会，营造公正、和谐的社会氛围，这 是司法机关的社会责任，更是政治责任。在新的发展阶段，人民法院依法能动履职，关键是 要以问题为导向，紧扣依法能动履职工作中发现的难点重点、薄弱环节，有的放矢，重点突 破，用成果实效彰显人民法院在中国式现代化新征程中的政治担当和法治担当。 这段文字表达的主要观点是：",o:["新时代人民法院的政治责任","人民法院如何依法能动履职","人民法院能动履职的重要意义","社会发展带给司法工作的挑战"],a:2},{q:"近年来，以经典重生为主线的怀旧音乐综艺扎堆亮相，让很多人在歌声中 回忆往昔，也让部分年轻观众初听老歌时惊为天人，从此进入到听歌的“考古”岁月。如今 的年轻人成长在网络时代，在海量歌单的冲击下，对唱片和专辑已经很陌生了。此时，经典 老歌通过怀旧音乐综艺重新进入大众曲库，让不少年轻人开始追寻二十世纪八九十年代甚至 更早的歌曲。这几年，经典的滚石、宝丽金时代的老歌，越来越被年轻歌迷所认识和了解。 这段文字主要介绍：",o:["唱片和专辑对于年轻歌迷来说非常陌生","怀旧音乐综艺进入听歌的“考古”岁月","年轻歌迷追寻二十世纪八九十年代的歌曲","经典老歌越来越被年轻歌迷所认识了解"],a:2},{q:"未来，如何进一步做大做优中国产业数字化？首先，要在基础技术上 实现突破。当前，我国在这些领域依旧存在技术自主化短板，因此要增强对自主性关键技术 的研发，加大知识产权保护力度、促进产学研用融合。其次，要充分发挥企业家的创新精神， 营造宽松包容的数字技术融合发展的外部环境。数字应用创新要更多和企业实际需求相结合， 应用深度要继续加大，同时，要利用好产业示范效应，可以通过建立“灯塔工厂”、数智化 标杆企业范例等方式，打造一批产业数字化转型的典型案例。推动中国产业数字化再建新功， 也离不开符合数字中国建设规划方向、符合数实融合的数字化转型政策环境的有力支持。 从这段文字中提取的关键词最恰当的一项是：",o:["技术研发 示范效应 政策支持","技术突破 创新精神 政策支持","技术研发 创新精神 示范效应","技术突破 示范效应 政策环境"],a:0},{q:"近年来，我国高度重视制造业智能化机器人产业发展，制定了机器人 产业发展规划，大力支持人工智能领域的研发创新，从而推动移动机器人技术与移动互联网、 大数据处理等技术融合应用。当前，移动机器人技术已达到可批量应用的时间窗口，正广泛 应用于工业场景，而工业智能化提速也带动了移动机器人产业快速发展。据工信部数据显示， 我国移动机器人核心产业规模超过 4000 亿元，企业数量超过 3000 家。另据统计，2021 年 我国移动机器人的出货量占到全球的 40%，年产销量保持高速增长。 文段意在说明：",o:["移动机器人在工业应用中优势明显","我国移动机器人技术居世界领先地位","我国发展移动机器人已具备良好基础","我国应重视智能机器人的产业发展"],a:1},{q:"城市发展的本质是人类对自然环境占有和改造的过程，也是人类对自身赖 以生存的自然生态环境的认识与适应过程。无论是过去、现在还是未来，城市的发展质量在 很大程度上不仅取决于人类对城市的认知和定位，更取决于城市的规划和建设理念。随着全 球城市化加速发展和城市病日益突出，探索出未来可持续发展城市模式，成为一个时代命题。 这段文字意在说明：",o:["城市发展质量取决于其管理理念","城市发展过程中应注重环境保护","现代城市发展模式有待转型升级","全球城市化凸显了城市病的危害"],a:1},{q:"为了确保冰块的卫生和安全，国家规定，制冰用水应该是经过消毒的 安全的饮用水。然而，并非每个商家都舍得花金钱和时间去选用合格的制冰水。如果制冰水 中本来就有微生物，那么制出的冰细菌总数超标、有致病菌或病毒的概率就很大。制冰机外 观和内部如果没有按规定开展定期清洗和消毒，也很容易藏污纳垢。同时，很多商家为了方 便取用，存放冰块的容器往往是敞口，这就大大增加了被细菌和其他微生物，甚至蟑螂蚊蝇 等污染的风险。运输冰块的容器、取冰的冰铲若存放不当，或没有及时清洗消毒，也很容易 将污染物带入到冰块中。 这段文字意在强调：",o:["商家忽视制冰用水安全性的危害","应增强安全意识，少喝含冰饮料","商家应定期清洗和消毒制冰工具","冰块污染背后的多种经营者因素"],a:2},{q:"大家知道，我们常见的小贝壳通常是开口向下，可以通过肌肉移动。但砗 磲一般都是开口向上固定在珊瑚礁盘上，一辈子都不会移动。这个固定不动的特征对于我们 做古天气研究非常重要。如果砗磲不停地移动，那么所记录的气候环境信息就会随位置的改 变而受到干扰。好在砗磲一辈子不移动，就像一个海洋气象站一样，在同一个位置不停地记 录周边的海洋、天气、气候信息，简直就是天生的“地质气象站”。 这段文字旨在说明：",o:["砗磲进化出了一种极为罕见的生物特性","利用砗磲可以进行气候历史的理论研究","砗磲是一种非常理想的古天气研究载体","砗磲化石中留存着古代天气变化的秘密"],a:0},{q:"如今，越来越多的专家、教授在年轻人喜爱的视频平台上开课，一大 批教授和他们的视频课程在网上走红，甚至成为“爆款”，这与人们印象中专家、教授正襟 危坐的授课形象相去甚远，引起了许多人的质疑。毋庸讳言，视频网站尤其是短视频平台上 的知识大都带有碎片化特征。不过，化整为零本就是知识传递的普遍方式，也符合知识延续 的一般规律。我们对专业知识的掌握一般都要经历从一砖一瓦到搭建起“高楼大厦”的过程。 从这个角度来说，教授在视频网站“出圈”，同样是在履行知识布道者的职责。 这段文字重点强调：",o:["网络视频平台，同样可成为知识的“布道场”","教授纷纷“出圈”，网络课程也可“传道授业”","专家入驻网络视频平台，打造“爆款”课程","知识的积累不可急功近利，更需“聚沙成塔”"],a:1},{q:"美学经济时代，伴随着消费需求与消费体验的不断升级，以美学价值为核 心的生产要素在产品的价值生产、企业的品牌建设以及产业价值链的提升中发挥着越来越重 要的作用。电影产业作为当前经济中吸附资本能力最强、生产时效最快、引爆审美迭代和文 化价值翻新变异的内容产业，对产业升级和经济增长的重要性不言而喻。电影是当代新文化、 新时尚、新美感、新神话、新观念的重要策源地，牢牢占据着内容产业的头部位置，既对社 会整体风尚与价值发挥引领作用，也会优化赋能全经济产业链。 这段文字意在说明：",o:["电影产业长期处于内容产业的龙头位置","电影对中国产业的转型升级具有重要推动作用","电影产业的发展引领着美学经济时代的整体风尚","美学经济时代以价值为核心的生产要素愈发重要"],a:2},{q:"“充电”方式千千万，在网上付费学习课程、获取知识成为近年来 不少人的选择。尤其伴随着直播平台的兴起，知识分享这把火烧得更旺了。事实上，知识分 享的盛行并不仅仅因为它提供了人们所需的知识。一些人为知识买单，也是为生活、事业上 的迷茫以及如何去应对它们而买单，通过更高效的学习为自己求得一颗“定心丸”。此外， 当身边有朋友在观摩、学习付费课程时，一些人也会担心自己是否会落伍或无法融入圈子， 这种焦虑促使他们寻找突破口，选择加入其中。 文段意在说明人们加入知识付费课程是因为这一课程能够：",o:["实现知识迁移","节约学习时间","满足生活需求","提供情绪价值"],a:0},{q:"当前，实体经济与数字经济深度融合，数字产业化与产业数字化加速 推进。对劳动者来说，必须提升数字素养和技能，才能适应数字经济发展的步伐，提升人力 资本水平。同时，数字技术也广泛地应用到社会生活和文化消费中，尤其是智能手机的普及， 为数字化交往和数字化消费的推广创造了条件。以网络购物、网络娱乐、在线医疗等为代表 的数字消费迅猛发展，也催生了新的消费方式和消费习惯。对于消费者来说，只有提升数字 素养和技能，才能尽享数字经济时代的便利。 对这段文字概括恰当的一项是：",o:["消费者提升数字素养和技能是适应数字社会的必要条件","提升数字素养和技能对供给端和需求端都非常重要","提升数字素养和技能是促进数字经济发展的不二法门","消费者应顺应趋势及时提升素质、不断升级技能"],a:3},{q:"综观自然界里的动物和植物，蓝色是一种极其罕见的颜色，我们吃的食物 几乎没有蓝色的。在 18 世纪初普鲁士蓝（即亚铁氰化铁）被意外发明之前，蓝色颜料一直 难以获得。当时画家笔下那种鲜艳、饱和的蓝色，主要来自一种名贵的矿石——阿富汗青金 石。青金石研磨成粉，可以调制出稳定的蓝色颜料“群青”。这些宝贵的石头通过丝绸之路， 从中亚流向欧洲和中国，成为画家笔下神秘绚烂的一抹异色。在莫高窟的壁画中，我们便可 以找到这种蓝色。因为珍稀罕见，青金石在市面上流通的价格一度比黄金还要昂贵几倍。 这段文字主要介绍：",o:["自然界中蓝色极其罕见的原因","古代绘画中所使用的蓝色颜料","青金石在莫高窟壁画中的使用情况","丝绸之路对中西方文化交流的影响"],a:3},{q:"日常生活中，我们每天早上都会“照镜子”，这是我们形成躯体自我认知 的重要方式，我们也最习惯看到镜子中的自己。殊不知，基于平面镜成像原理，镜子中的影 像是左右颠倒的，我们在镜子中看到的永远是左右脸对调后的自己。而拍摄的照片以及他人 眼中的你，则是没有经过左右脸对调的。进一步说，我们在照片中看到的自我形象，与大脑 内储存的、最习惯看到的自我形象是左右颠倒的，所以当我们最初看到自己的照片时，会不 由自主地对比脑中的自己与照片中的自己，这种差异会让我们产生一种失调感；而这种感觉 身边人则不会有，因为照片中我们的影像与平时他们眼中的是一致的。 这段文字主要介绍的是：",o:["人最陌生的反而是自己的脸","心理因素也易促使照片失真","为何照片里的自己与镜子里的不同","自我认知方式决定了个人的审美观"],a:1},{q:"专家身份不仅意味着一个人具备专门的知识和技能，更意味着他人承认其 可信性和权威性。专家若想具有说服力，必须善用自己掌握的知识和技能，“善用”即是指 在正确的时间，以正确的方式，朝向正确的目标。只有审慎行动、保持善意，专家才能有效 地应用技术性知识。 这段文字意在强调：",o:["专家要有效地应用技术性知识","对专家的不信任和质疑很常见","专家的可信度来自知识与善意","人们应以批判性思维对待专家"],a:3},{q:"在社会文化的变革中，如果要创新，就必须要有新的思维，必须突破原有 的观念体系和知识框架，必须要对社会已经蔓延的“常识”进行反思和批判。这里的“常识”， 指既定的思想框架和方法路径。尽管这种思想框架和方法路径可能是人类智慧和实践的一种 积累，但是随着历史的发展，它很可能又变成了一种枷锁，限制和捆绑着人们的创造力。我 们的反思、修正、突破和创新，都需要不断地去做各种各样的尝试。 这段文字意在强调：",o:["“常识”容易让人墨守成规","要创新就必须突破“常识”","突破和创新需要大胆尝试","要警惕“常识”的负面影响"],a:1},{q:"多年来，很多地方将促进残疾人就业再就业作为“服务残疾人，为残 疾人办实事”的首要任务来抓，通过加强与用工企业沟通，寻求增加残疾人就业机会，同时 加强残疾人就业技能培训力度，提高残疾人就业创业能力，并对未就业残疾人情况开展摸底 调查，有针对性地提供就业服务。此外，还鼓励残疾人自主创业，促进残疾人实现个体就业。 不过，残疾人就业的现实状况和我们的预期仍存在一定的差距。比如，在一些地区高中及职 业教育的发展程度仍难以很好满足这个群体的学习需求，心智障碍者融合就业率仍偏低，残 疾人大学生就业仍难以获得公平的机会等。 这段文字意在说明：",o:["残疾人培训及学习需求尚未全面满足","残疾人就业服务应当进一步加强","亟须健全残疾人就业的服务体系","企业需提供更多资源确保残疾人就业"],a:3},{q:"当前，城市越来越像一台精密的仪器，任何一个没有拧紧的螺丝钉， 都可能引发系统性问题，可谓“牵一发而动全身”。没有城市规划、设计、建设、运行等各 个环节强化标准，没有城市管理各个部门之间统筹协调，安全的目标就难以真正实现。然而， 少数地方还停留在头痛医头、脚痛医脚阶段，往往是“按下葫芦浮起瓢”；有的在治理实践 中条块分割、各自为政，“各人自扫门前雪”。 下列选项中最符合作者观点的是:",o:["当代城市要讲求治理的精细化","城市安全管理需要系统性思维","城市管理需要多部门通力协作","城市治理需要多环节统筹监管"],a:0},{q:"后现代主义作为一种非主流意识形态，认为经过理性启蒙的世界，并 没有实现理性的许诺和人类美好生活的理想，反而带来了人的异化、物欲横流、道德信仰缺 失和思想意识禁锢等问题，而绝对理性的统治是造成这些现代性危机的罪魁祸首。为此，后 现代主义抨击一切价值标准和道德说教，否定人作为价值主体所具有的道德观念、承担的社 会责任和遵守的社会价值规范，鼓励通过加强人的个性化和生活方式的多样化，来实现对现 代性的超越。后现代主义对理性的批判，对差异、多元和个性的强调，有利于人们摆脱工具 理性的束缚，促进个性的解放、个体意识的培育和个人的成长。但是，由于后现代主义忽视 价值理性的现存意义，夸大工具理性的负面效应，从而容易诱导人们放弃理想信念、价值规 范和责任担当，导致玩世不恭和自暴自弃的行为方式的蔓延，并最终走向主流意识形态的对 立面。 这段文字意在说明：",o:["价值理性和工具理性是人类理性不可分割的重要方面，不应被忽视","绝对理性的统治是道德信仰缺失和思想意识禁锢等现代危机的根源","后现代主义思潮对理性主义的批判容易造成对主流意识形态的冲击","应当区别对待后现代主义的受众，积极应对其可能带来的负面影响"],a:1},{q:"瑞典厨师发现，浅蓝色的餐布作为对比色，更加凸显橙色和黄色，能使 菜肴看起来没有那么咸，增加咖喱和鸡蛋的香味；而珊瑚色能减少葡萄柚等食材的苦味，让 其尝起来更甜；粉色和玫瑰红色搭配甜点，使食物尝起来更香甜。利用餐布颜色互补的优势 搭配菜肴，这种方法简单、有创意，还能为食物锦上添花。 这段文字意在说明：",o:["国外餐饮重视运用色彩","餐布的颜色会影响味觉","要注重不同食材的色彩搭配","利用色彩互补能影响用餐者心情"],a:2},{q:"人类文明发轫初期，原始记事技术的发明引发了人类新的思维方式， 人们对宇宙、人生的认知和理解得以稳定地储存和有序地传播，改变了口耳相传时代人类创 造文化的不确定性和随意性。工业革命以后，机械复制技术的普及使文学艺术生产从“量变” 飞跃到“质变”，引发了人类对审美、创造、接受等态度的根本转变，推动了新文化艺术形 态的出现。如今，数字技术、互联网、AR/VR 技术的应用，突破了文化艺术生产、体验和消 费的时空限制，再次颠覆了文化艺术的生产、储存与流转体系。数字时代，文化的丰富性、 链接性、公共性等特征，正激发生成与传统文化环境全然不同的文化结构和生态系统。 这段文字意在说明：",o:["技术推动了文化艺术生产、传播方式的变革","数字时代文化生态体系发生了颠覆性的变化","文学艺术发展得益于人类文明的整体性进步","应不断重塑文化环境以适应文化的飞速发展"],a:2},{q:"在传统基层治理中，缺乏社会组织、市场等各主体的共同参与、质询和监 督，必然导致政府公共服务能力下降、权力垄断和滥用等问题，容易弱化公众信任程度，引 发社会信任危机。区块链技术基于去中介信任机制、共识机制、协调共享机制，适用于多环 节、多方协同参与且互不信任的场景。而信任是多元主体进行基层协同治理和互信规则建构 的合作基础，区块链的算法信任机制与基层社会治理“公共性+信任”的价值追求相契合。 借助区块链技术可以促进治理生态中双边信任向多边信任及社会公信的转变，突破传统国家 治理体系所形成的认知固化和思维僵化。 这段文字意在强调：",o:["健全信任机制是基层协同治理的条件","区块链技术有助于推进基层治理改革","区块链技术的应用能够提升政府公信力","治理生态离不开多元社会主体间的协作"],a:1},{q:"距今 200 万~100 万年前，在类人猿向现代智人进化期间，人类祖先的大脑 就进化出了支持合作的功能，以支持狩猎活动。这使人类祖先前额皮层里的记忆与思考中心 变得比其他灵长类动物的更发达。随着群体变得比个体更强大，大脑不断进化出管理更大群 体的能力，群体之间的竞争就变得比个体之间的竞争更重要，同时拥有更多合作性个体的群 体发展得更好，这一进化使得利他意识、伦理观、良知和尊严意识发展起来。 这段文字意在说明：",o:["人类祖先的狩猎活动离不开群体的合作","大脑在群体生活中的进化可以激发美德","大脑的构造会因生活方式的变化而演化","群体发展取决于拥有合作性个体的数量"],a:2},{q:"当前，在发展格局的重要影响下，要实现我国零售业的高质量发展，就要 发展线上和线下共同融合的多元立体零售模式，同时要重视新零售供应链生态圈的建设。电 商平台企业除了整合上下游供应链合作伙伴、金融、服务及行业资源，朝着“有边界又无边 界”的商业生态圈发展，还需要通过线上线下双渠道的协同联动实现持续发展的商业生态布 局；商业企业要打破地域的空间限制，改变单一的店铺销售模式，积极借助数字化改造及建 设的工具为“新零售”赋能，最终构建“多元要素协同”的“新零售”供应链生态圈。 这段文字重在说明：",o:["“新零售”供应链的特征及潜能","“新零售”供应链生态圈多维服务","“新零售”供应链生态圈的协同逻辑","“新零售”供应链生态圈的创新与竞争"],a:1},{q:"古城经济不可能像新城区的楼宇经济那样产出大，也不会像开发区的 规模经济那样气势足，古城经济就是服务居民和游客的草根经济，有其自身的发展规律。若 能充分依托区位优势、发挥聪明才智、因地制宜发展，那么，店不论大小、业不分高低，能 过得好就是好样的。但其实，古城经济发展具有阶段性。现存的业态解决了有与无的初级问 题，而古城产业振兴则是奔着业态好与更好的追求而来的。只有认真研究产业振兴规律，抓 住产业振兴关键，持之以恒抓下去，才会大见成效。 这段文字意在说明：",o:["应该持之以恒研究产业振兴规律","正确认识古城经济发展的阶段性","坚持做好古城产业振兴规律研究","古城发展应该依托优势因地制宜"],a:0},{q:"研究人员耗时 2 年在圣诞岛周围的珊瑚礁进行调查，在热浪袭来和减弱 时，分别对两种常见珊瑚的藻类共生体进行 6 次采样。从某一时间节点开始，2 个月内气温 上升约 1℃。正如预期的那样，拥有热敏感藻类的珊瑚比拥有耐热藻类的珊瑚更快白化。随 着海水持续变暖，甚至连耐热的藻类也被珊瑚排出体外。但圣诞岛上的这两种珊瑚在海水仍 然异常温暖的情况下从白化中恢复了过来。此前，海洋生物学家发现只有海水冷却到正常温 度后，白化珊瑚才能恢复。而圣诞岛珊瑚的意外复苏则意味着即使在长时间热浪中，其中一 些珊瑚还是有救的。 研究人员最主要的实验目的是：",o:["探索珊瑚对海水温度变化的敏感度","研究珊瑚在长期热浪中的生存能力","讨论海水水质对珊瑚生存的影响","调查白化珊瑚如何重新恢复活力 细节判断题"],a:3}],"判断推理":[{q:"把下面的六个图形分为两类，使每一类图形都有各自的共同特 征或规律，分类正确的一项是：",o:["①②③，④⑤⑥","①②⑥，③④⑤","①④⑥，②③⑤","①⑤⑥，②③④"],a:2},{q:"把下面的六个图形分为两类，使每一类图形都有各 自的共同特征或规律，分类正确的一项是：",o:["①③④，②⑤⑥","①③⑤，②④⑥","①②⑤，③④⑥","①⑤⑥，②③④"],a:2},{q:"把下面的六个图形分为两类，使每一类图形都有各自的共同特 征或规律，分类正确的一项是：",o:["①②③，④⑤⑥","①③⑤，②④⑥","①④⑤，②③⑥","①⑤⑥，②③④"],a:2},{q:"把下面六个图形分为两类，使每一类图形都 有各自的共同特征或规律，分类正确的一项是：",o:["①②④，③⑤⑥","①③④，②⑤⑥","①④⑤，②③⑥","①③⑥，②④⑤"],a:2},{q:"把下面的六个图形分为两类，使每一类图形都有各自的共同特 征或规律，分类正确的一项是：",o:["①②③，④⑤⑥","①②⑤，③④⑥","①②⑥，③④⑤","①④⑥，②③⑤"],a:3},{q:"把下面的六个图形分为两类，使每一类图形都有 各自的共同特征或规律，分类正确的一项是：",o:["①②④，③⑤⑥","①②⑥，③④⑤","①④⑥，②③⑤","①⑤⑥，②③④"],a:3},{q:"把下面的六个图形分为两类，使每一类图形都有各自的 共同特征或规律，分类正确的一项是：",o:["①②⑤，③④⑥","①④⑥，②③⑤","①④⑤，②③⑥","①⑤⑥，②③④"],a:1},{q:"把下面的六个图形分为两类，使每一类图形都有各自 的共同特征或规律，分类正确的一项是：",o:["①③⑤，②④⑥","①③④，②⑤⑥","①④⑤，②③⑥","①②⑤，③④⑥"],a:3},{q:"把下面的六个图形分为两类，使每一类图形都有各自的 共同特征或规律，分类正确的一项是：",o:["①②③，④⑤⑥","①④⑥，②③⑤","①②⑥，③④⑤","①④⑤，②③⑥"],a:1},{q:"把下面的六个图形分为两类，使每一类图形都有各自的共同特 征或规律，分类正确的一项是：",o:["①③④，②⑤⑥","①③⑤，②④⑥","①②⑥，③④⑤","①④⑥，②③⑤"],a:3},{q:"把下面的六个图形分为两类，使每一类图形都有各自的 共同特征或规律，分类正确的一项是：",o:["①②③，④⑤⑥","①③④，②⑤⑥","①②⑤，③④⑥","①④⑥，②③⑤"],a:1},{q:"把下面的六个图形分为两类，使每一类图形都有各 自的共同特征或规律，分类正确的一项是：",o:["①③④，②⑤⑥","①②⑥，③④⑤","①④⑤，②③⑥","①③⑤，②④⑥"],a:3},{q:"把下面的六个图形分为两类，使每一类图形都有各自的共同特 征或规律，分类正确的一项是（ ）。",o:["①②⑥，③④⑤","①③④，②⑤⑥","①③⑥，②④⑤","①④⑥，②③⑤"],a:2},{q:"把下面的六个图形分为两类，使每一类图形都有各自的 共同特征或规律，分类正确的一项是：",o:["①⑤⑥，②③④","①②⑥，③④⑤","①②④，③⑤⑥","①④⑤，②③⑥"],a:2},{q:"把下面的六个图形分为两类，使每一类图形都有各 自的共同特征或规律，分类正确的一项是：",o:["①③④，②⑤⑥","①③⑥，②④⑤","①②⑤，③④⑥","①④⑤，②③⑥"],a:1},{q:"把下面的六个图形分为两类，使每一类图形都有 各自的共同特征或规律，分类正确的一项是：",o:["①④⑥，②③⑤","①②⑤，③④⑥","①③⑥，②④⑤","①⑤⑥，②③④"],a:0},{q:"特种医学是运用医学科学的基本原理和技术方法以及自然科学 相关理论与实践知识，研究在特殊环境条件下从业或从事其它活动的所有人群特 有的卫生保健需求，解决在实践中涉及到的各种特殊医学问题。特种医学的最终 目的是从分子、细胞与整体水平认识特殊环境条件作用于人体所引起的生理、心 理及病理变化的现象及规律。 根据上述定义，下列不属于特种医学研究范畴的是：",o:["研究潜水对人体带来的生理变化以及潜水人员在水下环境中所面临的健康风 险","研究太空环境对航天员的心理影响，探索能够改善航天员心理状况的措施","分析人在热带地区的机体变化，研究热带病的诊断、预防和治疗","以骨癌为研究对象，探究遗传因素、基因突变、化学因素等在发病中起的作用"],a:3},{q:"负性偏向是指负性信息比其他信息得到优先的注意和加工，这 是人类在先天遗传和后天经验基础上存在的一种普遍性认知倾向，即给予负性事 物更大的权重，并在注意、记忆、情绪、决策等方面遵循“坏比好重要”的心理 原则。 根据上述定义，下列没有体现负性偏向的是：",o:["“3·15”晚会报道侵犯消费者权益的违法行为，以期政府各级管理部门有效 管理","被试对负面词汇的再认正确率比正面词汇高，能更精准识别某负面词汇是否在 语料中","新闻传播过程中，模糊信息中的一些负面细节更容易被人们关注并作进一步负 面解读","应聘者的优缺点与职位具有同等相关性，但招聘者往往更关注应聘者的缺点"],a:0},{q:"史翠珊效应是指试图阻止大众了解某些内容，或压制特定的网 络信息，结果适得其反，使该内容或信息被更多人所了解。 根据上述定义，下列体现史翠珊效应的是：",o:["某煤矿老板为掩盖事故真相，向调查记者行贿，行贿过程被酒店监控全程记录 下来","某自媒体散布当地某企业偷税漏税的谣言，该企业随即在网上发布辟谣视频， 引发了更多关注","某明星丑闻被一家媒体掌握，该明星威胁媒体不许曝光此事，被媒体将威胁短 信和丑闻一并曝光，结果上了热搜","某网红故意与人发生冲突并将冲突视频发布到网上，视频爆火之后因害怕承担 刑事责任，该网红主动删除视频"],a:2},{q:"拟剧理论指人与人在社会生活中的相互行为在某种程度上是一 种表演。每一个人就像演员一样，在某种特定的场景下，按照一定的角色要求在 舞台上表演给观众看。在整个表演过程中，人总是尽量使自己的行为更为接近想 要呈现给观众的那个角色，观众看到的是那个表现出来的角色而不是演员本身。 当表演结束，演员回到后台以后，他的真实面目才展现出来，演员才又恢复其本 来的自我。 根据上述定义，下列选项不能印证拟剧理论的是：",o:["小丽来找小明探讨功课，小明没有立刻开门，而是先把臭袜子藏到床下","在“国王的新装”故事里，新装展示游行时臣民交口称赞新装华贵美丽","小魏生活拮据但工作努力，老板不动声色地开豪车替其去机场接其父母","小菲通过盗图和拼接，天天在微信朋友圈发吃美食、健身、游玩的照片"],a:2},{q:"查全率是指检索出的相关文献量与检索系统中相关文献总量的 百分比。查准率是指检索出的相关文献量与检索出的文献总量的百分比。检索时 间是指根据特定条件搜索或查找特定信息或数据所需的时间，检索时间受到检索 系统的性能、数据量的大小、搜索条件的复杂性等多种因素的影响。一般来说， 搜索条件越多，检索时间越长。 根据上述定义，下列说法正确的是：",o:["要提高查全率，就要提高查准率","检索某一课题时，若数据库中共有相关文献 40 篇，但只检索出 30 篇，则查全 率为 75%","检索时间越长，查全率和查准率必然会越高","若检索出的相关文献量有 60 篇，检索出的文献总量有 300 篇，则查准率为 50%"],a:1},{q:"海洋地球物理调查是指利用各种物理学方法和仪器，测量海底 地球物理的性质及其变化特征，从而得出海底地质构造或矿产分布的调查方法。 根据上述定义，下列属于海洋地球物理调查的是：",o:["将重力仪安放在船上进行观测，以确定海底地壳各种岩层质量分布的不均匀性","用深海钻探法从海底采集富钴结壳矿样品，分析其中锰、铁氧化物成分及氧化 程度","用硝酸银滴定氯化物的方法检测海底沉积物的成分，以确定海底矿产资源的情 况","用抛弃式探温仪测定海水温度，计算出海洋平均温度，分析近 60 年来海洋变 暖速率"],a:0},{q:"生产性固定资产是指在物质资料生产过程中能长期发挥作用而 不改变其实物形态的劳动资料。它不同于非生产性固定资产，非生产性固定资产 可分两类，一类是纯消费性的，没有盈利，投资不能收回，其再投资依靠社会积 累，另一类是可转化为无形商品的，有盈利，可以收回投资，甚至可实现增值和 积累。 根据上述定义，以下投资能形成生产性固定资产的是：",o:["对影剧院、电视台、咨询公司等的投资","对面粉厂的机器、设备和厂房等的投资","对学校、国防安全、社会福利设施等的投资","对快餐店的家禽、蔬菜、大米等原材料的投资"],a:1},{q:"无效运输指的是没有任何经济社会效益的运输，具体是指物资 中所包含的无使用价值的那部分杂质的运输，这种运输不仅浪费交通运力，而且 消费该物资的单位或企业也得不到保质保量的产品。 根据上述定义，下列属于无效运输的是：",o:["某国矿产资源分布不均，由此形成北矿南运、西矿东调的长距离运输","原油中掺杂有超量水分并投入使用时，会增加机器设备被磨损腐蚀风险","运输的原煤中有 25%是不能用于燃烧的矸石和灰分，造成铁路运力的耗费","向海外运送瓷器时，选择了成本较高的航空运输，没有发挥出水路运输的优势"],a:2},{q:"过度管理是指某些管理者过分相信自己的能力、精力和眼光， 认为缺少自己的指挥就达不到预期效果，或凡事亲历亲为，让自己整日陷于忙碌 之中。 根据上述定义，下列不属于过度管理的是：",o:["班主任陶老师对学生要求十分严格，每天都到班级督促学生学习和锻炼，常常 严厉批评犯错误的同学","龚经理总是对下属不放心，公司职员小张出差两天，龚经理打了 10 多个电话 指导工作，弄得小张压力很大","饭店高老板习惯每天下班时和保洁员工一起打扫卫生，他觉得只有这样才能保 证餐厅整洁，不留任何卫生死角","办公室许主任每次分派工作都十分具体，如对会议室桌椅的摆放数量和位置等 细节都交代得十分清楚，让下属没有一点发挥的余地"],a:0},{q:"征询型公关是指通过采集信息、舆论调查、民意测验等，掌握 信息和舆论，为组织机构的经营管理决策提供公共关系方面的咨询的活动。宣传 型公关是指利用各种传播媒介向社会公众介绍自己，以形成有利的社会舆论的公 共关系活动。 根据上述定义，下列属于宣传型公关的是：",o:["研究机构公布某公司的市场调查结果引起社会关注","将公司新开发的系列产品通过微信公众号进行推送","收集微信公众号上用户对本公司产品的态度与评价","物业公司通过线上线下问卷向业主征求意见和诉求"],a:1},{q:"具有包含与被包含关系的三个概念，如植物、乔木、水杉等， 可至少形成三个正确的命题：所有的水杉都是乔木，所有的乔木都是植物，所有 的水杉都是植物，由“所有的乔木都是植物”“所有的水杉都是植物”而得出 “所有的水杉都是乔木”，这样的推理被称为排序推理。 根据上述定义，下列属于排序推理的是：",o:["所有的平行四边形都是四边形，所有的菱形都是四边形，所以，所有的菱形都 是平行四边形","所有的昆虫都是动物，所有的蝴蝶都是昆虫，所以，所有的蝴蝶都是动物","所有的文字都是符号，所有的文字都是图形，所以，所有的符号都是图形","这个花园的花都是迎春花，迎春花都在冬、春季开放，所以，这个花园的花都 在冬、春季开放"],a:0},{q:"语言通胀是指当前社会中，由于词语使用过度夸张、描述超过 事实而造成词义掉价、情感弱化、指称范围夸大，甚至可能导致信息理解错误的 语言泡沫化现象。 根据上述定义，下列没有体现语言通胀的是：",o:["“美女”一词原指“年轻貌美的女子”，具有称赞之意，但如今“美女”已变 成很多人对女性的日常称呼","社交网络上人们用词仿佛达成了一种“默契”，实用效果不错的东西都叫“神 器”，说起好吃的东西都是“好吃哭了”","微信聊天时，最初用“哈哈”表示高兴，现在，年轻人经常会用很夸张的动态 表情图来表示自己高兴的心情，有些图让人忍俊不禁","小李向顾客介绍说自己是理发店的首席设计师，顾客发现价目表上写着“首席 设计师 38 元，设计总监 68 元，创意总监 98 元”"],a:2},{q:"假说是根据已观察到的事实和已有的科学原理，对尚未认识到 的现象的性质或发生原因作出的推测性解释。依据提出假说的目的不同，假说分 为：①定律假说，是关于一类事物或现象的性质或发生原因的推测性解释，目的 在于通过这样的解释指导探索某类事物的性质或发生原因，得出具有普遍意义的、 规律性命题；②作业假说，是关于某个特定事物或现象的性质或发生原因的推测 性解释，其目的不在于获得定律性认识，而在于通过对事物或现象的性质或发生 原因的试探性解释，以指导人们有目的有计划地展开工作。 根据上述定义，下列说法正确的是：",o:["石油勘探人员通过重力勘探法，认为某盆地的下方富含石油，这属于定律假说","侦查人员通过对案发现场的侦查，推测是单位内部人员作案，这属于定律假说","牛顿根据苹果落地等现象，提出物体之间都具有引力的解释，这属于作业假说","医生通过检查、化验，对一位腹痛患者的病症作出了初步诊断，这属于作业假 说"],a:3},{q:"无感审批是指通过智能技术强化身份认证、智能授权、自动填 表等功能，企业群众无需出示证件、无需填写表单，“不知不觉”就拿到审批文 件，实现“无感”审批、“省心”办事。 根据上述定义，以下属于无感审批的是：",o:["某市旅游管理部门通过人脸识别等网络技术，实现了网上实名制购买全市公园 门票。游客无需出示证件，可以直接出示购票二维码入园","某建设单位登录省投资在线监管平台，填写单位代码后，系统自动生成企业基 本信息和申请表格，随后完成在线审核，获得建筑许可","某市提高政府办事效率，对企业或个人办理业务，只需要到综合服务大厅询问 工作人员，工作人员会帮忙核对材料，帮助他们方便快捷地完成相关手续","某保险公司提供网上业务办理和查询功能，客户登录公众号并通过人脸识别后， 可完成查询、续费、转款等功能，无需出示证件、无需填写表单"],a:1},{q:"收敛式论证结构是一种常见的多前提论证结构，它是指多个前 提相对独立地分别支持结论，也许这些理由独自给结论提供的支持非常有限，但 它们的支持力积累起来可以给结论提供强有力的支持。 根据上述定义，下列属于收敛式论证结构的是：",o:["所有理性主义者都不会超前消费，所以有些非超前消费的人是理性主义者","她不是四川人，因为四川人都会说四川话，但她却不会说","正在上小学的小李天资聪颖，能够吃苦，学习兴趣比较浓厚，小李的父亲认为 他将来一定可以考上大学","妻子生气地对丈夫说：“你若是能够戒烟，太阳会从西边出来。”显然，太阳 不会从西边出来"],a:2},{q:"主体间性是指人对他人意图的判断与推测。主体间性有不同的 级别，一级主体间性即人对另一个人意图的判断与推测，二级主体间性即人对另 一人关于其他人意图的判断与推测的认知的认识。 根据上述定义，下列体现了二级主体间性的是：",o:["小明饿了，去问妈妈饭做好没有，妈妈说爸爸正在做","老师知道学生们不喜欢做作业，周五就在班级群里通知本周末不留作业","小王知道老板爱挑毛病，每次提交的总结都得仔细检查好几遍","小花看见妈妈冲爸爸使了个眼色后，爸爸尴尬地放下酒杯，小花偷偷地笑了"],a:3},{q:"自动投案是指犯罪事实或者犯罪嫌疑人未被司法机关发觉，或 者虽被发觉，但犯罪嫌疑人尚未受到讯问、未被采取强制措施时，主动、直接向 公安机关、人民检察院或者人民法院投案。 根据上述定义，下列不属于自动投案的是：",o:["甲实施多起电信诈骗，获利十余万元，在公安机关进行的一次隐患排查入户走 访中，发现甲形迹可疑，经盘问甲主动交代了自己的罪行","乙致人重伤后潜逃，在公安机关经侦查确认乙为该案的犯罪嫌疑人时，乙正因 酒后驾驶被行政拘留，经公安机关讯问后，乙交代了自己的罪行","丙多次挪用公款，其父母发现异常后，多次规劝其投案自首无效，直至单位发 现款项异常开始查账后，丙才到公安机关交代自己的罪行","丁因入室盗窃被判处有期徒刑，在服刑期间，丁主动向公安机关交代自己系公 安机关久未破获的“7·26”走私案的主谋之一"],a:1},{q:"动机-效率定律是心理学家提出的反映动机水平与工作效率关 系的定律。心理学家认为动机水平的强度和工作效率之间的关系不是一种正比例 关系，而是形成一种倒 U 形曲线，如下图所示。 根据上述定义，下列说法错误的是：",o:["动机水平在达到一定强度的时候，工作效率最高","在一定范围内，工作效率随着动机的提高而上升","随着任务难度的增加，动机的最佳水平逐渐上升","对学习来说，如果动机过强，会使学习效率降低"],a:2},{q:"选择性理解是指不同的受众对传播媒介所传播的同一信 息做出不同的解释、结论和反应。造成这种现象的主要原因是受众在理解过程中 加进了许多主观因素，如固有的观念、态度、立场，个人的感情、情绪、习惯， 使用传播媒介的动机和目的，等等。 根据上述定义，下列情形属于选择性理解的是：",o:["小吴与小宋经常就新闻报道中的观点发生争执","小婷与小凤就新闻受众问题提出不同的学术观点","小陈认为看时政新闻有意思，而小李认为文体新闻更刺激","小伍觉得晚上看新闻更有感觉，小王认为早上看能早知道"],a:0},{q:"纵向谈判是指在确定谈判的主要问题后，逐个讨论每一问题和 条款，讨论一个问题，解决一个问题，一直到谈判结束。横向谈判是指在确定谈 判所涉及的主要问题后，开始逐个讨论预先确定的问题，在某一问题上出现矛盾 或分歧时，就把这一问题放在后面，讨论其他问题，如此周而复始地讨论下去， 直到所有内容都谈妥为止。 根据上述定义，下列属于纵向谈判的是：",o:["产品采购方和供货方进行谈判，采购方明确产品质量必须高标准，任何谈判条 件都让位于质量","在资金借贷谈判中，涉及金额、利率、期限、担保等问题，双方在贷款期限上 未达成一致意见，便先讨论其他问题，最后再讨论贷款期限","一项产品交易谈判，双方确定了价格、质量、运输、保险、索赔等几项内容后， 开始就价格进行磋商，如果价格确定不下来，就不谈其他条款","K 国和 F 国谈判时，内容涉及领土、贸易往来、科技、医疗等多个领域，双方 决定从较不关键的领域开始谈起，争取达成一致建立善意"],a:2},{q:"开放式决策，是指政府在进行重大决策时，充分听取、吸 纳公众意见，并将公众意见作为行政决策的重要参考，使行政决策公开、透明， 实现政府与公众有机互动的一种决策形式。 根据上述定义，下列不属于开放式决策的是：",o:["发改委就天然气涨价事宜举行听证","政府常委会邀请人大代表、政协委员和市民代表列席会议发表意见","市民通过网上留帖或网上视频直播，参与重大民生事项讨论","对社会高度关注的案件，司法机关邀请公众参与庭审旁听"],a:3},{q:"词的同一性是指同一个词形可以表示不同的意义，但这些不同 的意义之间存在着内在联系的现象。 根据上述定义，下列划线的词不属于词的同一性现象的是：",o:["他的态度很端正 大家要端正态度","他是我们的领导 在 D 的领导下奋勇前进","这个人仪表堂堂 在重要场合要注意仪表","这是一门科学 处理问题的方法很科学"],a:2},{q:"大气中水汽直接在地面或地物表面及低空的凝结物，称为隐匿 性降水。由空中降落到地面上的水汽凝结物，称为直接性降水。 根据上述定义，下列属于隐匿性降水的是：",o:["夜深烟火灭，霰雪落纷纷——白居易《秦中吟》","广寒宫中珠径雨，狂风倾下九天来——邓肃《雹》","神农架景区温度大幅下降至零下 3 度，迎来了入秋后的雾凇奇观","雨凇边降边冻，粘附在裸露物的外表而不流失，形成越来越厚的冰层"],a:2},{q:"照护综合征是指一个人因专注于照护生病、受伤或残疾的亲人 而过度劳累或精神上陷于压抑状态，导致身心健康受损的病症。 根据上述定义，下列不属于照护综合征的是：",o:["“照顾生病的父母半年，我感觉整个人都陷入了黑暗，现在还没缓过劲来，电 话铃声一响整个人就哆嗦。”","“这家坐轮椅的老爷子太难伺候了，累死累活照顾他还经常挨骂，还要被扣工 资，我受不了了，不想干了。”","“我起早贪黑照顾了瘫痪在床的父亲两年，他还总不满意，经常训斥我。现在 好了，我也累倒了，住院了。”","“昨天奶奶说，她一个人照顾双目失明的爷爷太累了，要么儿女们轮流来照顾， 要么找个专职保姆，反正她受不了，不管了。”"],a:1},{q:"载损鉴定是指船方为了明确所承运的货物是否发生了残损，以 及残损责任是否属于船方，而向商检机构申请在其卸货过程中检查货物情况，给 予公正的鉴定。 根据上述定义，下列属于载损鉴定范畴的是：",o:["甲船向商检机构申请检查船舶卸货前舱口、风筒的封盖和封识情况，以鉴定货 物受损的原因","乙船向商检机构申请检查舱内货物清单是否与报关清单一致，鉴定货物是否完 整","丙船向商检机构申请对比装船储罐前检尺及储罐后检尺，以计算输油软管破裂 造成的油品泄漏量","丁船与戊船相撞后，向商检机构申请检查船体的故障原因，评估船体的技术状 况"],a:0},{q:"电子官僚主义是指近些年随着电子化、信息化而产生的一种官 僚主义形式，主要表现为过度依赖电子化政务、信息化管理、网上办理、台账管 理等形式，不考虑实际工作问题，其实质上是脱离实际、脱离群众、高高在上。 根据上述定义，下列不属于电子官僚主义的是：",o:["某县政府召集乡镇干部开会，传达上级会议和文件精神，要求无法现场参会的 人员线上参会、电子签到","某年轻干部不深入一线、不下乡调研，通过各式各样的“电子台账”，坐在办 公室里就完成本部门的任务","某上级部门要求下级部门所有工作都要签订“项目责任书”，要求线上实时更 新、反馈和上报各种材料和数据","某部门强调“规范审批、落实责任”，即使线下完成的审批事项也要求服务对 象在信息化系统中再次提交留痕"],a:0},{q:"眼镜蛇效应是指针对某个问题做出的解决方案，非但没有从 根本上解决问题，反而使问题更加恶化的一种现象。 根据上述定义，下列体现眼镜蛇效应的是：",o:["某经理想要提升订单交付率，于是决定大幅增加安全库存数量，结果发现存货 越来越多，引发库存管理人员的抱怨和不满","某采购员发现运费太贵，想要降低采购费用，大费周章地找价格更便宜的供应 商，结果整体的采购支出金额并没有省下多少钱","某单位为鼓励员工工作，出台加班补偿政策，晚上加班 3 小时以上，按一天的 工资标准发放加班费，结果发现加班的人明显增加，加班费大幅攀升","为避免浪费，每晚某超市关门后，老板会把包装破损的食品送给员工，结果食 品包装破损更多了，因为有个别员工故意破坏包装"],a:3},{q:"概念同化是指学习者利用已有概念去学习以定义的方式直接呈 现的新概念，概念同化分为上位学习、下位学习和并列组合学习三种基本形式。 上位学习是指新学习的内容比原有内容的包摄性和概括性高的一种学习方式，下 位学习是指新学习的内容比原有内容的包摄性和概括性低的一种学习方式，并列 组合学习是指新旧概念的概括程度相同，通过并列或联合关系而产生的学习方式。 根据上述定义，下列属于下位学习的是：",o:["在学习了钠、镁、铝等元素的化学性质后，再学习铅、铁、锌等元素的化学性 质","在学习了正方形、长方形的面积计算公式后，再学习平行四边形的面积计算公 式","在学习了 2、3、5 等数字规律并形成了质数概念后，再学习 97 也是质数","在学习了亭、台、楼、阁等建筑的特点后，再学习中国传统建筑的特点"],a:2},{q:"多级养殖是指根据物种代谢产物或残余有机质的利用价值及其 在食物链中所处的级次，依次放养相应生物，多级次利用营养物质的一种养殖方 式。 根据上述定义，下列属于多级养殖的是：",o:["将养殖过江蓠的海水用于放养贝类，以利用其中繁殖的浮游生物；再将养殖过 贝类的水用于放养对虾；再以对虾代谢分解的产物养殖藻类","将鱼、虾、贝类与藻类放在同一水槽混养，其代谢产物会为藻类提供必要的营 养要素，藻类的光合作用又产生更多的溶解氧","在一台浮筏上，于冬春季养殖海带；至夏秋季养殖海湾扇贝或石花菜，从而更 好利用海况条件，满足市场需要","同一池塘中，鲢、鳙生活在上层，主食浮游生物；草鱼、鳊生活在中下层，主 食草类；鲤、鲫生活在底层，主食底栖动物和有机碎屑"],a:0},{q:"矛盾职业认同是指从业者对自身职业兼具认同和不认同，或认 同职业某一方面而不认同其他方面，反映了个体对自身职业的复杂情感。 根据上述定义，下列属于矛盾职业认同的是：",o:["小强对未来就业感到迷茫，一方面认为本专业相对好就业，另一方面觉得工作 压力会很大","虽然觉得社会上有很多人对网络主播并不认同，但小飞却决定将主播当作一生 的事业来做","小刚的父母希望他毕业后考公务员，但小刚自己却更喜欢做一名教师","老汪觉得送快递很累，但工作时间相对自由，因此他还是决定干下去"],a:3},{q:"情绪惰性，是指个体当前情绪状态能被之前情绪状态所预测的 程度，预测程度越大则反映情绪惰性水平越高，情绪惰性作为情绪动态性指标之 一反映了情绪变化的速度。 根据上述定义，下列情形属于情绪惰性的是：",o:["冬季往往容易使人情绪低落，所以这个冬天也不会例外","调皮的小铭被老师批评之后终于老实了，随后几天都一直规规矩矩的","自从万师傅的老伴儿半年前去世后他就一直很忧郁，估计一时半会儿好不起来","自从首长做了战时动员令之后，整个工厂的工人都保持着激昂的心情努力生产"],a:2},{q:"不随意注意是指没有预定目的，不需要意志努力，不由自主 地对一定事物所产生的注意；随意注意指的是有预定目的，需要一定意志努力的 注意，它是注意的一种积极、主动的形式；随意后注意是注意的一种特殊形式， 是指有自觉目的但不需要意志努力的注意。 ①家庭主妇小张厨艺娴熟，在切菜的同时，还可以看电视剧 ②教室里小明在聚精会神地听老师讲课，时不时还记着笔记 ③安静的课堂忽然闯进来一个人，大家不约而同抬头看向他 根据上述定义，下列选项对应关系正确的是：",o:["①③涉及不随意注意","②涉及随意后注意","②③涉及随意注意","①涉及随意后注意"],a:3},{q:"温情执法：指执法人员在依法查处违法行为的过程中，综合考 量各种特殊因素，对违法者进行灵活处置以体现法治温度的执法行为。 下列不属于温情执法的是：",o:["冬天，许多菜农在路边叫卖，给城市交通卫生带来了挑战。区城管部门调研后 划出 28 个覆盖全区的固定销售点，与菜农签订“摊前三包”协议，菜农卖得更 安心了，城市面貌大有改观","民警发现电信诈骗嫌疑人王某潜回家中后迅速抓捕。当时，王某刚把 4 岁女儿 从幼儿园接回家。民警为避免小女孩受惊，迅速收起警察证和手铐。以吃饭为名 把王某带了出去","交警小周在公路上进行安全巡逻时，发现一辆电动三轮车严重超员。处罚过程 中得知因为老人突然生病，全家人带他到县城治疗，小周用警车把他们送到医院","某县卫生健康执法人员在查处无证行医过程中，发现郑某正在出租屋行医。得 知小诊所是他家最主要的经济来源，郑某已考取职业资格证书，县卫生部门协助 他办理了医生执业证书和执业许可证"],a:0},{q:"警觉性市场学习是指企业或组织为提高深度市场洞察而提前建 立预警系统，并保持注意力集中以预测市场变化或感知客户需求微弱信号的学习 行为。 根据上述定义，下列属于警觉性市场学习的是：",o:["公司提醒小吴要想在职场中保持优势地位，避免被淘汰，就必须利用业余时间 多学习","阳阳上课时注意力不集中，为帮他养成良好学习习惯，家长聘请了心理专家进 行干预","某知名企业组建市场调研部，定期监测市场动向，积极培训员工，努力规避潜 在风险","某房地产开发商通过暂缓开发或拖延施工进度等方式，试图化解可能面临的发 展危机"],a:2}],"数量关系":[{q:"一场大雪过后，某单位需安排员工清理包干区的道路积雪。清理时必须 3 人一组，其中 2 人铲雪，1 人扫雪。如果安排 10 人铲雪，3.5 小时才能完成。假设每组工作 效率相同，若要在 100 分钟内完成，则需安排的员工人数最少是",o:["21","
