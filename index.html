<script>
var G={"常识判断":[{q:"2024 年是红军长征出发 90 周年。某博物馆在“重走长征路”展厅展出了 如下路线图。下列与图中地点有关的表述，不正确的是：",o:["地点①是红军长征的主要出发地，也是中国共产党创建的第一个全国性红色政权的所 在地","在地点②召开的会议，集中解决了党内所面临的最迫切的组织问题和军事问题，在极 端危急的历史关头挽救了党和红军，是中国共产党历史上一个生死攸关的转折点","在地点③附近，红军依次经历了“强渡大渡河”“巧渡金沙江”“飞夺泸定桥”","毛泽东在地点④写下“今日长缨在手，何时缚住苍龙”，抒发了将革命进行到底的壮 志豪情"],a:2},{q:"下列诗句与“千门开锁万灯明，正月中旬动帝京”涉及的传统节日相同 的是：",o:["插萸登鹫岭，把菊坐蜂台","一轮秋影转金波，飞镜又重磨","鼓声三下红旗开，两龙跃出浮水来","灯火钱塘三五夜，明月如霜，照见人如画"],a:3},{q:"关于生活中的物理现象，下列说法正确的是：",o:["桥梁桥拱的形状经极致优化可显著增加桥梁对桥墩的拉力","白炽灯中的钨丝在长期使用过程中会逐渐变细，电阻变大","风筝在飞上天空的过程中，动能转化为势能，机械能不变","修建高塔时，塔基底座的面积越大，塔对地面的压力越小"],a:1},{q:"一直以来，长江中下游洪涝灾害严重，给当地人民生产生活带来了很多 不利影响。下列关于导致长江流域洪涝灾害原因的分析错误的是：",o:["中游湖泊面积缩小，分洪蓄洪能力减弱","长江流域内多为温带季风气候，降水充沛集中","中下游段河道弯曲，水流缓慢，泥沙沉积抬高河床","上游植被遭到破坏，水土流失严重，河流含沙量增大"],a:1},{q:"根据我国法律对代理的规定，下列说法正确的是：（ ）",o:["7 岁的张某的监护人可由其继父担任","王某委托律师陈某进行诉讼，必须签订书面代理合同","10 岁的李某用压岁钱购买价值人民币 5000 元的玩具，该购买行为有效","甲公司委托黄某购买一台指定型号的生产设备，黄某经过考察比较后买了性能更好的 另一型号生产设备并确定合同，该合同有效"],a:1},{q:"下列名胜古迹与楹联对应正确的是（ ）。",o:["四川成都杜甫草堂——两表酬三顾，一对足千秋","浙江杭州岳飞墓——四面荷花三面柳，一城山色半城湖","山东济南大明湖——湖光潋滟疑花雨，山籁空灵度梵音","安徽合肥包公祠——理冤狱关节不通自是阎罗气象，赈灾黎慈悲无量依然菩萨心肠"],a:3},{q:"2024 年 10 月 21 日，中国人民银行授权全国银行间同业拆借中心公布，1 年期贷款市场报价利率（LPR）为 3.10%，5 年期以上 LPR 为 3.60%，二者均比上月下调 25 个基点。下列有关说法不正确的是：",o:["LPR 下调有助于增加居民的储蓄收益，提高居民收入水平","LPR 下调有助于减轻居民的房贷压力，增强居民购房意愿","LPR 下调有助于降低企业的融资成本，鼓励创新创业活动","LPR 下调有助于扩大企业的投资规模，创造更多就业机会"],a:0},{q:"下列符合《民法典》的是：",o:["甲向乙借款十万元，并约定该借款合同不受诉讼时效限制","甲与三个儿子口头协商一致，约定甲丧失民事行为能力时，由其二儿子履行监护职责","甲和怀孕的妻子乙在游玩途中发生交通事故，甲不幸离世，乙腹中的胎儿可以继承甲 的遗产","甲租赁乙的房屋进行经营，租赁期限届满，甲与乙的远房亲戚丙均想租赁该房屋，甲 有优先承租该房屋的权利"],a:2},{q:"2024 年 10 月 30 日，神舟十九号载人飞船发射任务取得圆满成功，3 名 航天员顺利进驻中国空间站，与神舟十八号 3 名航天员会师。下列与神十八、神十九有关的 表述，不正确的是：",o:["神十九飞行任务是中国空间站应用与发展阶段第 4 次载人飞行任务，飞船装载体积较 神十八提升了 20%","神十九飞行乘组中有两位“90 后”航天员，至此，“70 后”“80 后”“90 后”齐聚“天 宫”，载人航天精神薪火相传","自神十八起，飞船的主电源储能电池由锂离子电池更改为镉镍电池，其能量密度更高、 稳定性更强，自身质量也更小","神舟载人飞船是我国自行研制的用于天地往返运输人员和物资的载人航天器，达到或 优于国际第三代载人飞船技术，具有完全自主知识产权及鲜明的中国特色"],a:2},{q:"关于矿物及其制品，下列说法错误的是：",o:["稀土并不是一种元素，而是一组金属元素的集合","矿石中可以提取颜料，孔雀石即可提取绿色颜料","石棉具有较高的燃点和耐热性，可用来隔热保温","花岗岩是一种变质岩，硬度低，常用于地面装饰"],a:3},{q:"关于商标权，下列说法正确 产业园区，加强对口合作，加快科研成果落地转化 ③培育新能源、新材料、先进制造、电子信息等战略性新兴产业 ④建设风光火核储一体化能源基地 ⑤逐步弱化央地合作，鼓励各地自主发展新兴产业",o:["2 项","3 项","4 项","5 项"],a:2},{q:"习近平总书记指出，马克思主义是为人民立言、为人民代言的理 论，是为改变人民命运而创立、在人民求解放的实践中丰富和发展的，人民的创造性实践是 马克思主义理论创新的不竭源泉。下列说法与这一论述相符的是： ①人民不仅是物质财富的创造者，也是精神财富的创造者 ②要坚持以理论工作者的首创精神为引领，注重从理论创新中总结实践经验 ③无论是毛泽东思想、中国特色社会主义理论体系，还是习近平新时代特色社会主义思 想，无不源自于人民的智慧、人民的探索、人民的创造 ④各级领导干部身处实践最前沿，对实践变化感知最敏感、感受最深切，也最聪慧",o:["①②","①③","②④","③④"],a:1},{q:"习近平总书记强调，加强党风廉政建设，一体推进不敢腐、不能 腐、不想腐，严格落实中央八项规定精神，督促党员、干部特别是领导干部清廉自守、廉洁 从政、干净做事。根据《中国共产党纪律处分条例》，下列违纪情况属于违反廉洁纪律的是：",o:["在重大原则问题上不同党中央保持一致且有实际言论、行为或者造成不良后果的","拒不执行党组织的分配、调动、交流等决定的","干涉生产经营自主权，致使群众财产遭受较大损失的","滥用职权或者职务上的影响操办婚丧喜庆事宜，造成不良影响的"],a:3},{q:"深化医药卫生体制改革，是进一步全面深化改革的重要任务。关 于深化医药卫生体制改革，下列举措不恰当的是：",o:["促进优质医疗资源扩容下沉和区域均衡布局","加快建设分级诊疗体系，强化基层医疗卫生服务","完善公立医院薪酬制度，严格限制、缩减编制数量","促进医疗、医保、医药协同发展和治理"],a:2},{q:"习近平总书记指出，宣传思想文化工作事关党的前途命运，事关 国家长治久安，事关民族凝聚力和向心力，是一项极端重要的工作。宣传思想文化工作的首 要政治任务是：",o:["培育和践行社会主义核心价值观","用党的创新理论武装全党、教育人民","提升国家文化软实力和中华文化影响力","赓续中华文脉、推动中华优秀传统文化创造性转化和创新性发展"],a:1},{q:"习近平总书记指出：“中国共产党人的理想信念，建立在马克思 主义科学真理的基础之上，建立在马克思主义揭示的人类社会发展规律的基础之上，建立在 为最广大人民谋利益的崇高价值的基础之上。我们坚定，是因为我们追求的是真理。我们坚 定，是因为我们遵循的是规律。我们坚定，是因为我们代表的是最广大人民根本利益。”这 一论述最直接体现了马克思主义的哪一基本观点？",o:["真理尺度与价值尺度的辩证统一","认识世界与改造世界的辩证统一","量变与质变的辩证统一","矛盾的特殊性与普遍性的辩证统一"],a:0},{q:"完善大统战工作格局，是习近平总书记关于做好新时代党的统一 战线工作的重要思想的重要内容，是做好新时代统战工作的重要保障，也是进一步全面深化 改革、为推进中国式现代化凝心聚力的重要举措。下列各项不属于完善大统战格局措施的是：",o:["更好发挥党外人士作用，健全党外代表人士队伍建设制度","制定民族团结进步促进法，健全铸牢中华民族共同体意识制度机制","全面构建亲清政商关系，健全促进非公有制经济健康发展、非公有制经济人士健康成 长工作机制","健全人大议事规则和论证、评估、评议、听证制度"],a:3},{q:"西部地区在全国改革发展稳定大局中举足轻重。要一以贯之抓好 党中央推动西部大开发政策举措的贯彻落实，进一步形成大保护、大开放、高质量发展新格 局。关于新时代推动西部大开发，下列表述不正确的是：",o:["要坚持把全面发展新兴产业作为主攻方向，加快西部地区产业转型升级","要坚持以大开放促进大开发，提高西部地区对内对外开放水平","要坚持统筹发展和安全，提升能源资源等重点领域安全保障能力","要坚持推进新型城镇化和乡村全面振兴有机结合，在发展中保障和改善民生"],a:0},{q:"党的二十届三中全会提出，健全绿色低碳发展机制，实施支持绿 色低碳发展的财税、金融、投资、价格政策和标准体系，发展绿色低碳产业，健全绿色消费 激励机制，促进绿色低碳循环发展经济体系建设。关于健全绿色低碳发展机制，下列举措不 恰当的是：",o:["优化政府绿色采购政策，完善绿色税制","建立碳排放双控向能耗双控全面转型新机制","完善资源总量管理和全面节约制度，健全废弃物循环利用体系","加快规划建设新型能源体系，完善新能源消纳和调控政策措施"],a:1},{q:"完善收入分配制度，构建初次分配、再分配、第三次分配协调配 套的制度体系，是进一步全面深化改革的重要任务。关于完善收入分配制度，下列表述不准 确的是：",o:["提高劳动报酬在初次分配中的比重","完善劳动者工资决定、合理增长、支付保障机制，健全按要素分配政策制度","规范财富积累机制，多渠道增加城乡居民财产性收入","完善税收、社会保障、转移支付等第三次分配调节机制"],a:3},{q:"高质量发展是全面建设社会主义现代化国家的首要任务，金融要 为经济社会发展提供高质量服务。下列与之相关的表述不准确的是：",o:["优化资金供给结构，把更多金融资源用于促进科技创新、绿色发展、传统制造和国有 企业","要着力营造良好的货币金融环境，切实加强对重大战略、重点领域和薄弱环节的优质 金融服务","始终保持货币政策的稳健性，更加注重做好跨周期和逆周期调节，充实货币政策工具 箱","完善机构定位，支持国有大型金融机构做优做强，当好服务实体经济的主力军和维护 金融稳定的压舱石"],a:0},{q:"习近平总书记强调，粮食安全是“国之大者”。下列保障粮食安 全的举措正确的有几项？ ①全面落实粮食安全党政同责，坚持稳面积、增单产两手发力 ②树立大农业观、大食物观，农林牧渔并举，构建多元化食物供给体系 ③加大高标准农田建设投入和管护力度，确保耕地数量有保障、质量有提升 ④扩大粮食领域高水平对外开放，逐步加大国外优质种业资源和海外粮食产品在我国市 场的占有率 ⑤强化科技和改革双轮驱动，加大核心技术攻关力度",o:["2 项","3 项","4 项","5 项"],a:2},{q:"习近平总书记指出，问题是事物矛盾的表现形式，我们强调增强 问题意识、坚持问题导向，就是承认矛盾的普遍性、客观性，就是要善于把认识和化解矛盾 作为打开工作局面的突破口。关于矛盾的普遍性、客观性，下列说法正确的是：",o:["矛盾的普遍性是有条件的，并根据条件的变化而变化","矛盾的客观性从属于主观性，不能脱离人的认知、情感、意志而存在","矛盾的普遍性是矛盾的共性，矛盾的特殊性是矛盾的个性","矛盾的普遍性、客观性决定了事物的不同性质，是认清事物本质和发展规律的基础"],a:2},{q:"习近平总书记指出，要推动各级领导班子认真践行正确政绩观， 切实形成正确工作导向。下列表述与正确政绩观要求相符合的是：",o:["领导干部要树牢竞争优先、力争上游的政绩观","坚持高质量发展，要完善推动高质量发展的政绩考核评价办法","坚持打基础利长远，要注重在做强发展指标、做优发展数据上下功夫","坚持出实招求实效，要大力发展高标准、大气派的工程"],a:1},{q:"完善市场经济基础制度是构建高水平社会主义市场经济体制的重 要内容。下列不属于完善市场经济基础制度内容的是：",o:["完善财政转移支付体系","完善市场信息披露制度","完善市场准入制度","完善产权制度"],a:0},{q:"党的十八大以来，在推进全面从严治党的伟大实践中，我们不断 进行实践探索和理论思考，在毛泽东同志当年给出“让人民来监督政府”的第一个答案基础 上，给出了第二个答案，那就是不断推进党的自我革命。关于深入推进党的自我革命实践， 下列表述不准确的是：",o:["以引领伟大社会革命为根本目的","以跳出历史周期率为战略目标","以解决大党独有难题为主攻方向","以自我监督和法律监督相结合为强大动力"],a:3},{q:"关于马克思主义政治经济学，下列说法正确的是：",o:["商品的价值量是由生产该商品所需的个别劳动时间决定的","货币的价值尺度职能是通过实际的物质交换来实现的","具体劳动和抽象劳动是不同商品生产过程中的不同劳动","具体劳动创造商品的使用价值，抽象劳动形成商品的价值"],a:3},{q:"中国共产党十九届六中全会总结了党的百年奋斗重大成就和历史 经验，将百年历史分为四个时期。下列关于四个历史时期党面临的重要任务表述，正确的有 几项？ ①新民主主义革命时期，党面临的主要任务是反对帝国主义、封建主义、官僚资本主义， 争取民族独立、人民解放，为实现中华民族伟大复兴创造根本社会条件 ②社会主义革命和建设时期，党面临的主要任务是实现从新民主主义到社会主义的转变， 进行社会主义革命，推进社会主义建设，为实现中华民族伟大复兴奠定根本政治前提和制度 基础 ③改革开放和社会主义现代化建设新时期，党面临的主要任务是继续探索中国建设社会 主义的正确道路，解放和发展社会生产力，使人民摆脱贫困、尽快富裕起来，为实现中华民 族伟大复兴提供充满新的活力的体制保证和快速发展的物质条件 ④党的十八大以来，中国特色社会主义进入新时代。党面临的主要任务是实现第一个百 年奋斗目标，开启实现第二个百年奋斗目标新征程，朝着实现中华民族伟大复兴的宏伟目标 继续  万亿元。我国知识产权使用费进出口总额累计 2.19 万亿元，年 均增长 13.7%，其中出口年均增长 31.2%，超过进口增速近 20 个百分点。知识产权有力支撑 了创新型经济、品牌经济、区域特色经济和开放型经济发展。 这段文字旨在说明：",o:["知识产权运用的效益快速增长","知识产权助力优化营商环境","知识产权创新专利的数量上升","知识产权国际合作持续深化"],a:1},{q:"如今，许多人将公共图书馆视为图书借阅室，甚至自习室，而实际上，图 书馆同博物馆、美术馆一样，有文物存藏和展示展览的功能。因为古籍不仅是可供人们阅读 研究的文献，还是必须收藏保护的文物，将古籍等同于一些当代文献，视为普通的“公版书”， 正是忽视了古籍的文物属性。人们常说的“一页宋版一两金”，指的就是珍贵的宋版书。纸 寿千年，绢寿八百，古籍的修复、存藏、复制，每个环节都是颇具难度的“技术活”。目前， 学界公认的解决古籍“藏”与“用”矛盾的重要方式，就是古籍数字化。古籍数字化是文明 传承的必由之路，更是需要徐徐图之的文化工程，需要全社会赋之信心、细心和耐心。 这段文字意在说明（ ）。",o:["现代图书馆具有多重公共功能与属性","应当重视古籍的文化价值和历史价值","古籍数字化工程需要全社会久久为功","要发挥图书馆存藏与展示古籍的功能"],a:3},{q:"司法公正是维护社会公平正义的最后一道防线。党的二十大报告指出， 要规范司法权力运行，不断健全公安机关、检察机关、审判机关、司法行政机关各司其职、 相互配合的体制机制。强化司法活动的规范性，促进司法公正。二十大报告还强调，要把握 好新时代中国特色社会主义思想的世界观和方法论，坚持好、运用好贯穿其中的立场观点方 法，进一步强化对司法活动的制约监督，着力构建与新型审判权力运行机制相适应的规范高 效的制约监督体系，从而坚定不移推进司法公正。 这段文字最适合做下列哪一观点的例证？",o:["建立规范高效的制约监督体系，需要坚定不移推进司法公正","确保司法公正要求公安机关、检察机关等相互配合，不断强化司法活动的规范性","促进司法公正需要高举新时代中国特色社会主义旗帜","规范和监督司法权力运行是确保司法公正的重要条件"],a:1},{q:"西方的历史比较语言学和索绪尔的现代语言学理论在 19 世纪末与 20 世纪初相继进入中国。从此，中国的语言文字历史研究走上了在西方语言学主导下前进的道 路。当然，在这个过程中，我们取得了丰硕的成果，但也一直因“委心远西”“仪型西方” 而深受“西化”模式的困扰。中国语言文字历史研究的综合性，特别是人文性诉求至为突出， 将中国的语言文字历史研究纳入西方语言学的分析体系之中，终究是方枘圆凿、治丝益棼。 这段文字意在说明：",o:["我国语言文字历史研究存在“西化”的弊端","语言学的分析体系需要体现鲜明的人文特性","中国语言文字历史研究应着重凸显本国特质","西方影响下的语言文字历史研究有利也有弊"],a:0},{q:"当技术的进步逐渐拨开传统“战争迷雾”之时，网络和电磁等虚拟空间因 素也给侦察情报带来了相应的挑战。一方面，网络空间的开放互联、庞大的用户群体、被动 的防御特性、未知的安全漏洞，使得网络攻击的隐蔽性不断增强、难以防范。同时，情报的 处理、分发离不开安全稳定的网络支撑。另一方面，战场上的无人化侦察装备种类繁多，特 别是重点区域和要害目标附近，用频装备数量庞大，导致局部电磁拥挤，容易出现频率自扰 现象。而且交战双方极易互相实施电磁干扰和压制，使得无人化侦察装备的稳定运行遭受严 峻考验。 这段文字主要介绍了：",o:["新形势下驱散传统“战争迷雾”的关键","无人化侦察装备升级引发的连锁反应","虚拟空间因素对侦察情报工作的影响","侦察情报技术信息化进程中遭遇的困境"],a:2},{q:"在古法酱坊里，蒸煮过的大豆和面粉拌均匀后，需要到曲房发酵大约 25 个 小时，这时要把混合物翻松一次，否则混合物温度过高会使产生的菌种受影响，进而影响酱 油风味。手工拌曲的过程靠的是师傅们极具敏感度的双手，师傅们凭借丰富的经验让每粒豆 都能均匀地与面粉糅合。在酱油工坊的曲房内，较高的温度与湿度能够保证大豆最适合的发 酵条件，如今工坊虽已采用温度计和湿度计来提高监测的准确性，但酿造师傅的经验依然不 可缺少，迈进曲房时，经验丰富的师傅就能敏锐地感知曲房的温度和湿度是否适宜。 这段文字意在强调：",o:["古法酱油酿造依然要靠老师傅经验的判断","温度和湿度是酱油工坊制曲室的关键因素","时间把握是制作上佳风味酱油的前提条件","古法酱坊手工制曲靠的是老师傅们的手感"],a:3},{q:"汗水在细菌的分解下产生乳酸、尿素和其他物质，更容易吸引蚊子。 除此之外，运动后的人、孕妇、儿童等呼吸频率较快的人，在呼吸时会产生更多的二氧化碳， 即他们周围的二氧化碳浓度相对较高，因此更容易吸引蚊子。另外，美国和赞比亚科研人员 进行的一项实验显示，人体散发的气味分子可吸引蚊子从几十米外追踪而至，不同“配方” 的气味对蚊子的吸引力大不相同。与此同时，蚊子还有自己偏爱的颜色。研究人员发现，蚊 子喜欢红色、橙色、黑色等颜色，却容易忽略绿色、蓝色、紫色等颜色。要想避免被蚊子“叮” 上，也可以考虑换换衣服的颜色。 这段文字针对的主要问题是：",o:["蚊子是如何确定它们的攻击对象的","炎炎夏日如何避免被蚊子叮咬","蚊子选择叮咬对象有偏好吗","二氧化碳可以让蚊子“看”到人类"],a:2},{q:"语文素养和语言能力的提高，不是靠学理论所能达到的，更没有什么捷径 可走，唯一的办法就是要多读书、读好书、勤于写作，有的名篇名段需要适度背诵。这是古 人留给我们培养孩子语文素养和能力的有益经验。阅读能让孩子不断提高语言能力、思维能 力，获得心灵滋养，打开丰富多彩世界的大门。 这段文字意在强调：",o:["学好语文是学好一切的根本","语文素养的提高无捷径可走","学好语文的关键在于写作和背诵","阅读对于提升语言能力的重要性"],a:0},{q:"老字号是数百年商业和手工业竞争中留下的宝贵遗产，具有鲜明的民 族文化背景，拥有世代相承的独特工艺或经营特色，是珍贵的自主品牌，品牌价值无可替代。 老字号在品牌保护过程中，既需要对传统的技艺、技术、流程、营销渠道、经营管理等特色 进行传承与保护，也需要根据技术、社会与时代的变更，进行多方面的创新，以适应新的形 势变化。坚守品牌特色，坚守“老”的品质，而又有所创新，这是老字号品牌保护的重要方 面。 文段意在说明：",o:["老字号品牌保护需要坚持品质注重创新","老字号品牌保护要实现传承与创新的联动","老字号品牌保护应坚守自身的品牌特色","老字号品牌保护必须挖掘好自身的内涵"],a:3},{q:"从微观的动力学角度看，水结冰是一种结晶现象，结晶首先需要有凝 结核，然后凝结核不断长大，最终长成大块晶体。结晶速率主要受到两个因素的影响：成核 速率和生长速率。流动的水中，质点不容易聚集，成核困难；受水流作用，水分子在凝结核 表面比较难长时间停留，晶体生长速率变缓。从宏观上考虑，流动的水一般都是紊流，不是 层流，因此水流下方温度比较高的水会到表层来，那么，就需要带走更多热量才能让表层的 水结冰，这也会使得流动的水更难结冰。 这段文字意在：",o:["从热量方面介绍水难成冰的原理","说明流动的水更加难以凝结成冰","分析影响水凝结成冰的诸多因素","强调流动的水结冰时散热要更多"],a:2},{q:"艺术家和艺术的成长需要经历漫长的过程，这其中揉进了时光沉淀和情感 累积，艺术品更大的价值来源于其背后沧桑岁月里的人的魅力。从技术角度看，肌理、笔触、 效果等画面元素或许能被技术替代，但从画家的生平、阅历、思想情感、艺术追求等角度看， 没有任何生活阅历、情绪和自我认知的机器，是否同样可以自由创作艺术品，实际上取决于 一个大前提，即：人工智能想要取代人类的艺术创作，则必须要取代人类自身，首先成为社 会生活的主宰。 作者要强调的是：",o:["人工智能在艺术创作领域尚不能取代人类","艺术家和艺术的成长需要漫长的沉淀和积累","缺乏生活阅历的人工智能无法自由创作艺术品","人工智能主宰社会生活就能取代人类艺术创作"],a:0},{q:"对于古希腊人来说，各种形式和内容的比赛活动无所不在，凡是有竞赛的 地方就有规则的存在。体育比赛有严格和严密的竞赛规则，裁判员在赛场上依据规则来进行 判罚，只有如此才能产生没有任何争议的优胜者。这些活动的背后，如何用好的规则引导竞 争，规范竞争，使人向善，使社会更为公正，是古希腊思想家们热衷探讨的话题。 这段文字意在说明：",o:["古希腊人强调竞争中规则的重要性","公平是古希腊思想家们持续关注的话题","遵守规则是古希腊体育比赛的核心理念","严密的规则才能实现社会的公正"],a:1},{q:"传统文化中生态伦理思想有助于人们树立节约资源、保护环境的意识，选 择适度的消费方式。儒家的“取之有度，用之有节”思想和道家的“知足去奢”思想，告诫 人类应当克制自身欲望，珍惜、节约资源，既考虑到当前，也应该考虑到未来；引导人们树 立正确合理的消费理念，更加注重环境、资源在代际之间的公正分配，给自然留下更多的修 复空间，给子孙留下地绿、天蓝、水净的生存环境。这一思想与当今社会存在的享乐主义、 消费主义思潮是针锋相对的。 这段文字主要谈论的是：",o:["生态伦理思想的传统文化渊源","生态伦理思想对消费理念的影响","传统文化中生态伦理思想的当代价值","儒家与道家在生态伦理方面的相同之处"],a:0},{q:"药品集中采购，降价减负只是基础，如何保障患者能够及时用上药， 享受到集采红利，才是关键。一款新药好药，只有运用到医疗临床实践中，才能确保患者受 益。一方面，要继续在相关政策法规的要求下，强化中选产品的供应保障；另一方面，还要 提升药品的配送能力，尤其是调配和“替补”供应机制。而对于医疗机构端来说，相关部门 需畅通其优先配备使用的政策通道，优化医疗机构使用集采中选药品的考核评价方式。 这段文字意在说明：",o:["多措并举保障患者及时用上集采药品","如何让药品及时高效地送到患者手中","让集采政策的红利扎扎实实惠及群众","综合施策不断完善集采药品的供应端"],a:0},{q:"除了探矿队员，很多矿石收藏家也对铀矿石感兴趣，因为它们实在太漂亮 了。然而学过物理、化学的人都知道，不管化学上结合成什么物质，铀元素的放射性都是不 会变的。那么把含铀的“毒花”放在博物馆甚至家里，真的没事吗？实际上，只要隔着一层 玻璃，这些铀矿石就算放在卧室里都伤不了人，因为它们所含的铀，几乎全是放射性较弱的 铀-238（俗称“贫铀”），只有极少量是用于制造核弹头的同位素铀-235。不过千万不要吸 入它的粉尘，因为哪怕它所放出的最弱的α射线，也会造成辐射伤害。 这段文字意在说明：",o:["铀矿石为什么应该保存在玻璃柜中","铀矿石作为矿石收藏是比较安全的","铀-238 与同位素铀-235 有本质不同","粉尘态铀矿石的放射性会大大增强"],a:3},{q:"广义地讲，只要如实记录身边的人与事、景与物，都属于纪实摄影，它们 虽然较为零散、碎片化，但拍摄者和存世数量巨大，蕴藏着丰富的社会生活信息。在专业摄 影领域，很多摄影师通过深度采访与调研，全面、系统、生动地进行图文记录与展示，大大 地拓展了纪实摄影的概念、范畴和价值。当今时代，人人都是摄影师，拍摄传播便利及时， 为时代造像的广度和深度得到了空前的拓展，摄影的价值渐趋超越其本体意义，成为厚重的 人文、社会、历史价值的视觉承载。 这段文字意在说明：",o:["人人都是摄影师的时代已经来临","纪实摄影是对现实社会的生动记录","摄影反映时代的深度和宽度日益拓展","纪实摄影承载着厚重的人文和社会价值"],a:0},{q:"社会信用体系建设是一个系统性工程。从政府的角度来看，除了要从 顶层设计层面加强谋划，还要更好发挥“有形之手”的作用，在组织协调、示范引领、监督 管理方面下更大功夫，既要立足当下解决好信用体系建设的突出问题，更要着眼长远建立法 治化、规范化的长效机制。从市场主体的角度来看，要充分发挥征信市场积极作用，鼓励创 新信用融资服务和产品，强化市场信用约束，使诚实守信成为市场运行的价值导向和各类主 体的自觉追求。从个人角度来看，每个人都是诚信文化的建设者、受益者，必须依法推进个 人诚信建设，推动形成崇尚诚信、践行诚信的良好风尚。 这段文字意在说明：",o:["社会信用体系建设是一个系统性工程任重而道远","系统推进社会信用体系建设离不开“有形之手”","政府、市场、个人共同助力诚信文化的弘扬传播","多措并举形成推进社会信用体系建设的发展合力"],a:3},{q:"南极的环境变化很大，同一区域的不同年份或者同一年份不同的区域环境 差异都很大，所以需要进行监测。在此之前，人们已经可以通过企鹅、海豹和海鸟的数量变 化来监测南极环境。而关于磷虾复眼直径与体长比率关系变化的发现，使人们可以通过这些 大型动物的饵料——磷虾的生长状况来反演南大洋的环境变化，从而更容易推断出整个南极 生态系统的健康状态。同时，人们还可以通过环绕南大洋进行磷虾生长状态的测定来了解南 大洋不同扇区的环境差异，通过长期观测来监测南大洋海洋环境的年际变化。 这段文字意在说明：",o:["南大洋海洋环境差异十分巨大","可利用南极磷虾了解南大洋环境信息","通过南极磷虾监测南大洋环境很便利","南极环境变化大影响到当地动物生存"],a:1},{q:"就地域差异来说，城市里的课外美育机构看似热闹，但缺乏系统教育 体系，师资及教学质量参差不齐。而基于经济发展不平衡的客观现实，个别地区特别是乡村 儿童的家庭美育和社会美育尚处于比较匮乏的状态。从家庭层面来看，美育功利化也是当前 我国儿童美育的典型症候。儿童往往四五岁时就被家长送去学习艺术，虽然幼儿时期是艺术 启蒙的最好时期，但家长们普遍存在功利心态，大多希望孩子通过艺术考级助力升学，对美 育陶冶情操、涵养性情的价值意识不足。 这段文字意在说明：",o:["课外美育机构缺乏系统教育且过于功利","我国儿童美育发展至今仍存在诸多问题","城市和乡村的美育教学存在不同的困难","应努力为儿童提供更为完善的美育资源"],a:3},{q:"面对中西方文明比较与交流的全球化语境，中华民族的伟大复兴离不 开中国式现代化的实现。但在有关现代化的世界话语体系中，“西方现代性”曾垄断了现代 化的定义，西方现代化甚至被直接等同于唯一模式。因此，只有反思西方范式，确立自身在 全球格局中的主体性位置，才能以中国式现代化赋予“中国现代性”，实现“现代性”话语 体系的重释和改写。在此过程中，国家与人民都正在经历“何为中国”的思考，“我是谁” 的追问反映着当代中国社会渴望巩固文化主体性，凝聚身份认同的集体心态与共同情感诉求。 而优秀传统文化是中华民族的“根”和“魂”，是区分“他者”与“自我”以及获得主体性 与认同感的重要方式。 这段文字意在强调：",o:["应以中国式现代化推进中华民族伟大复兴","巩固中国文化主体性才能发扬优秀传统文化","优秀传统文化是确立中国文化主体性的切入点","确立中国的主体性地位有助于实现中国式现代化"],a:1},{q:"恐龙胚胎化石“英良贝贝”，是迄今为止发现的最完整的恐龙胚胎。该胚 胎被认为属于一种非鸟类兽脚类恐龙——窃蛋龙。胚胎以一种奇怪的姿势蜷缩在蛋壳内。此 姿势从未在恐龙胚胎中发现，反倒是现代鸟类胚胎的常见姿势。现代鸟类的胚胎会在孵化后 期经历预折叠、折叠、后折叠 3 个阶段，而“英良贝贝”的姿势相当于处在“预折叠”阶段。 研究人员推断，这种先前被认为是鸟类特有的预孵化行为，可能起源于几千万年甚至上亿年 前的兽脚类恐龙。 这段文字意在强调：",o:["“英良贝贝”的胚胎姿势在已知的恐龙胚胎中是独一无二的","现代鸟类的许多特征最初是从兽脚类恐龙祖先身上演化来的","孵蛋姿势同现代鸟类相似，证明恐龙存在孵化抚育后代行为","姿势奇特的胚胎为恐龙与现代鸟类之间的联结提供了新线索"],a:3},{q:"作为经典的艺术门类，绘画在历史长河中并非独立发展。在原始艺术中， 音乐、诗歌、舞蹈三位一体，密不可分，绘画则将载歌载舞的场景留存于世。不同艺术门类 成熟之后各自独立，但在发展的过程中又相互吸收、相互依托、相互影响。各艺术门类之间 的吸收与借鉴、配合与结合，是艺术发展创新的重要手段。古典名画是人类审美情趣的集中 体现，很长一段时间是深藏在博物馆中的高雅艺术，名画想要真正“活”化，还需要借助跨 界融合。 这段文字意在强调：",o:["绘画是诗歌和舞蹈传承的重要载体","不同艺术门类的跨界融合由来已久","古典名画可以借助跨界融合重焕生机","打破形式壁垒是艺术创新的重要手段"],a:2},{q:"南朝文学批评家钟嵘在《诗品》中评论晋人刘琨的作品“善为凄戾之词， 自有清拔之气。琨既体良才，又罹厄运，故善叙丧乱，多感恨之词”。这是用刘琨罹逢厄运 的经历，来解释其诗作何以多感慨悲愤之词。当代的文学评论家更是自觉地运用这种方法考 察作品。某位研究清末小说《孽海花》的学者曾说，要理解这部作品，就要“知人论世”， 有必要探索曾朴的生活、思想历程与创作过程。可知，“知人论世”是他研究《孽海花》的 重要方法。 这段文字意在说明：",o:["“知人论世”历来是重要的文学研究方法","作家的经历会对作品产生深刻的影响","“知人论世”被奉为古代作品研究的圭臬","当代学者继承了中国古人的文学研究模式"],a:0},{q:"当前，我国粮食安全形势总体较好，粮食安全保障水平显著提升。同 时也要清醒认识到，我国粮食安全基础仍不稳固，粮食供求在中长期仍是紧平衡态势。经国 利民，法是重器。新形势下保障粮食安全，既需要行政手段引导、经济手段调控，还需要法 治手段护航。一方面，要把近年来实践中保障粮食安全的有益经验做法，以制度和法律的形 式固化下来、推广开来；另一方面，要坚持问题导向，筑牢保障粮食安全的法治屏障，着力 应对和化解粮食安全面临的各种风险挑战。不断提升粮食安全保障的法治化水平，这不仅是 实施国家粮食安全战略的必然要求，而且是推进全面依法治国的题中应有之义。 作者通过这段文字想说的是：",o:["应提升粮食安全法制化水平","以法律的形式固化有益经验","以法治方式保障好粮食安全","健全粮食安全保障制度体系"],a:3},{q:"当前，经济社会发展中各种错综复杂的关系交织，社会行为模式多元， 人民群众权利意识增强。作为守护公平正义的审判机关，人民法院不仅要办好案，还要把对 当下社会关系中是与非、对与错的价值判断传导至全社会，营造公正、和谐的社会氛围，这 是司法机关的社会责任，更是政治责任。在新的发展阶段，人民法院依法能动履职，关键是 要以问题为导向，紧扣依法能动履职工作中发现的难点重点、薄弱环节，有的放矢，重点突 破，用成果实效彰显人民法院在中国式现代化新征程中的政治担当和法治担当。 这段文字表达的主要观点是：",o:["新时代人民法院的政治责任","人民法院如何依法能动履职","人民法院能动履职的重要意义","社会发展带给司法工作的挑战"],a:2},{q:"近年来，以经典重生为主线的怀旧音乐综艺扎堆亮相，让很多人在歌声中 回忆往昔，也让部分年轻观众初听老歌时惊为天人，从此进入到听歌的“考古”岁月。如今 的年轻人成长在网络时代，在海量歌单的冲击下，对唱片和专辑已经很陌生了。此时，经典 老歌通过怀旧音乐综艺重新进入大众曲库，让不少年轻人开始追寻二十世纪八九十年代甚至 更早的歌曲。这几年，经典的滚石、宝丽金时代的老歌，越来越被年轻歌迷所认识和了解。 这段文字主要介绍：",o:["唱片和专辑对于年轻歌迷来说非常陌生","怀旧音乐综艺进入听歌的“考古”岁月","年轻歌迷追寻二十世纪八九十年代的歌曲","经典老歌越来越被年轻歌迷所认识了解"],a:2},{q:"未来，如何进一步做大做优中国产业数字化？首先，要在基础技术上 实现突破。当前，我国在这些领域依旧存在技术自主化短板，因此要增强对自主性关键技术 的研发，加大知识产权保护力度、促进产学研用融合。其次，要充分发挥企业家的创新精神， 营造宽松包容的数字技术融合发展的外部环境。数字应用创新要更多和企业实际需求相结合， 应用深度要继续加大，同时，要利用好产业示范效应，可以通过建立“灯塔工厂”、数智化 标杆企业范例等方式，打造一批产业数字化转型的典型案例。推动中国产业数字化再建新功， 也离不开符合数字中国建设规划方向、符合数实融合的数字化转型政策环境的有力支持。 从这段文字中提取的关键词最恰当的一项是：",o:["技术研发 示范效应 政策支持","技术突破 创新精神 政策支持","技术研发 创新精神 示范效应","技术突破 示范效应 政策环境"],a:0},{q:"近年来，我国高度重视制造业智能化机器人产业发展，制定了机器人 产业发展规划，大力支持人工智能领域的研发创新，从而推动移动机器人技术与移动互联网、 大数据处理等技术融合应用。当前，移动机器人技术已达到可批量应用的时间窗口，正广泛 应用于工业场景，而工业智能化提速也带动了移动机器人产业快速发展。据工信部数据显示， 我国移动机器人核心产业规模超过 4000 亿元，企业数量超过 3000 家。另据统计，2021 年 我国移动机器人的出货量占到全球的 40%，年产销量保持高速增长。 文段意在说明：",o:["移动机器人在工业应用中优势明显","我国移动机器人技术居世界领先地位","我国发展移动机器人已具备良好基础","我国应重视智能机器人的产业发展"],a:1},{q:"城市发展的本质是人类对自然环境占有和改造的过程，也是人类对自身赖 以生存的自然生态环境的认识与适应过程。无论是过去、现在还是未来，城市的发展质量在 很大程度上不仅取决于人类对城市的认知和定位，更取决于城市的规划和建设理念。随着全 球城市化加速发展和城市病日益突出，探索出未来可持续发展城市模式，成为一个时代命题。 这段文字意在说明：",o:["城市发展质量取决于其管理理念","城市发展过程中应注重环境保护","现代城市发展模式有待转型升级","全球城市化凸显了城市病的危害"],a:1},{q:"为了确保冰块的卫生和安全，国家规定，制冰用水应该是经过消毒的 安全的饮用水。然而，并非每个商家都舍得花金钱和时间去选用合格的制冰水。如果制冰水 中本来就有微生物，那么制出的冰细菌总数超标、有致病菌或病毒的概率就很大。制冰机外 观和内部如果没有按规定开展定期清洗和消毒，也很容易藏污纳垢。同时，很多商家为了方 便取用，存放冰块的容器往往是敞口，这就大大增加了被细菌和其他微生物，甚至蟑螂蚊蝇 等污染的风险。运输冰块的容器、取冰的冰铲若存放不当，或没有及时清洗消毒，也很容易 将污染物带入到冰块中。 这段文字意在强调：",o:["商家忽视制冰用水安全性的危害","应增强安全意识，少喝含冰饮料","商家应定期清洗和消毒制冰工具","冰块污染背后的多种经营者因素"],a:2},{q:"大家知道，我们常见的小贝壳通常是开口向下，可以通过肌肉移动。但砗 磲一般都是开口向上固定在珊瑚礁盘上，一辈子都不会移动。这个固定不动的特征对于我们 做古天气研究非常重要。如果砗磲不停地移动，那么所记录的气候环境信息就会随位置的改 变而受到干扰。好在砗磲一辈子不移动，就像一个海洋气象站一样，在同一个位置不停地记 录周边的海洋、天气、气候信息，简直就是天生的“地质气象站”。 这段文字旨在说明：",o:["砗磲进化出了一种极为罕见的生物特性","利用砗磲可以进行气候历史的理论研究","砗磲是一种非常理想的古天气研究载体","砗磲化石中留存着古代天气变化的秘密"],a:0},{q:"如今，越来越多的专家、教授在年轻人喜爱的视频平台上开课，一大 批教授和他们的视频课程在网上走红，甚至成为“爆款”，这与人们印象中专家、教授正襟 危坐的授课形象相去甚远，引起了许多人的质疑。毋庸讳言，视频网站尤其是短视频平台上 的知识大都带有碎片化特征。不过，化整为零本就是知识传递的普遍方式，也符合知识延续 的一般规律。我们对专业知识的掌握一般都要经历从一砖一瓦到搭建起“高楼大厦”的过程。 从这个角度来说，教授在视频网站“出圈”，同样是在履行知识布道者的职责。 这段文字重点强调：",o:["网络视频平台，同样可成为知识的“布道场”","教授纷纷“出圈”，网络课程也可“传道授业”","专家入驻网络视频平台，打造“爆款”课程","知识的积累不可急功近利，更需“聚沙成塔”"],a:1},{q:"美学经济时代，伴随着消费需求与消费体验的不断升级，以美学价值为核 心的生产要素在产品的价值生产、企业的品牌建设以及产业价值链的提升中发挥着越来越重 要的作用。电影产业作为当前经济中吸附资本能力最强、生产时效最快、引爆审美迭代和文 化价值翻新变异的内容产业，对产业升级和经济增长的重要性不言而喻。电影是当代新文化、 新时尚、新美感、新神话、新观念的重要策源地，牢牢占据着内容产业的头部位置，既对社 会整体风尚与价值发挥引领作用，也会优化赋能全经济产业链。 这段文字意在说明：",o:["电影产业长期处于内容产业的龙头位置","电影对中国产业的转型升级具有重要推动作用","电影产业的发展引领着美学经济时代的整体风尚","美学经济时代以价值为核心的生产要素愈发重要"],a:2},{q:"“充电”方式千千万，在网上付费学习课程、获取知识成为近年来 不少人的选择。尤其伴随着直播平台的兴起，知识分享这把火烧得更旺了。事实上，知识分 享的盛行并不仅仅因为它提供了人们所需的知识。一些人为知识买单，也是为生活、事业上 的迷茫以及如何去应对它们而买单，通过更高效的学习为自己求得一颗“定心丸”。此外， 当身边有朋友在观摩、学习付费课程时，一些人也会担心自己是否会落伍或无法融入圈子， 这种焦虑促使他们寻找突破口，选择加入其中。 文段意在说明人们加入知识付费课程是因为这一课程能够：",o:["实现知识迁移","节约学习时间","满足生活需求","提供情绪价值"],a:0},{q:"当前，实体经济与数字经济深度融合，数字产业化与产业数字化加速 推进。对劳动者来说，必须提升数字素养和技能，才能适应数字经济发展的步伐，提升人力 资本水平。同时，数字技术也广泛地应用到社会生活和文化消费中，尤其是智能手机的普及， 为数字化交往和数字化消费的推广创造了条件。以网络购物、网络娱乐、在线医疗等为代表 的数字消费迅猛发展，也催生了新的消费方式和消费习惯。对于消费者来说，只有提升数字 素养和技能，才能尽享数字经济时代的便利。 对这段文字概括恰当的一项是：",o:["消费者提升数字素养和技能是适应数字社会的必要条件","提升数字素养和技能对供给端和需求端都非常重要","提升数字素养和技能是促进数字经济发展的不二法门","消费者应顺应趋势及时提升素质、不断升级技能"],a:3},{q:"综观自然界里的动物和植物，蓝色是一种极其罕见的颜色，我们吃的食物 几乎没有蓝色的。在 18 世纪初普鲁士蓝（即亚铁氰化铁）被意外发明之前，蓝色颜料一直 难以获得。当时画家笔下那种鲜艳、饱和的蓝色，主要来自一种名贵的矿石——阿富汗青金 石。青金石研磨成粉，可以调制出稳定的蓝色颜料“群青”。这些宝贵的石头通过丝绸之路， 从中亚流向欧洲和中国，成为画家笔下神秘绚烂的一抹异色。在莫高窟的壁画中，我们便可 以找到这种蓝色。因为珍稀罕见，青金石在市面上流通的价格一度比黄金还要昂贵几倍。 这段文字主要介绍：",o:["自然界中蓝色极其罕见的原因","古代绘画中所使用的蓝色颜料","青金石在莫高窟壁画中的使用情况","丝绸之路对中西方文化交流的影响"],a:3},{q:"日常生活中，我们每天早上都会“照镜子”，这是我们形成躯体自我认知 的重要方式，我们也最习惯看到镜子中的自己。殊不知，基于平面镜成像原理，镜子中的影 像是左右颠倒的，我们在镜子中看到的永远是左右脸对调后的自己。而拍摄的照片以及他人 眼中的你，则是没有经过左右脸对调的。进一步说，我们在照片中看到的自我形象，与大脑 内储存的、最习惯看到的自我形象是左右颠倒的，所以当我们最初看到自己的照片时，会不 由自主地对比脑中的自己与照片中的自己，这种差异会让我们产生一种失调感；而这种感觉 身边人则不会有，因为照片中我们的影像与平时他们眼中的是一致的。 这段文字主要介绍的是：",o:["人最陌生的反而是自己的脸","心理因素也易促使照片失真","为何照片里的自己与镜子里的不同","自我认知方式决定了个人的审美观"],a:1},{q:"专家身份不仅意味着一个人具备专门的知识和技能，更意味着他人承认其 可信性和权威性。专家若想具有说服力，必须善用自己掌握的知识和技能，“善用”即是指 在正确的时间，以正确的方式，朝向正确的目标。只有审慎行动、保持善意，专家才能有效 地应用技术性知识。 这段文字意在强调：",o:["专家要有效地应用技术性知识","对专家的不信任和质疑很常见","专家的可信度来自知识与善意","人们应以批判性思维对待专家"],a:3},{q:"在社会文化的变革中，如果要创新，就必须要有新的思维，必须突破原有 的观念体系和知识框架，必须要对社会已经蔓延的“常识”进行反思和批判。这里的“常识”， 指既定的思想框架和方法路径。尽管这种思想框架和方法路径可能是人类智慧和实践的一种 积累，但是随着历史的发展，它很可能又变成了一种枷锁，限制和捆绑着人们的创造力。我 们的反思、修正、突破和创新，都需要不断地去做各种各样的尝试。 这段文字意在强调：",o:["“常识”容易让人墨守成规","要创新就必须突破“常识”","突破和创新需要大胆尝试","要警惕“常识”的负面影响"],a:1},{q:"多年来，很多地方将促进残疾人就业再就业作为“服务残疾人，为残 疾人办实事”的首要任务来抓，通过加强与用工企业沟通，寻求增加残疾人就业机会，同时 加强残疾人就业技能培训力度，提高残疾人就业创业能力，并对未就业残疾人情况开展摸底 调查，有针对性地提供就业服务。此外，还鼓励残疾人自主创业，促进残疾人实现个体就业。 不过，残疾人就业的现实状况和我们的预期仍存在一定的差距。比如，在一些地区高中及职 业教育的发展程度仍难以很好满足这个群体的学习需求，心智障碍者融合就业率仍偏低，残 疾人大学生就业仍难以获得公平的机会等。 这段文字意在说明：",o:["残疾人培训及学习需求尚未全面满足","残疾人就业服务应当进一步加强","亟须健全残疾人就业的服务体系","企业需提供更多资源确保残疾人就业"],a:3},{q:"当前，城市越来越像一台精密的仪器，任何一个没有拧紧的螺丝钉， 都可能引发系统性问题，可谓“牵一发而动全身”。没有城市规划、设计、建设、运行等各 个环节强化标准，没有城市管理各个部门之间统筹协调，安全的目标就难以真正实现。然而， 少数地方还停留在头痛医头、脚痛医脚阶段，往往是“按下葫芦浮起瓢”；有的在治理实践 中条块分割、各自为政，“各人自扫门前雪”。 下列选项中最符合作者观点的是:",o:["当代城市要讲求治理的精细化","城市安全管理需要系统性思维","城市管理需要多部门通力协作","城市治理需要多环节统筹监管"],a:0},{q:"后现代主义作为一种非主流意识形态，认为经过理性启蒙的世界，并 没有实现理性的许诺和人类美好生活的理想，反而带来了人的异化、物欲横流、道德信仰缺 失和思想意识禁锢等问题，而绝对理性的统治是造成这些现代性危机的罪魁祸首。为此，后 现代主义抨击一切价值标准和道德说教，否定人作为价值主体所具有的道德观念、承担的社 会责任和遵守的社会价值规范，鼓励通过加强人的个性化和生活方式的多样化，来实现对现 代性的超越。后现代主义对理性的批判，对差异、多元和个性的强调，有利于人们摆脱工具 理性的束缚，促进个性的解放、个体意识的培育和个人的成长。但是，由于后现代主义忽视 价值理性的现存意义，夸大工具理性的负面效应，从而容易诱导人们放弃理想信念、价值规 范和责任担当，导致玩世不恭和自暴自弃的行为方式的蔓延，并最终走向主流意识形态的对 立面。 这段文字意在说明：",o:["价值理性和工具理性是人类理性不可分割的重要方面，不应被忽视","绝对理性的统治是道德信仰缺失和思想意识禁锢等现代危机的根源","后现代主义思潮对理性主义的批判容易造成对主流意识形态的冲击","应当区别对待后现代主义的受众，积极应对其可能带来的负面影响"],a:1},{q:"瑞典厨师发现，浅蓝色的餐布作为对比色，更加凸显橙色和黄色，能使 菜肴看起来没有那么咸，增加咖喱和鸡蛋的香味；而珊瑚色能减少葡萄柚等食材的苦味，让 其尝起来更甜；粉色和玫瑰红色搭配甜点，使食物尝起来更香甜。利用餐布颜色互补的优势 搭配菜肴，这种方法简单、有创意，还能为食物锦上添花。 这段文字意在说明：",o:["国外餐饮重视运用色彩","餐布的颜色会影响味觉","要注重不同食材的色彩搭配","利用色彩互补能影响用餐者心情"],a:2},{q:"人类文明发轫初期，原始记事技术的发明引发了人类新的思维方式， 人们对宇宙、人生的认知和理解得以稳定地储存和有序地传播，改变了口耳相传时代人类创 造文化的不确定性和随意性。工业革命以后，机械复制技术的普及使文学艺术生产从“量变” 飞跃到“质变”，引发了人类对审美、创造、接受等态度的根本转变，推动了新文化艺术形 态的出现。如今，数字技术、互联网、AR/VR 技术的应用，突破了文化艺术生产、体验和消 费的时空限制，再次颠覆了文化艺术的生产、储存与流转体系。数字时代，文化的丰富性、 链接性、公共性等特征，正激发生成与传统文化环境全然不同的文化结构和生态系统。 这段文字意在说明：",o:["技术推动了文化艺术生产、传播方式的变革","数字时代文化生态体系发生了颠覆性的变化","文学艺术发展得益于人类文明的整体性进步","应不断重塑文化环境以适应文化的飞速发展"],a:2},{q:"在传统基层治理中，缺乏社会组织、市场等各主体的共同参与、质询和监 督，必然导致政府公共服务能力下降、权力垄断和滥用等问题，容易弱化公众信任程度，引 发社会信任危机。区块链技术基于去中介信任机制、共识机制、协调共享机制，适用于多环 节、多方协同参与且互不信任的场景。而信任是多元主体进行基层协同治理和互信规则建构 的合作基础，区块链的算法信任机制与基层社会治理“公共性+信任”的价值追求相契合。 借助区块链技术可以促进治理生态中双边信任向多边信任及社会公信的转变，突破传统国家 治理体系所形成的认知固化和思维僵化。 这段文字意在强调：",o:["健全信任机制是基层协同治理的条件","区块链技术有助于推进基层治理改革","区块链技术的应用能够提升政府公信力","治理生态离不开多元社会主体间的协作"],a:1},{q:"距今 200 万~100 万年前，在类人猿向现代智人进化期间，人类祖先的大脑 就进化出了支持合作的功能，以支持狩猎活动。这使人类祖先前额皮层里的记忆与思考中心 变得比其他灵长类动物的更发达。随着群体变得比个体更强大，大脑不断进化出管理更大群 体的能力，群体之间的竞争就变得比个体之间的竞争更重要，同时拥有更多合作性个体的群 体发展得更好，这一进化使得利他意识、伦理观、良知和尊严意识发展起来。 这段文字意在说明：",o:["人类祖先的狩猎活动离不开群体的合作","大脑在群体生活中的进化可以激发美德","大脑的构造会因生活方式的变化而演化","群体发展取决于拥有合作性个体的数量"],a:2},{q:"当前，在发展格局的重要影响下，要实现我国零售业的高质量发展，就要 发展线上和线下共同融合的多元立体零售模式，同时要重视新零售供应链生态圈的建设。电 商平台企业除了整合上下游供应链合作伙伴、金融、服务及行业资源，朝着“有边界又无边 界”的商业生态圈发展，还需要通过线上线下双渠道的协同联动实现持续发展的商业生态布 局；商业企业要打破地域的空间限制，改变单一的店铺销售模式，积极借助数字化改造及建 设的工具为“新零售”赋能，最终构建“多元要素协同”的“新零售”供应链生态圈。 这段文字重在说明：",o:["“新零售”供应链的特征及潜能","“新零售”供应链生态圈多维服务","“新零售”供应链生态圈的协同逻辑","“新零售”供应链生态圈的创新与竞争"],a:1},{q:"古城经济不可能像新城区的楼宇经济那样产出大，也不会像开发区的 规模经济那样气势足，古城经济就是服务居民和游客的草根经济，有其自身的发展规律。若 能充分依托区位优势、发挥聪明才智、因地制宜发展，那么，店不论大小、业不分高低，能 过得好就是好样的。但其实，古城经济发展具有阶段性。现存的业态解决了有与无的初级问 题，而古城产业振兴则是奔着业态好与更好的追求而来的。只有认真研究产业振兴规律，抓 住产业振兴关键，持之以恒抓下去，才会大见成效。 这段文字意在说明：",o:["应该持之以恒研究产业振兴规律","正确认识古城经济发展的阶段性","坚持做好古城产业振兴规律研究","古城发展应该依托优势因地制宜"],a:0},{q:"研究人员耗时 2 年在圣诞岛周围的珊瑚礁进行调查，在热浪袭来和减弱 时，分别对两种常见珊瑚的藻类共生体进行 6 次采样。从某一时间节点开始，2 个月内气温 上升约 1℃。正如预期的那样，拥有热敏感藻类的珊瑚比拥有耐热藻类的珊瑚更快白化。随 着海水持续变暖，甚至连耐热的藻类也被珊瑚排出体外。但圣诞岛上的这两种珊瑚在海水仍 然异常温暖的情况下从白化中恢复了过来。此前，海洋生物学家发现只有海水冷却到正常温 度后，白化珊瑚才能恢复。而圣诞岛珊瑚的意外复苏则意味着即使在长时间热浪中，其中一 些珊瑚还是有救的。 研究人员最主要的实验目的是：",o:["探索珊瑚对海水温度变化的敏感度","研究珊瑚在长期热浪中的生存能力","讨论海水水质对珊瑚生存的影响","调查白化珊瑚如何重新恢复活力 细节判断题"],a:3},{q:"织纹螺主要分布于中国东南沿海，一般生活在近海礁石附近和泥沙底，自 身并不产毒，其毒素来源于摄入的带毒海藻。织纹螺使人中毒的毒素主要是麻痹性贝类毒素， 其中的石房蛤毒素是已知毒性最强的海洋生物毒素之一，它通过阻断神经细胞膜中的钠通道 而引起麻痹，毒性是眼镜蛇毒的 80 倍；另外还有河豚毒素，这是自然界发现的毒性最强的 神经毒素之一，其毒性比氰化钠还强 1000 多倍，0.5 毫克即可致人死亡。这两种毒素的化 学性质非常稳定，煮沸、盐腌、日晒等均不能将其破坏，所以吃上一颗织纹螺就可能致人死 亡。 这段文字没有解释下列哪一问题？",o:["河豚毒素的毒性为何比氰化钠更强","织纹螺携带的毒素是从哪里来的","石房蛤毒素是如何使人体麻痹的","为何加工过的织纹螺仍然含有毒素"],a:3},{q:"传统基因组学将不同碱基以线性的形式存储于染色体上，并且多基于一个 参考基因组来获取一个物种的基因信息。但是，线性基因组不能同时体现一个物种中不同个 体的遗传变异情况，而且大片段的插入、缺失、拷贝数等变异类型也无法有效鉴定。而图形 基因组的出现正好解决了这一难题。它突破了传统线性基因组只能存储一个个体遗传信息的 局限性，可以存储、展示某类群中不同个体的遗传变异信息，从而真正代表一个类群的遗传 信息。 这段文字没有提到：",o:["传统基因组学获取物种基因信息所使用的方式","线性基因组在鉴定基因片段变异类型上的局限","图形基因组研究对线性基因组研究的比较优势","图形基因组研究对线性基因组研究成果的借鉴"],a:1},{q:"全球首列用于商业化运营的碳纤维地铁列车“CETROVO 1.0 碳星快轨”在 青岛正式发布，该车将引领地铁列车实现全新绿色升级。该车的车体、转向架构架等主承载 结构全部采用碳纤维复合材料制造，具有更轻更节能、强度更高、环境适应力更强、全寿命 周期运维成本更低等技术优势。与传统金属材料的地铁车辆相比，该车整车减重约 11%，运 行能耗降低 7%，每列车每年可减少二氧化碳排放约 130 吨，相当于植树造林 101 亩。商用 碳纤维地铁列车的问世，标志着车辆主承载结构从金属材料向碳纤维复合材料的革新性转变。 下列说法与文意相符的是：",o:["“CETROVO 1.0”是全球首列碳纤维地铁列车","碳纤维车辆将引领地铁列车实现全新绿色升级","碳纤维地铁列车全部采用碳纤维复合材料制造","“碳星快轨”比传统金属地铁车辆更节能环保"],a:3},{q:"我国几乎所有与人为活动相关的环境污染物——二氧化硫和氮氧化物 排放源、50%左右的 VOCs 排放源和 85%左右的一次 PM2.5 排放源（不含扬尘源）都和温室气 体二氧化碳排放源高度一致；以重化工为主的产业结构、以煤为主的能源结构和以公路货运 为主的交通运输结构，是造成环境污染和温室气体排放的重要原因。 下列选项与这段文字意思相符合的是（ ）。",o:["环境污染与温室效应的根本源头是人类的活动","我国环境污染物和温室气体的构成成分高度趋同","我国环境污染物和温室气体排放具有高度的同源性","产业结构不合理是产生环境污染物与温室气体的主因"],a:1},{q:"当一个人专注于一项喜欢的事业时，他自然也就沉浸在一种愉悦的情绪中， 全力以赴地去做，尽心尽力地去做，心平气和地去做。他在全情投入的过程中，很自然地处 在一种宁静致远、物我两忘的至高境界。这种境界可以使人乐以忘忧，可以增强人体的免疫 功能。书法家仅仅是易于专注的一个群体，其他能够专注于工作的人士，同样也可获得长寿， 如作家、科学家等，他们中都不乏活了八九十岁甚至年过百岁的长寿老人。 下列说法与原文相符的是：",o:["书法家的平均寿命高于普通人","长寿者多是善于集中注意力的人","写作和科研对人的专注度要求更高","精神状态在一定程度上影响人的生理功能"],a:0},{q:"东晋医家葛洪在《肘后救卒方》中最早记载了用竹板固定骨折的方法，从 而开创了中医骨伤科利用器具进行外固定的历史。发展至清代，各种骨科固定器具越来越丰 富，用法也越来越成熟。根据不同的功能分为披肩、通木、腰柱、抱膝等，以对应不同的骨 折部位。披肩是用一块约长五寸、宽三寸的熟牛皮，两头各开两个孔，用棉绳穿起来，夹于 伤处缚定。牛皮比木板柔软，尤其适合用于肩背部损伤。腰柱是对腰部起固定作用，治疗腰 椎错位或扭伤佝偻等，根据患处的情况，用四根约宽一寸、厚五分的杉木，侧面打孔，用绳 串联，绑缚固定腰部。 根据这段文字，以下说法正确的是：",o:["披肩和腰柱的共同点是都要用绳子来绑缚固定","清代骨科固定器具的多样性使得用法逐渐成熟","古代中医用于骨伤复位的辅助工具起源于东晋","通木主要用于膝关节损伤以及髌骨骨折的固定"],a:2},{q:"一提到防火涂料，很多人首先想到的就是防火漆。其实，防火漆 只是防火涂料的一种，防火涂料所涵盖的范围要远远大于防火漆。它是防火建筑材料中的重 要组成部分，用于可燃性基材表面，能降低被涂材料表面的可燃性、阻滞火灾的迅速蔓延或 能隔离火源；用以提高被涂材料耐火极限，延长基材着火时间或增加绝热性能，以推迟结构 破坏时间的一种特殊涂料。 下列选项与文段不相符的是：",o:["防火涂料起到隔离火源的作用","防火漆和防火涂料是包含关系","正确使用防火涂料可以消除火灾","防火涂料可以阻滞火灾的蔓延速度"],a:3},{q:"地球上现存 6 种琵鹭，都属于大型涉禽。除南极洲外，其他各洲均有琵鹭 分布。生活在亚洲的白琵鹭和黑脸琵鹭，不但都有一身白羽，还都双腿纤长，形似白鹭，飞 行时姿态优雅美妙，也酷似白鹭。中国古人很喜欢白鹭，为它们写下许多诗词，当他们看到 形似白鹭的大鸟时，本能地将它们归入“鹭”的行列。匙状嘴是所有琵鹭最显著的特征，琵 鹭的嘴巴上虽然没长眼睛，但有丰富的触觉神经。即使极轻微的碰触，它们都能察觉。而且 琵鹭的条件反射极快，总能在第一时间夹住猎物，不让猎物有机会逃跑。在中国古人眼里， 这种匙状嘴与中国乐器中的琵琶很相似。于是，他们又在“鹭”字前加上“琵”字，以此来 与其他鹭鸟区别。就这样，“琵鹮”变成了“琵鹭”。 下列说法与文意不符的是：",o:["琵鹭的嘴巴上有非常丰富的触觉神经","中国古人一度将琵鹭归入鹳形目鹭科当中","在中国，琵鹭因嘴巴的形状酷似琵琶而得名","琵鹭的分布范围很广泛，在六大洲均有分布"],a:2},{q:"数字孪生是指物理空间中的对象在虚拟空间中的数字模型，该模型通过传 感器随时获取真实物体的数据，并随之一起演变、成熟甚至衰老。利用该模型，人们可以对 物理对象进行分析、预测、诊断或者训练，从而优化和决策。这个数字模型就像是真实物体 的孪生兄弟，因而得名。小到一颗螺丝钉，大到一座城市，物理世界中的各种事物均可拥有 数字孪生模型。数字孪生并不是全新技术，而是建模仿真技术在制造领域的新发展之一。 下列关于数字孪生的说法与文意不符的是：",o:["本质是真实物体的数字化模型","是制造领域研发出的最新技术","与物理对象间保持动态的关联","因模型与真实物体的关系得名"],a:0},{q:"低频噪声是指频率在 20~200 赫兹的声音，会给一些感官敏感的人造成极 大的困扰，不过个体差异很大。人为产生的低频噪声包括与生活有关的空调、配电设备、电 梯和风扇等。通常情况下，空调外机的噪声源有两种：空气传播噪声和结构传播噪声。其中， 前者主要与冷凝器，以及风扇和护罩之间的相互作用等有关，后者则主要来源于压缩机相关 的振动。后来有研究发现，空调外机噪声产生的一个主要因素是风扇转动与压缩机振动间的 噪声耦合，如果能够去耦合，就能减少噪声。此外还有研究讨论了，风扇转动带来的空气传 播噪声与管道引起的结构传播噪声之间的耦合。研究人员认为是这样的耦合导致空调产生穿 透力强且传播距离远的低频噪声。 根据这段文字，下列说法正确的是：",o:["低频噪声的来源多与人类活动相关","空调的噪音穿透力强但传播距离近","空调外机噪音或因为压缩机的振动","配电设备噪声会对人造成极大困扰 标题填入题"],a:3},{q:"如今，文艺工作者深入挖掘传统绘画与传统舞蹈之间的内在联系，将诗、 书、画、乐、舞融于一体，形成新的审美表达。比如，杭州亚运会开幕式文艺表演环节，第 一个节目《水墨入诗画》便以中国画为基本元素，身着青绿色长裙的舞者在山水画卷中翩翩 起舞，营造出“人在画中游”的优美意境。舞蹈诗剧《只此青绿》同样以经典山水画为灵感， 通过舞蹈再现画家王希孟创作《千里江山图》的过程，并以刚柔相济的肢体语言、精心设计 的舞蹈动作呈现山水神韵。在这些作品中，传统绘画与舞蹈的创意融合产生叠加效应，使传 统文化与现代审美相谐适，产生了广泛的社会影响。 最适合做这段文字标题的是：",o:["青绿热：传统与现代的双向奔赴","传统与现代：审美表达的异与同","人在画中游：穿越千年的艺术盛宴","画与舞：跨界融合激发艺术新活力"],a:3},{q:"最近一年，之江实验室天文计算研究中心基于 FAST 的观测数据共发现了 31 颗脉冲星，其中包括 15 颗长周期脉冲星。该研究中心团队曾仅用 170 小时完成约 172TB 数 据的处理，相当于每小时速览 1024 部容量为 1GB 的电影。团队负责人表示，利用中心自研 的 AI 算法等智能计算技术辅助处理数据，可以让研究人员从繁重的数据分析中解放出来， 将更多精力投入到理解数据背后的物理图像中，大大提高科研效率。 如果想夸赞之江实验室天文计算研究中心的成就，这段文字可用的标题是：",o:["炼得“金刚钻”敢揽“瓷器活”","只有勇于探索才能遥遥领先","高效源于专业成功源于细节","不经一番寒彻骨怎得梅花扑鼻香"],a:1},{q:"开发前沿技术应用场景的实践价值在于，通过将前沿技术落地转化为生产 力。高技能人才的可贵之处不在于突破核心技术，而在于为产业痛点、难点问题找到核心技 术的最佳实践运用场景。例如，将智能技术引入水、电、煤等公用事业领域，但不同行业在 应用场景选择上存在差异，电力企业重点推进智能电网建设，燃气行业的建设重点是智能表 具系统······这些前沿技术的应用场景不是原始创新，而是技术的跨界融合，需要一 线技术人员基于行业特点寻找适合的前沿技术实现赋能和融合。 最适合做这段文字标题的是：",o:["智能技术的开发与利用具有行业选择性","技术落地的基础——突破创新，跨界融合","找准问题——开发前沿技术应用场景的核心","高技能人才——前沿技术应用落地的“嫁接者”"],a:3},{q:"信息时代，社会发展的节奏和速度不断加快，基层工作中的新问题也层出 不穷。要想跟上发展的脚步，顺利解决基层问题，就决不能骄傲自满，要时刻保持谦卑的姿 态，让学习成为一种习惯，在知识的海洋里染点“书香味”。近年来，“读书无用论”再次 死灰复燃，有的基层党员受到这股风气的影响，放弃学习，拒绝进取，选择“躺平”，最后 只会慢慢与社会脱节，被时代淘汰。基层党员要明确学习的重要性，认真学习新知识、新理 论，提高自身的思想水平和综合办事能力，切实推动基层事业的发展。 最适合做这段文字标题的是：",o:["保持谦卑姿态，染点“书香味”","让与时俱进成为一种工作习惯","基层人员要不断提高思想水平","跟上发展的脚步才能解决问题"],a:1},{q:"最高人民法院对近年来生效裁判进行系统化、常态化梳理，深入总结提炼 在审理过程中形成的价值理念、司法经验和裁判规则，推动形成体系完备、门类齐全、科学 权威、便捷适用的裁判要旨提炼编撰体系。最高人民法院还出台了法律适用分歧解决机制的 实施办法和统一法律适用工作实施办法，有效解决生效裁判之间存在的法律适用分歧问题， 创新“点对点”法律适用分歧解决机制，推动法律适用分歧解决机制运行更加精准有效、灵 活快捷，切实防止司法正义因地域、城乡、行业差异而打折扣。 最适合做这段文字标题的是：",o:["统一裁判尺度，维护社会公平","以法律适用统一提升执法水平","用良法善治夯实法治之基","消除“同案不同判”迫在眉睫"],a:0},{q:"中国古代司法以仁、孝等作为道德准则，在司法裁判中，“德主刑辅、明 德慎罚”就是对这一准则的制度性贯彻。《唐律疏议》强调“德礼为政教之本，刑罚为政教 之用”，认为德与法“犹昏晓阳秋，相须而成者也”。德法互补、共同治国是我国古代延续 数千年的法律传统，带有鲜明的中国特色。在我国的法律传统中，司法不是简单、机械地“援 法断罪”，而是追求“天理”“国法”“人情”相统一，即在执行“国法”的同时，也要体 察“人情”，考虑公序良俗和人民群众的现实感受。同时，我国古代不同时期的律法中对鳏 寡孤独、老幼妇残等群体作出明确界定与恤刑规定，蕴含着鲜明的人文关怀。 最适合做这段文字标题的是：",o:["我国古代司法中的“仁者爱人”","中国“德法互补”的传统司法理念","仁孝道德是司法裁判的主要准则","要挖掘和传承中华古代法律文化 词句理解题"],a:2},{q:"这方面的逸事较多，有两则小典故至今读来仍有强烈的警示意义。一则是 《宋人轶事汇编》记载：钱俶进宝犀带（注释：犀带，指饰有犀角的宝带），太祖曰：“朕 有三条带，与此不同。”俶请宣示，上笑曰：“汴河一条，惠民河一条，五丈河一条。”俶 大惭服。另一则是《南村辍耕录·缠足》记载： 李后主嫔妃窅娘纤丽善舞，后主令窅娘以 帛绕脚，素袜舞云中，回旋有凌云之态。“由是人皆效之，以纤弓为妙。以不为者为耻也”。 这两则典故一正一反，给出了有力印证。 对上文第一句中“这方面”理解最贴切的是（ ）。",o:["领导干部的生活作风具有“上行下效”的示范效应","严惩腐败是管党治党、赢得民心的“徙木立信”之举","“见善则迁，有过则改”可提高个人道德修养","“水能载舟，亦能覆舟”是必须牢记的大道理"],a:3},{q:"深化产教融合，促进教育链、人才链与产业链、创新链有机衔接，是完善 国家和区域创新体系、推动科技自立自强的必然要求和务实举措。现实地看，我国拥有完整 的产业体系、强大的工业配套能力，以及世界规模最大的高等教育体系，但产业和教育仍呈 现出各自为营的态势，产教之间缺乏良性互动，融合发展的格局尚未形成，人才培养供给侧 和产业高质量发展需求侧不同程度地存在“两张皮”现象。这对提升科技自立自强的能力和 水平形成制约，亟需以进一步深化产教融合，优化资源配置，为实现科技自立自强提供源头 活水。 文段中“‘两张皮’现象”指的是：",o:["国家和区域创新体系不能支撑科技发展","人才培养与产业高质量发展需求相脱节","产业和教育之间的资源尚未实现流通","教育与产业发展都不能满足社会要求"],a:1},{q:"三国魏晋南北朝期间，虽然也有较安定的时候，但毕竟很短暂，社会 ],a:1},{q:"①可见人们对唐代山水田园诗源流的普遍看法是，山水诗多源于谢灵运， 而田园诗则以陶渊明为主要渊源 ②陶诗最早产生影响、引起人们学习兴趣的，主要是田园诗 ③进入唐代，陶渊明的田园诗影响更大，王维、孟浩然、储光羲、韦应物、柳宗元等诗人都 学习了陶渊明的田园诗 ④虽然陶渊明的诗歌成就不限于田园诗，但田园诗的确最能代表其独特风格及其在诗歌艺术 上的造诣 ⑤白居易在《与元九书》中说：“以康乐之奥博，多溺于山水；以渊明之高古，偏放于田园。” ⑥谢灵运、颜延之、鲍照这几位陶渊明的同时代诗人，已经受到陶渊明田园诗的影响 将以上 6 个句子重新排列，语序最恰当的一项是：",o:["④②⑥③⑤①","③②⑤⑥①④","⑤④③②①⑥","②③⑥①④⑤"],a:0},{q:"①此外，在集成高铁强国先进成熟技术的基础上，中国建立了更加完善的 创新体系和试验体系，因而新车型开发周期处于全球领先水平 ②速度是反映高铁综合技术水平最主要的指标 ③在衡量高铁速度水平的四个指标中，除最高线路试验速度由法国保持外，其余三项纪录均 由中国创造 ④例如，时速 350 公里中国标准动车组 5 年就完成项目立项到实际上线运营，而西门子时速 280 公里高速动车组从技术招标到批量采购耗时近 10 年 ⑤高铁已经成为中国极少数能够比肩国际技术前沿，甚至在部分领域引领全球技术发展的高 技术复杂度产业 将以上 5 个句子重新排列，语序正确的是：",o:["④②③①⑤","②④③⑤①","⑤②③①④","③⑤①④②"],a:2},{q:"①近日一项研究发现，代谢型谷氨酸受体 2（mGluR2）是流感病毒通过网格 蛋白介导内吞途径入侵细胞的关键受体 ②流感病毒是季节性流感的主要病原，但流感病毒是如何入侵细胞的呢 ③将 mGluR2 可溶性蛋白和抗体封闭后，流感病毒感染细胞的效率大大降低 ④已有研究揭示，流感病毒首先通过其表面的血凝素蛋白与细胞膜表面的唾液酸结合，再主 要通过网格蛋白介导内吞途径内化进入细胞 ⑤但细胞表面吸附的流感病毒如何启动并完成这一内化过程尚不明确 ⑥降低 mGLuR2 的表达后，流感病毒仍可吸附在细胞表面，但进入细胞的效率显著下降 将以上 6 个句子重新排列，语序正确的一项是：",o:["①③②④⑤⑥","②④⑤①③⑥","②①③⑥④⑤","④①③⑥②⑤"],a:3},{q:"①“适度距离”不单是居住空间上的物理距离，也是心理上的“代际距离”。 ②个性解放、知识快速更新和年轻一代的经济独立不断冲击着传统家长权威。 ③当年轻人与父辈的价值观念和行为方式难以快速趋同时，保持适度距离是确保良性代际互 动的前提。 ④在社会转型进程中，中国的家庭结构经历着革命式变迁。 ⑤有学者提出，两代人的居住格局应保持“一碗汤的距离”，既要让子代和父代有各自的独 立空间，又要维系家庭成员之间的亲密关系。 ⑥不同价值观念和行为方式在同一时空并存的环境下，代际之间的适度空间和社会距离是彼 此有效沟通与和谐共处的基本条件之一。 将以上 6 个句子重新排列，语序正确的一项是：",o:["⑤①③④②⑥","②⑥③④①⑤","④②⑥③⑤①","⑥③⑤④①②"],a:2},{q:"①四川省阿坝州桃坪乡羌寨是世界上保存较完整的、碉楼与民居融为一体 的建筑群，被中外学者誉为“羌族建筑艺术活化石”“神秘的东方古堡” ②全村拥有多座百年以上建筑，最早的一座距今有 500 多年历史 ③我国幅员辽阔的土地，孕育了多姿多彩的民俗文化和极具地域特色的传统民居，凝聚着古 人的生活智慧和审美情趣 ④这些古厝融合闽南传统风格、南洋风格、苏式风格，形成独特而多元的建筑风格，成为观 山村多元文化交融的具体体现 ⑤各地的少数民族村寨建筑，体现着更为独特的民族文化 ⑥有“中国最美休闲乡村”美誉的观山村，群山环绕之间，绿水、梯田、老树交相辉映、融 为一体 将以上 6 个句子重新排列，语序最恰当的一项是：",o:["③①⑤⑥④②","⑤①②④⑥③","⑤③①②⑥④","③⑥②④⑤①"],a:0},{q:"①我国现存辽塔约有 90 座，其中辽宁省内就有约 40 座 ②辽宁辽塔的“辽”字，既有空间上的地理分布，又有时间上的历史积淀 ③辽代古塔简称辽塔，其以独特的风格造型和精美的建造艺术在中华古塔中独树一帜 ④一座座矗立在辽宁省内的辽塔，历经千年，记录着佛教在东北地区的传播流变，也成为我 们窥探大辽王朝兴衰的一扇窗 ⑤契丹民族兴起于辽河河畔，辽宁省名源于辽河 将以上 5 个句子重新排列，语序正确的是：",o:["③①⑤②④","③⑤①②④","②③①④⑤","①③②⑤④ 语句填空题"],a:3},{q:"农村生态文明建设，________________。一是必须加速由高耗能、高污染 的粗放型农业生产方式向清洁循环的集约型农业发展方式转变，加强农业科技研发与推广应 用，建立全产业链绿色化农业发展模式。二是促进农业资源循环利用，积极推进农业清洁生 产，提高禽畜养殖废弃物资源化利用。 以下句子填入划横线处，最恰当的是（ ）。",o:["必须与美丽乡村建设紧密结合","必须大力推进绿色循环农业发展","必须充分利用科技研发促进农业生产","必须树立“绿水青山就是金山银山”的价值导向"],a:3},{q:"指纹是灵长类动物和考拉独有的，似乎具有双重作用，在促进多余水分 蒸发的同时，在其底部提供一个水分储存库，以使抓握力最大化。研究人员发现，当手指与 不透水的表面接触时，指纹脊线部毛孔中的汗液会使皮肤更柔软，从而显著增加摩擦力；而 脊线汗液的顺应性增加最终会导致毛孔堵塞，防止因释放出过多的水分而降低抓握力。科学 家利用高科技激光成像技术研究发现，水分调节由两部分组成，即上述汗孔阻塞过程，以及 由于接触物体时指纹表皮脊线特定横截面形状变化导致的外部多余水分的加速蒸发。无论最 初手指肚是湿的还是干的，上述两个过程 。 填入画横线部分最恰当的一项是：",o:["为灵长类动物在干湿环境下提供了进化上的优势","使指纹脊线保持最佳湿度，从而使摩擦力最大化","能够调节皮肤湿度，确保角质层的最佳水合状态","有助于增强对粗糙表面的抓握力和触觉的敏感性"],a:1},{q:"在 文 学 、 书 法 、 绘 画 、 音 乐 中 ， 竹 都 是 重 要 的 表 现 对 象。 。中国传统的吹奏乐器和弹拨乐器多是用竹制造的。 相传“女娲作笙簧”；《列仙传》记载，春秋时萧史善吹箫，能作凤声，引凤凰止于其屋； 晋代以“丝竹”为音乐代称，并有“丝不如竹”之说；唐代将乐师称为“竹人”。据说，在 火药发明之前，“爆竹”真的是以燃烧竹子的方式来发出噼里啪啦的爆炸响声。清代翟灏《通 俗编》说：“古时爆竹，皆以真竹着火爆之，故唐人诗亦称爆竿。”有学者推测，中国古代 竹制乐器可能就是从燃竹开始。竹子燃烧时，竹节内空气膨胀，冲破竹筒，发出响声，形成 简单的原始音乐。 填入画横线部分最恰当的一项是：",o:["作为制作乐器的重要材料，竹与音乐密不可分","中国竹乐器种类繁多，仅笛子类乐器就有许多种","中国乐器的发展和进化过程与竹息息相关","竹在中国乐器中具有独特意象，是文人的重要选择"],a:3},{q:"与传统业态相比，新业态顺应多元化、多样化、个性化的产品或服务需求， 实现产业与互联网、大数据、云计算、人工智能等新技术深度融合，通过采用新技术和新模 式，为市场引入新元素、丰富新场景，促进新岗位、新就业形态不断涌现，创造更多就业机 会。新业态既提供新的高技能岗位，扩大对高水平劳动力的需求，又通过带动传统产业转型 升级，实现对传统职业和岗位的再造，释放新的就业需求。当前，我国有超 2 亿灵活就业人 员，新就业形态 。 填入画横线部分最恰当的一项是：",o:["已经成为吸纳就业的重要“蓄水池”","有助于促进区域间劳动资源的互补与共享","为高技能劳动力流动提供充足机会","是有效缓解重点群体就业压力的“缓冲器”"],a:1},{q:"。可是，由于不能考驾 照，一些超龄老年人纷纷选择老年代步车作为出行工具，反而带来新的安全隐患。首先，老 年代步车的质量参差不齐，不少“三无产品”充斥其中，安全系数低。其次，老年人上路前 没有经过专业驾驶技术培训，对各项交通法规更是一知半解，很容易造成交通违法行为，引 发道路交通事故。 填入画横线部分最恰当的一项是：",o:["开车是个技术活，能否申请驾照主要看当事人的身体情况","由于人们生活水平的不断提高和人均寿命的不断延长，老年人的身体素质普遍提高","设置申请驾照年龄上限的初衷，是确保驾驶者的身体能力，保障道路交通安全","老年人开车有自身的优势，小心谨慎、心态平和，遇到“斗气车”也不会去较劲儿"],a:0},{q:"现代科技的发展速度快、影响范围广，具有极强的传导性、连锁性、覆盖 性。并且，科技发展越是迅猛，后果往往就变得越是不可预测和不可控制，从而存在巨大的 伦理风险。因此，科技伦理中 ，坚持底线思维， 增强忧患意识，用大概率的思维应对小概率的事件。既要小心“黑天鹅”事件，也要提防“灰 犀牛”事件；既要筑牢防范和控制危机的“防火墙”，也要打好应对和处置危机的“主动仗”， 更要提升化解和扭转危机的“能力值”。这样，尽可能促使科技活动“趋利避害、健康发展”， 保障科技应用“增进福祉、避免灾殃”。 填入画横线部分最恰当的一项是：",o:["要彰显“高瞻远瞩，造福人民”的认知追求","要包含“防微杜渐，慎独而行”的行动自觉","要警惕“麻痹大意，得过且过”的惰性思维","要具有“常怀远虑，居安思危”的价值理念"],a:2},{q:"古代的“德治”是把道德视为主要的、具有统治地位的治理模式，无论官 员还是民众都把道德看得比法律还重要，宁愿违反法律，也要遵守道德以成全道德，所谓 “ ”。不仅立法合乎道德，司法也是以“屈法 律以全道德”为目标。古代社会中因为孝道而犯罪的案件，往往都会得到赦免或宽宥，这种 道德重于法律的观念，代表了古代中国人关于法律与道德的关系的一般见解和心态。在一个 重德轻法、“德主刑辅”的“德治”社会，法律往往就成为道德的附属物。 填入画横线部分最恰当的一项是：",o:["徒善不足以为政，徒法不能以自行","志善而违于法者免，志恶而合于法者诛","言非法度不出于口，行非公道不萌于心","知屋漏者在宇下，知政失者在草野"],a:3},{q:"。车让人、人守规，才 能形成良性循环。大力倡导车辆礼让行人，并不意味着放松对行人的要求。车与人抢道要治， 人与车抢道也要管。不遵守交通信号灯指示、过马路玩手机等行为，不仅干扰交通秩序、影 响通行效率，也给行人自身安全带来隐患。提升交通文明，需要涵养规则意识，也需要加强 引导和监管。比如，有的地方除了在路口设置交通管理员，启用具有人脸识别功能的自动抓 拍系统，还通过媒体和网络平台对不文明交通行为进行曝光，收到良好效果，使“车让人、 人守规”成为各方共识。 填入画横线处的语句，最恰当的一项是：",o:["礼让一小步，文明一大步","一条斑马线，也是一道治理考题","尊重是双向的，文明亦需要共建共护","文明出行始于足下，习惯养成久久为功"],a:2},{q:"近年来，从新能源汽车下乡到绿色智能家电下乡，一系列高品质工业品从 “稀罕物”变成“必需品”，有效提升了农民生活水平。多年经验告诉我们：工业品下乡绝 不意味着“积压品下乡”，更不能拿质次价廉的商品糊弄消费 者， 。比如，有的家电企业看到，一些地区的农民喜欢 把洗衣机放在露天小院使用，于是重新设计洗衣机产品外壳，解决了下雨导致的生锈问题； 有的企业专门推出能在较大电压波动范围内正常启动的冰箱，适应了部分农村地区的环境和 条件。惠民生、增福祉是工业品下乡的政策初衷。牢牢把握这个基点，才能让“下乡”的动 能更足、活力更强，真正提振消费、拉动内需。 填入画横线部分最恰当的一项是：",o:["要深入调研农村消费群体，了解其实际需求","高品质满足农村地区消费者实际需求才是硬道理","要统筹兼顾，破解难题，切实激发家电企业的积极性","充分发挥乡村消费市场的重要作用，用好工业品下乡政策"],a:0},{q:"从心理学角度看，兴趣是好奇心的孪生兄弟。要理解什么是兴趣，先要理 解何为好奇心。如同饥渴一样，好奇心是人的一种生物驱动机制。它驱动人去了解周围世界。 当人们已有的知识不足以理解所遇到的情境，就会唤起人们的好奇心，驱动人们去获取信息 以消除信息差。换言之， 。只有在人们对某物 或某情境有部分了解的情况下，才易于产生好奇心。“部分了解”意味着存在知识差，好奇 心便会驱动人们对事物进行探究，以消除知识差。通常来说，新奇或复杂的事物或情境更容 易引起人们的好奇心。 填入画横线部分最恰当的一项是：",o:["兴趣是引导人们探索世界的动力源","好奇心是创新驱动发展的心理基础","人们好奇心的满足程度存在差异","知识差是引起好奇心的一个根源 接语选择题"],a:3},{q:"近年来，蕴藏于海水、卤水和高盐工业废水等自然与工业资源中的“蓝色 能源”——渗透能，因其储量大、可再生等特点，受到了研究者的广泛关注。浓度比重不同 的水之间会产生渗透现象。渗透时对作为隔膜的半透膜产生的压力被称为渗透压力，由渗透 压力产生的能量被称为渗透能。而具有离子分离特性的功能薄膜是渗透能回收的关键。但在 渗透能的实际回收过程中，水体的高盐浓度往往会导致分离膜的离子选择性和扩散性大幅下 降，从而严重制约了相关技术的应用与推广。 接下来最可能说的是：",o:["分离膜性能下降的原因","渗透能与其他绿色能源的区别","一种高效稳定的渗透能回收性能新材料","渗透能的开发利用前景"],a:3},{q:"在经典的冯·诺伊曼计算机架构中，存储单元和计算单元泾渭分明。运算 时，需要将数据从存储单元读取到计算单元，运算后会把结果写回存储单元。在大数据驱动 的人工智能时代，AI 运算中数据搬运更加频繁，需要存储和处理的数据量远远大于之前常 见的应用。当运算能力达到一定程度，由于访问存储器的速度无法跟上运算部件消耗数据的 速度，因此再增加运算部件也无法得到充分利用，就形成了所谓的冯·诺伊曼“瓶颈”或“内 存墙”问题。这就如同一台马力强劲的发动机，却因为输油管的狭小而无法产生应有的动力。 这段文字接下来最可能介绍的是：",o:["人工智能为何如此耗费算力","人工智能计算能力的发展趋势","数据“内存墙”问题产生的原因","如何突破 AI 运算 承担 刑事责任，该网红主动删除视频"],a:2},{q:"拟剧理论指人与人在社会生活中的相互行为在某种程度上是一 种表演。每一个人就像演员一样，在某种特定的场景下，按照一定的角色要求在 舞台上表演给观众看。在整个表演过程中，人总是尽量使自己的行为更为接近想 要呈现给观众的那个角色，观众看到的是那个表现出来的角色而不是演员本身。 当表演结束，演员回到后台以后，他的真实面目才展现出来，演员才又恢复其本 来的自我。 根据上述定义，下列选项不能印证拟剧理论的是：",o:["小丽来找小明探讨功课，小明没有立刻开门，而是先把臭袜子藏到床下","在“国王的新装”故事里，新装展示游行时臣民交口称赞新装华贵美丽","小魏生活拮据但工作努力，老板不动声色地开豪车替其去机场接其父母","小菲通过盗图和拼接，天天在微信朋友圈发吃美食、健身、游玩的照片"],a:2},{q:"查全率是指检索出的相关文献量与检索系统中相关文献总量的 百分比。查准率是指检索出的相关文献量与检索出的文献总量的百分比。检索时 间是指根据特定条件搜索或查找特定信息或数据所需的时间，检索时间受到检索 系统的性能、数据量的大小、搜索条件的复杂性等多种因素的影响。一般来说， 搜索条件越多，检索时间越长。 根据上述定义，下列说法正确的是：",o:["要提高查全率，就要提高查准率","检索某一课题时，若数据库中共有相关文献 40 篇，但只检索出 30 篇，则查全 率为 75%","检索时间越长，查全率和查准率必然会越高","若检索出的相关文献量有 60 篇，检索出的文献总量有 300 篇，则查准率为 50%"],a:1},{q:"海洋地球物理调查是指利用各种物理学方法和仪器，测量海底 地球物理的性质及其变化特征，从而得出海底地质构造或矿产分布的调查方法。 根据上述定义，下列属于海洋地球物理调查的是：",o:["将重力仪安放在船上进行观测，以确定海底地壳各种岩层质量分布的不均匀性","用深海钻探法从海底采集富钴结壳矿样品，分析其中锰、铁氧化物成分及氧化 程度","用硝酸银滴定氯化物的方法检测海底沉积物的成分，以确定海底矿产资源的情 况","用抛弃式探温仪测定海水温度，计算出海洋平均温度，分析近 60 年来海洋变 暖速率"],a:0},{q:"生产性固定资产是指在物质资料生产过程中能长期发挥作用而 不改变其实物形态的劳动资料。它不同于非生产性固定资产，非生产性固定资产 可分两类，一类是纯消费性的，没有盈利，投资不能收回，其再投资依靠社会积 累，另一类是可转化为无形商品的，有盈利，可以收回投资，甚至可实现增值和 积累。 根据上述定义，以下投资能形成生产性固定资产的是：",o:["对影剧院、电视台、咨询公司等的投资","对面粉厂的机器、设备和厂房等的投资","对学校、国防安全、社会福利设施等的投资","对快餐店的家禽、蔬菜、大米等原材料的投资"],a:1},{q:"无效运输指的是没有任何经济社会效益的运输，具体是指物资 中所包含的无使用价值的那部分杂质的运输，这种运输不仅浪费交通运力，而且 消费该物资的单位或企业也得不到保质保量的产品。 根据上述定义，下列属于无效运输的是：",o:["某国矿产资源分布不均，由此形成北矿南运、西矿东调的长距离运输","原油中掺杂有超量水分并投入使用时，会增加机器设备被磨损腐蚀风险","运输的原煤中有 25%是不能用于燃烧的矸石和灰分，造成铁路运力的耗费","向海外运送瓷器时，选择了成本较高的航空运输，没有发挥出水路运输的优势"],a:2},{q:"过度管理是指某些管理者过分相信自己的能力、精力和眼光， 认为缺少自己的指挥就达不到预期效果，或凡事亲历亲为，让自己整日陷于忙碌 之中。 根据上述定义，下列不属于过度管理的是：",o:["班主任陶老师对学生要求十分严格，每天都到班级督促学生学习和锻炼，常常 严厉批评犯错误的同学","龚经理总是对下属不放心，公司职员小张出差两天，龚经理打了 10 多个电话 指导工作，弄得小张压力很大","饭店高老板习惯每天下班时和保洁员工一起打扫卫生，他觉得只有这样才能保 证餐厅整洁，不留任何卫生死角","办公室许主任每次分派工作都十分具体，如对会议室桌椅的摆放数量和位置等 细节都交代得十分清楚，让下属没有一点发挥的余地"],a:0},{q:"征询型公关是指通过采集信息、舆论调查、民意测验等，掌握 信息和舆论，为组织机构的经营管理决策提供公共关系方面的咨询的活动。宣传 型公关是指利用各种传播媒介向社会公众介绍自己，以形成有利的社会舆论的公 共关系活动。 根据上述定义，下列属于宣传型公关的是：",o:["研究机构公布某公司的市场调查结果引起社会关注","将公司新开发的系列产品通过微信公众号进行推送","收集微信公众号上用户对本公司产品的态度与评价","物业公司通过线上线下问卷向业主征求意见和诉求"],a:1},{q:"具有包含与被包含关系的三个概念，如植物、乔木、水杉等， 可至少形成三个正确的命题：所有的水杉都是乔木，所有的乔木都是植物，所有 的水杉都是植物，由“所有的乔木都是植物”“所有的水杉都是植物”而得出 “所有的水杉都是乔木”，这样的推理被称为排序推理。 根据上述定义，下列属于排序推理的是：",o:["所有的平行四边形都是四边形，所有的菱形都是四边形，所以，所有的菱形都 是平行四边形","所有的昆虫都是动物，所有的蝴蝶都是昆虫，所以，所有的蝴蝶都是动物","所有的文字都是符号，所有的文字都是图形，所以，所有的符号都是图形","这个花园的花都是迎春花，迎春花都在冬、春季开放，所以，这个花园的花都 在冬、春季开放"],a:0},{q:"语言通胀是指当前社会中，由于词语使用过度夸张、描述超过 事实而造成词义掉价、情感弱化、指称范围夸大，甚至可能导致信息理解错误的 语言泡沫化现象。 根据上述定义，下列没有体现语言通胀的是：",o:["“美女”一词原指“年轻貌美的女子”，具有称赞之意，但如今“美女”已变 成很多人对女性的日常称呼","社交网络上人们用词仿佛达成了一种“默契”，实用效果不错的东西都叫“神 器”，说起好吃的东西都是“好吃哭了”","微信聊天时，最初用“哈哈”表示高兴，现在，年轻人经常会用很夸张的动态 表情图来表示自己高兴的心情，有些图让人忍俊不禁","小李向顾客介绍说自己是理发店的首席设计师，顾客发现价目表上写着“首席 设计师 38 元，设计总监 68 元，创意总监 98 元”"],a:2},{q:"假说是根据已观察到的事实和已有的科学原理，对尚未认识到 的现象的性质或发生原因作出的推测性解释。依据提出假说的目的不同，假说分 为：①定律假说，是关于一类事物或现象的性质或发生原因的推测性解释，目的 在于通过这样的解释指导探索某类事物的性质或发生原因，得出具有普遍意义的、 规律性命题；②作业假说，是关于某个特定事物或现象的性质或发生原因的推测 性解释，其目的不在于获得定律性认识，而在于通过对事物或现象的性质或发生 原因的试探性解释，以指导人们有目的有计划地展开工作。 根据上述定义，下列说法正确的是：",o:["石油勘探人员通过重力勘探法，认为某盆地的下方富含石油，这属于定律假说","侦查人员通过对案发现场的侦查，推测是单位内部人员作案，这属于定律假说","牛顿根据苹果落地等现象，提出物体之间都具有引力的解释，这属于作业假说","医生通过检查、化验，对一位腹痛患者的病症作出了初步诊断，这属于作业假 说"],a:3},{q:"无感审批是指通过智能技术强化身份认证、智能授权、自动填 表等功能，企业群众无需出示证件、无需填写表单，“不知不觉”就拿到审批文 件，实现“无感”审批、“省心”办事。 根据上述定义，以下属于无感审批的是：",o:["某市旅游管理部门通过人脸识别等网络技术，实现了网上实名制购买全市公园 门票。游客无需出示证件，可以直接出示购票二维码入园","某建设单位登录省投资在线监管平台，填写单位代码后，系统自动生成企业基 本信息和申请表格，随后完成在线审核，获得建筑许可","某市提高政府办事效率，对企业或个人办理业务，只需要到综合服务大厅询问 工作人员，工作人员会帮忙核对材料，帮助他们方便快捷地完成相关手续","某保险公司提供网上业务办理和查询功能，客户登录公众号并通过人脸识别后， 可完成查询、续费、转款等功能，无需出示证件、无需填写表单"],a:1},{q:"收敛式论证结构是一种常见的多前提论证结构，它是指多个前 提相对独立地分别支持结论，也许这些理由独自给结论提供的支持非常有限，但 它们的支持力积累起来可以给结论提供强有力的支持。 根据上述定义，下列属于收敛式论证结构的是：",o:["所有理性主义者都不会超前消费，所以有些非超前消费的人是理性主义者","她不是四川人，因为四川人都会说四川话，但她却不会说","正在上小学的小李天资聪颖，能够吃苦，学习兴趣比较浓厚，小李的父亲认为 他将来一定可以考上大学","妻子生气地对丈夫说：“你若是能够戒烟，太阳会从西边出来。”显然，太阳 不会从西边出来"],a:2},{q:"主体间性是指人对他人意图的判断与推测。主体间性有不同的 级别，一级主体间性即人对另一个人意图的判断与推测，二级主体间性即人对另 一人关于其他人意图的判断与推测的认知的认识。 根据上述定义，下列体现了二级主体间性的是：",o:["小明饿了，去问妈妈饭做好没有，妈妈说爸爸正在做","老师知道学生们不喜欢做作业，周五就在班级群里通知本周末不留作业","小王知道老板爱挑毛病，每次提交的总结都得仔细检查好几遍","小花看见妈妈冲爸爸使了个眼色后，爸爸尴尬地放下酒杯，小花偷偷地笑了"],a:3},{q:"自动投案是指犯罪事实或者犯罪嫌疑人未被司法机关发觉，或 者虽被发觉，但犯罪嫌疑人尚未受到讯问、未被采取强制措施时，主动、直接向 公安机关、人民检察院或者人民法院投案。 根据上述定义，下列不属于自动投案的是：",o:["甲实施多起电信诈骗，获利十余万元，在公安机关进行的一次隐患排查入户走 访中，发现甲形迹可疑，经盘问甲主动交代了自己的罪行","乙致人重伤后潜逃，在公安机关经侦查确认乙为该案的犯罪嫌疑人时，乙正因 酒后驾驶被行政拘留，经公安机关讯问后，乙交代了自己的罪行","丙多次挪用公款，其父母发现异常后，多次规劝其投案自首无效，直至单位发 现款项异常开始查账后，丙才到公安机关交代自己的罪行","丁因入室盗窃被判处有期徒刑，在服刑期间，丁主动向公安机关交代自己系公 安机关久未破获的“7·26”走私案的主谋之一"],a:1},{q:"动机-效率定律是心理学家提出的反映动机水平与工作效率关 系的定律。心理学家认为动机水平的强度和工作效率之间的关系不是一种正比例 关系，而是形成一种倒 U 形曲线，如下图所示。 根据上述定义，下列说法错误的是：",o:["动机水平在达到一定强度的时候，工作效率最高","在一定范围内，工作效率随着动机的提高而上升","随着任务难度的增加，动机的最佳水平逐渐上升","对学习来说，如果动机过强，会使学习效率降低"],a:2},{q:"选择性理解是指不同的受众对传播媒介所传播的同一信 息做出不同的解释、结论和反应。造成这种现象的主要原因是受众在理解过程中 加进了许多主观因素，如固有的观念、态度、立场，个人的感情、情绪、习惯， 使用传播媒介的动机和目的，等等。 根据上述定义，下列情形属于选择性理解的是：",o:["小吴与小宋经常就新闻报道中的观点发生争执","小婷与小凤就新闻受众问题提出不同的学术观点","小陈认为看时政新闻有意思，而小李认为文体新闻更刺激","小伍觉得晚上看新闻更有感觉，小王认为早上看能早知道"],a:0},{q:"纵向谈判是指在确定谈判的主要问题后，逐个讨论每一问题和 条款，讨论一个问题，解决一个问题，一直到谈判结束。横向谈判是指在确定谈 判所涉及的主要问题后，开始逐个讨论预先确定的问题，在某一问题上出现矛盾 或分歧时，就把这一问题放在后面，讨论其他问题，如此周而复始地讨论下去， 直到所有内容都谈妥为止。 根据上述定义，下列属于纵向谈判的是：",o:["产品采购方和供货方进行谈判，采购方明确产品质量必须高标准，任何谈判条 件都让位于质量","在资金借贷谈判中，涉及金额、利率、期限、担保等问题，双方在贷款期限上 未达成一致意见，便先讨论其他问题，最后再讨论贷款期限","一项产品交易谈判，双方确定了价格、质量、运输、保险、索赔等几项内容后， 开始就价格进行磋商，如果价格确定不下来，就不谈其他条款","K 国和 F 国谈判时，内容涉及领土、贸易往来、科技、医疗等多个领域，双方 决定从较不关键的领域开始谈起，争取达成一致建立善意"],a:2},{q:"开放式决策，是指政府在进行重大决策时，充分听取、吸 纳公众意见，并将公众意见作为行政决策的重要参考，使行政决策公开、透明， 实现政府与公众有机互动的一种决策形式。 根据上述定义，下列不属于开放式决策的是：",o:["发改委就天然气涨价事宜举行听证","政府常委会邀请人大代表、政协委员和市民代表列席会议发表意见","市民通过网上留帖或网上视频直播，参与重大民生事项讨论","对社会高度关注的案件，司法机关邀请公众参与庭审旁听"],a:3},{q:"词的同一性是指同一个词形可以表示不同的意义，但这些不同 的意义之间存在着内在联系的现象。 根据上述定义，下列划线的词不属于词的同一性现象的是：",o:["他的态度很端正 大家要端正态度","他是我们的领导 在 D 的领导下奋勇前进","这个人仪表堂堂 在重要场合要注意仪表","这是一门科学 处理问题的方法很科学"],a:2},{q:"大气中水汽直接在地面或地物表面及低空的凝结物，称为隐匿 性降水。由空中降落到地面上的水汽凝结物，称为直接性降水。 根据上述定义，下列属于隐匿性降水的是：",o:["夜深烟火灭，霰雪落纷纷——白居易《秦中吟》","广寒宫中珠径雨，狂风倾下九天来——邓肃《雹》","神农架景区温度大幅下降至零下 3 度，迎来了入秋后的雾凇奇观","雨凇边降边冻，粘附在裸露物的外表而不流失，形成越来越厚的冰层"],a:2},{q:"照护综合征是指一个人因专注于照护生病、受伤或残疾的亲人 而过度劳累或精神上陷于压抑状态，导致身心健康受损的病症。 根据上述定义，下列不属于照护综合征的是：",o:["“照顾生病的父母半年，我感觉整个人都陷入了黑暗，现在还没缓过劲来，电 话铃声一响整个人就哆嗦。”","“这家坐轮椅的老爷子太难伺候了，累死累活照顾他还经常挨骂，还要被扣工 资，我受不了了，不想干了。”","“我起早贪黑照顾了瘫痪在床的父亲两年，他还总不满意，经常训斥我。现在 好了，我也累倒了，住院了。”","“昨天奶奶说，她一个人照顾双目失明的爷爷太累了，要么儿女们轮流来照顾， 要么找个专职保姆，反正她受不了，不管了。”"],a:1},{q:"载损鉴定是指船方为了明确所承运的货物是否发生了残损，以 及残损责任是否属于船方，而向商检机构申请在其卸货过程中检查货物情况，给 予公正的鉴定。 根据上述定义，下列属于载损鉴定范畴的是：",o:["甲船向商检机构申请检查船舶卸货前舱口、风筒的封盖和封识情况，以鉴定货 物受损的原因","乙船向商检机构申请检查舱内货物清单是否与报关清单一致，鉴定货物是否完 整","丙船向商检机构申请对比装船储罐前检尺及储罐后检尺，以计算输油软管破裂 造成的油品泄漏量","丁船与戊船相撞后，向商检机构申请检查船体的故障原因，评估船体的技术状 况"],a:0},{q:"电子官僚主义是指近些年随着电子化、信息化而产生的一种官 僚主义形式，主要表现为过度依赖电子化政务、信息化管理、网上办理、台账管 理等形式，不考虑实际工作问题，其实质上是脱离实际、脱离群众、高高在上。 根据上述定义，下列不属于电子官僚主义的是：",o:["某县政府召集乡镇干部开会，传达上级会议和文件精神，要求无法现场参会的 人员线上参会、电子签到","某年轻干部不深入一线、不下乡调研，通过各式各样的“电子台账”，坐在办 公室里就完成本部门的任务","某上级部门要求下级部门所有工作都要签订“项目责任书”，要求线上实时更 新、反馈和上报各种材料和数据","某部门强调“规范审批、落实责任”，即使线下完成的审批事项也要求服务对 象在信息化系统中再次提交留痕"],a:0},{q:"眼镜蛇效应是指针对某个问题做出的解决方案，非但没有从 根本上解决问题，反而使问题更加恶化的一种现象。 根据上述定义，下列体现眼镜蛇效应的是：",o:["某经理想要提升订单交付率，于是决定大幅增加安全库存数量，结果发现存货 越来越多，引发库存管理人员的抱怨和不满","某采购员发现运费太贵，想要降低采购费用，大费周章地找价格更便宜的供应 商，结果整体的采购支出金额并没有省下多少钱","某单位为鼓励员工工作，出台加班补偿政策，晚上加班 3 小时以上，按一天的 工资标准发放加班费，结果发现加班的人明显增加，加班费大幅攀升","为避免浪费，每晚某超市关门后，老板会把包装破损的食品送给员工，结果食 品包装破损更多了，因为有个别员工故意破坏包装"],a:3},{q:"概念同化是指学习者利用已有概念去学习以定义的方式直接呈 现的新概念，概念同化分为上位学习、下位学习和并列组合学习三种基本形式。 上位学习是指新学习的内容比原有内容的包摄性和概括性高的一种学习方式，下 位学习是指新学习的内容比原有内容的包摄性和概括性低的一种学习方式，并列 组合学习是指新旧概念的概括程度相同，通过并列或联合关系而产生的学习方式。 根据上述定义，下列属于下位学习的是：",o:["在学习了钠、镁、铝等元素的化学性质后，再学习铅、铁、锌等元素的化学性 质","在学习了正方形、长方形的面积计算公式后，再学习平行四边形的面积计算公 式","在学习了 2、3、5 等数字规律并形成了质数概念后，再学习 97 也是质数","在学习了亭、台、楼、阁等建筑的特点后，再学习中国传统建筑的特点"],a:2},{q:"多级养殖是指根据物种代谢产物或残余有机质的利用价值及其 在食物链中所处的级次，依次放养相应生物，多级次利用营养物质的一种养殖方 式。 根据上述定义，下列属于多级养殖的是：",o:["将养殖过江蓠的海水用于放养贝类，以利用其中繁殖的浮游生物；再将养殖过 贝类的水用于放养对虾；再以对虾代谢分解的产物养殖藻类","将鱼、虾、贝类与藻类放在同一水槽混养，其代谢产物会为藻类提供必要的营 养要素，藻类的光合作用又产生更多的溶解氧","在一台浮筏上，于冬春季养殖海带；至夏秋季养殖海湾扇贝或石花菜，从而更 好利用海况条件，满足市场需要","同一池塘中，鲢、鳙生活在上层，主食浮游生物；草鱼、鳊生活在中下层，主 食草类；鲤、鲫生活在底层，主食底栖动物和有机碎屑"],a:0},{q:"矛盾职业认同是指从业者对自身职业兼具认同和不认同，或认 同职业某一方面而不认同其他方面，反映了个体对自身职业的复杂情感。 根据上述定义，下列属于矛盾职业认同的是：",o:["小强对未来就业感到迷茫，一方面认为本专业相对好就业，另一方面觉得工作 压力会很大","虽然觉得社会上有很多人对网络主播并不认同，但小飞却决定将主播当作一生 的事业来做","小刚的父母希望他毕业后考公务员，但小刚自己却更喜欢做一名教师","老汪觉得送快递很累，但工作时间相对自由，因此他还是决定干下去"],a:3},{q:"情绪惰性，是指个体当前情绪状态能被之前情绪状态所预测的 程度，预测程度越大则反映情绪惰性水平越高，情绪惰性作为情绪动态性指标之 一反映了情绪变化的速度。 根据上述定义，下列情形属于情绪惰性的是：",o:["冬季往往容易使人情绪低落，所以这个冬天也不会例外","调皮的小铭被老师批评之后终于老实了，随后几天都一直规规矩矩的","自从万师傅的老伴儿半年前去世后他就一直很忧郁，估计一时半会儿好不起来","自从首长做了战时动员令之后，整个工厂的工人都保持着激昂的心情努力生产"],a:2},{q:"不随意注意是指没有预定目的，不需要意志努力，不由自主 地对一定事物所产生的注意；随意注意指的是有预定目的，需要一定意志努力的 注意，它是注意的一种积极、主动的形式；随意后注意是注意的一种特殊形式， 是指有自觉目的但不需要意志努力的注意。 ①家庭主妇小张厨艺娴熟，在切菜的同时，还可以看电视剧 ②教室里小明在聚精会神地听老师讲课，时不时还记着笔记 ③安静的课堂忽然闯进来一个人，大家不约而同抬头看向他 根据上述定义，下列选项对应关系正确的是：",o:["①③涉及不随意注意","②涉及随意后注意","②③涉及随意注意","①涉及随意后注意"],a:3},{q:"温情执法：指执法人员在依法查处违法行为的过程中，综合考 量各种特殊因素，对违法者进行灵活处置以体现法治温度的执法行为。 下列不属于温情执法的是：",o:["冬天，许多菜农在路边叫卖，给城市交通卫生带来了挑战。区城管部门调研后 划出 28 个覆盖全区的固定销售点，与菜农签订“摊前三包”协议，菜农卖得更 安心了，城市面貌大有改观","民警发现电信诈骗嫌疑人王某潜回家中后迅速抓捕。当时，王某刚把 4 岁女儿 从幼儿园接回家。民警为避免小女孩受惊，迅速收起警察证和手铐。以吃饭为名 把王某带了出去","交警小周在公路上进行安全巡逻时，发现一辆电动三轮车严重超员。处罚过程 中得知因为老人突然生病，全家人带他到县城治疗，小周用警车把他们送到医院","某县卫生健康执法人员在查处无证行医过程中，发现郑某正在出租屋行医。得 知小诊所是他家最主要的经济来源，郑某已考取职业资格证书，县卫生部门协助 他办理了医生执业证书和执业许可证"],a:0},{q:"警觉性市场学习是指企业或组织为提高深度市场洞察而提前建 立预警系统，并保持注意力集中以预测市场变化或感知客户需求微弱信号的学习 行为。 根据上述定义，下列属于警觉性市场学习的是：",o:["公司提醒小吴要想在职场中保持优势地位，避免被淘汰，就必须利用业余时间 多学习","阳阳上课时注意力不集中，为帮他养成良好学习习惯，家长聘请了心理专家进 行干预","某知名企业组建市场调研部，定期监测市场动向，积极培训员工，努力规避潜 在风险","某房地产开发商通过暂缓开发或拖延施工进度等方式，试图化解可能面临的发 展危机"],a:2},{q:"关系具有确定性性质是指对于某一关系 R，如果对于特 定论域中三个对象 a、b、c 而言，当对象 a 与对象 b 之间具有 R 关系。并且对象 a 与对象 c 之间也具有 R 关系时，则 b=c。 根据上述定义，下列关系具有确定性性质的是：",o:["数与数之间的倒数关系","国与国之间的联盟关系","集合与集合之间的包含关系","事物与事物之间的因果关系"],a:0},{q:"总被引频次是指期刊自创刊以来登载的全部论文在统计当 年被引用的总次数。扩散因子是一个用于评估期刊影响力的学术指标，显示总被 引频次扩散的范围，具体意义为期刊当年每被引 100 次所涉及的期刊数，即扩散 因子 。 甲刊：创刊于 1980 年，2022 年总被引频次为 2000，涉及期刊 800 种 乙刊：创刊于 2000 年，2022 年总被引频次为 1500，涉及期刊 500 种 丙刊：创刊于 2020 年，2022 年总被引频次为 200，涉及期刊 60 种 根据定义，在 2022 年，上述三种期刊按照扩散因子由大到小排序正确的是：",o:["丙、甲、乙","丙、乙、甲","乙、丙、甲","甲、乙、丙"],a:3},{q:"逆向选择性监管是指在某些监管领域中，监管者对违规程度较 低的目标群体严加监管，对违规程度更高的监管对象却相对宽松，使得监管强度 与对象违规程度成反比的组织现象。 根据上述定义，下列属于逆向选择性监管的是：",o:["监管部门对证照齐全的大中型校外培训机构严加管控，却对问题突出的个体培 训疏于管控","候车时，守序排队的人上车没有座位，而插队的人却有座位，对此公交车司机 却不加干预","班主任把易犯错误且屡教不改的学生座位调整在前排，以便任课老师监督","在每年的消费者权益保护日晚会上，监管部门都会重点曝光一些违规产品"],a:0},{q:"食品安全风险评估指科学评估食品、食品添加剂及食品相关产 品中的生物性、化学性和物理性危害对人体健康造成不良影响的可能性及其程度， 该评估包括危害识别、危害特征描述、暴露评估、风险特征描述等内容。 根据上述定义，下列不属于食品安全风险评估范围的是：",o:["某地消费者投诉超市售卖的酱油中防腐剂含量超标，要求主管部门进行核查","为了增加啤酒的口感和风味，某啤酒生产厂家在其中添加了果胶","食品包装企业创新性地使用了一种新型材料来生产食品外包装箱","某地因为土壤原因，所种植加工的大米中某重金属元素含量超标"],a:2},{q:"如果把一个造型精致的鸟笼挂在房间最显眼的地方，过不了几 天主人就会做出下面两个选择之一：或者把鸟笼扔掉，或者买只鸟放在鸟笼里， 因为这比无休止地向别人解释“空鸟笼”要轻松得多，这就是鸟笼逻辑。原因很 简单，人们大多受制于惯性思维，认为鸟笼必定用于养鸟。 根据上述定义，下列情形体现了鸟笼逻辑的是：",o:["沿海地区的许多车主都买了涉水险，大刘认为这是明智之举，于是也给自家的 车买了涉水险","莉莉过生日时收到了朋友赠送的华贵礼服一件，为了搭配整体风格，她又买了 价格不菲的高跟鞋和手拿包","小明原本总是成绩排名靠后，新来的老师常夸他勤奋好学，不久后小明的成绩 大幅提升","某人去异国旅游，所见到的都是女人，于是得出该国是女儿国的结论"],a:1},{q:"自然法主张一定的权利因为人类本性中的美德而固然存在，由 自然赋予；成文法是指国家机关依照一定的程序制定和颁布的，表现为条文形式 的法律文件；习惯法是指独立于国家制定法之外，依据某种社会权威和社会组织， 具有一定强制性的行为规范的总和。 根据上述定义，下列属于习惯法的是：",o:["举事以为人者，众助之；举事以自为者，众去之","凡教唆词讼，及为人作词状，增减情罪诬告人者，与犯人同罪","上圣卓然先行敬让博爱之德者，众心说而从之。从之成群，是为君矣；归而往 之，是为王矣","议得我辈同行业者，不与现在行家弟兄亲戚，以及管账之人合伙合业，以防明 充暗顶之渐，违者公罚"],a:3},{q:"在统计学中，生态谬误是指用一种高层次的分析单位做调查， 却用另一种低层次的分析单位做结论，即运用数据时错误地将整组的汇总结果应 用到组内的单位中。 根据以上定义，下列属于生态谬误的是：",o:["一项调研发现甲地居民的收入普遍比乙地居民的收入更高，由此认为甲地教师 的收入高于乙地教师的收入","服务业占比大的区域比服务业占比小的区域更容易吸引高层次人才，由此认为 服务业占比大的区域高层次人才更多","某杂志开设了读者意见反馈邮箱，几天后收到 28 个不喜欢时装栏目的反馈邮 件。某编辑认为有读者不喜欢，就一定有读者喜欢","某公司规定，上一年工资数额在公司前 6%的要降低工资，小王上一年的工资 低于公司的平均水平，可以推出小王今年的工资可能降低"],a:0},{q:"价格歧视是指销售方对具有相同成本的同一种商品或者服务的 不同购买者索取不同的价格，或者对相同的购买者因购买数量不同而索取不同价 格的定价行为。 根据上述定义，下列属于价格歧视的是：",o:["某著名家电销售平台推出买二赠一的活动","某百货商场推出消费满五千元抽奖活动","某服饰卖场推出春节购物六折优惠活动","某商场推出购物满五百元免费观影活动"],a:0},{q:"除法报价策略是一种价格分解术，以商品的数量或使用时间等 概念为除数，以商品价格为被除数，得出一种数字很小的价格，使买主对本来不 低的价格产生一种便宜、低廉的感觉。 根据上述定义，下列不属于除法报价策略的是：",o:["某款笔记本电脑原价 5268 元，若分 12 期付款，每月只需 439 元即可入手","成人游泳班每节课仅需 100 元，10 节课程结束后就可以学会蛙泳和仰泳","某款电动汽车售价 40 万元，高于同类产品，但车主每月可抵扣 200 元充电费 用","一份液化气保险每年保费为 365 元，相当于每天只交 1 元，如遇事故最高获得 1 万元理赔"],a:2},{q:"量表法是运用量表形式测定被调查者对问题的态度的方法。 根据不同用途，量表可分为直接量表和间接量表。直接量表中，调查者设计问题 并询问被调查者，被调查者在有关量表上直接表明其态度；间接量表中，被调查 者按其态度或意愿，在备选问题或语句中选择出合适的语句代表其态度。 根据上述定义，下列属于间接量表的是：",o:["请给以下四部电影打分，要求其分数总和为 100 分： 《电影甲》 《电影乙》 《电影丙》 《电影丁》","请您按照个人喜欢 消费者偏好野生中药材","部分中药材已经实现规模化种植","中药材只能通过种植和野外采集获得"],a:3},{q:"考古人员发现了近 300 枚 16 亿年前的丝状体生物化石，这些 丝状体均由巨型细胞组成，直径 20~194 微米不等。化石中，有些丝状体直径保 持不变，细胞呈短柱状至长柱状；有些丝状体整体向一端均匀收缩，细胞呈柱状、 桶状或杯状；而有的丝状体仅一端变细，形态呈现了一定的复杂性。考古人员据 此认为，这些丝状体很可能属于真核生物。 以下各项如果为真，除哪项外均能支持上述观点？",o:["这些化石中被发现有类似于现生繁殖细胞——孢子一样的圆形结构，这一结构 只出现在真核生物中","原核生物细胞的直径一般小于 2 微米，而真核生物细胞的直径一般在 10~100 微米之间","在目前已知的原核生物中，大多数的丝状体形态都比较简单，只有个别呈现出 过渡期形态","经比对，该化石中丝状体与一些现生绿藻（一种真核生物）的藻丝体形态、细 胞大小分布和繁殖方式等最为接近"],a:2},{q:"金伯利岩是一种稀有的火山岩。从这些岩石上能看出火山曾 猛烈喷发的痕迹，其化学和矿物成分也有别于地球上其他岩浆岩。尤其是有些金 伯利岩包含厘米级大小的稀有矿物晶体，如铁尖晶橄榄石和布氏岩等。因此，人 们推测这一类含有稀有矿物晶体的金伯利岩很可能来自地幔。 以下哪项如果为真，最能支持上述结论？",o:["布氏岩是下地幔的一种主要矿物","铁尖晶橄榄石只能形成于上、下地幔之间的过渡带","有些金伯利岩中的矿物成分在地球表面无法稳定存在","这类金伯利岩和原始地幔中都含有锶和钕这两种元素"],a:1},{q:"PD-1 抑制剂是一种新型肿瘤治疗药物，但由于个 体存在差异，PD-1 抑制剂并不是对每一位肿瘤患者都能有良好的治疗效果。为 了增强难治性黑色素瘤患者对于 PD-1 抑制剂的敏感性，科学家们从 7 名 PD-1 单抗治疗有效果的患者粪便中分离粪便菌群，移植给 15 名 PD-1 单抗治疗没有效 果的患者，结果发现其中 6 名患者的病情得到了缓解，肿瘤得到了更好的控制。 这表明粪菌移植可能有助于治疗恶性肿瘤。 以下哪项如果为真，最能支持上述结论？",o:["早在明代，李时珍所著的《本草纲目》中就记载了粪菌液可用于治疗肠道疾病","病情得到缓解的 6 名患者中，有 4 名患者的治疗效果维持了 1 年及以上，证明 了粪菌移植的疗效远优于其他治疗方法","各国多家医学中心都在开展粪菌移植增强免疫治疗疗效的临床试验，以推动粪 菌移植治疗肿瘤的疗法获得批准","人体肠道中存在数量约为 100 万亿个的庞大细菌群，这些细菌群能产生数千种 代谢物，调节人类宿主的许多功能，如药物代谢等"],a:1},{q:"人体总能量代谢主要由静息代谢水平和活动能量代谢水平决 定。静息代谢指人体在静止状态下消耗的能量，活动能量代谢指人们在日常活动 或运动状态下所消耗的能量。近年来，M 市成年人的总能量代谢水平呈现下降趋 势。有人据此认为，M 市成年人的静息代谢水平近年来也呈下降趋势。 以下哪项如果为真，最能支持上述人士的观点？",o:["近年来，M 市成年人逐渐重视饮食结构均衡，减少各种高能量食物摄入","近年来，M 市成年人开始重视身体锻炼，平均每天的锻炼时长有所增加","近年来，M 市成年人劳动强度普遍降低，许多人不再从事高强度体力劳动","近年来，M 市成年人总能量代谢水平下降幅度比活动能量代谢水平下降幅度小"],a:1},{q:"某项研究显示，与未接触空气污染的人相比，暴露于空气污 染中的人死于乳腺癌的风险增加了 80%，死于其他各类癌症的风险增加了 22%。 该研究团队由此认为，这可能与空气污染物中的 PM2.5 有关，因为 PM2.5 会导致 脏器的炎症和氧化应激反应。 以下哪项如果为真，最可能是上述专家预设的前提？",o:["脏器的炎症和氧化应激反应是明确的致癌危险因素","PM2.5 在大气成分中含量较少，但对空气质量有重要影响","吸食香烟和电子烟等都可以将 PM2.5 直接输送到肺部","女性更易接触烹饪油烟，其中含有大量的 PM2.5"],a:0},{q:"近年来，在人们普遍关注饮料、食品的含糖量时，有 些商家会打出“无蔗糖”的概念误导消费者，但实际情况是“无蔗糖”不等于 “无糖”，且“无糖”也不一定真的不含糖。专家指出，很多时候食用“无蔗糖” 食品也会危害身体健康，增加患病风险。 以下哪项如果为真，最不能支持上述专家观点？",o:["“无蔗糖”食品中多含有果糖、葡萄糖等，摄入较多这些单糖也会生成脂肪， 甚至会导致脂肪肝","张阿姨经常给孩子购买一款声称“无蔗糖”的酸奶，饮用一段时间后发现，孩 子出现了龋齿","相比之下，一直没有食用“无蔗糖”食品的消费者，体检指标异常的比例更低， 甚至有的人“一路绿灯”","食品安全国家标准对于食物中的含糖标准有明确的规定，不少消费者在购买时 缺乏相关知识，被商家蒙蔽"],a:3},{q:"白居易在《荔枝图序》中言道：“若离本枝，一日而色变， 二日而香变，三日而味变，四五日外，色香味尽去矣。”研究表明，荔枝难以保 鲜是因为果实的呼吸强度很高，导致果实品质急剧下降。 以下哪项如果为真，最能支持上述研究结论？",o:["荔枝的可食用部位不是像桃子那样的果皮，而是“假果皮”，它与外皮之间没 有直接的维管束相连，外皮失水时不能直接从果肉处获得补充","荔枝离枝后会继续分解糖分：氧气充足时，糖分会分解为二氧化碳；氧气不足 时，糖分会转化为一些影响风味的醇、醛类物质","荔枝自身会不断产生乙烯，加速果实成熟甚至腐烂，自然更容易变质","荔枝花能产生花蜜，并且它们的蜜腺很发达，是很好的蜜源植物"],a:1},{q:"为了加强企业文化建设，丰富员工业余文娱生活，某 公司计划举办趣味文体竞赛活动，设有跳高、铅球、跳绳和跳远 4 个项目，员工 可以自由选择感兴趣的活动参加。已知： （1）员工在跳高和铅球中至多选择一个； （2）除非选择跳高，否则选择跳绳； （3）销售部王经理没有选择跳绳。 人事部主管了解上述情况后推断，销售部王经理选择了跳远。 要使这一推断成立，可以补充的前提是：",o:["只有未选择铅球的员工才会选择跳远","没有选择跳远的员工都没有选择铅球","如果选择了跳远，那么也会选择铅球","所有没选择铅球的员工都会选择跳远"],a:3},{q:"研究员让流行音乐爱好者听一组流行歌曲，同时用功能磁共 振成像监测他们的大脑活动。在进行扫描前，研究员通过经颅磁刺激间接刺激或 抑制大脑的奖赏回路。结果发现，在听音乐之前刺激奖赏回路会增加被试听音乐 时的愉悦感，而抑制它则会降低愉悦感。因此，研究员认为，大脑的奖赏回路会 影响人们对音乐的喜欢程度。 以下哪项如果为真，最能支持上述结论？",o:["缺乏音乐快感的人听音乐时，其大脑奖赏回路的活动很微弱","人们在享受美食时，也会出现大脑奖赏回路活动性升高","不喜欢流行音乐的人在听流行歌曲时，也会出现大脑奖赏回路的活动","音乐家喜欢的音乐，对“乐盲”而言可能是噪音，因为两者的大脑活动机制不 同"],a:0},{q:"对体外环境的感知是人类生存、交流和进化的基本能力。人 体的味觉系统是信息感知的重要组成部分。有学者认为，苦味的感知是人类长期 进化的一种防御机制，这意味其担负着保护人体免于摄入有毒物质的预警任务。 以下哪项最可能是上述学者论述的前提？",o:["苦味受体能监测味觉分子并将信号传递至大脑","已发现人体的 25 种苦味受体分布于舌头的不同部位","苦味分子与苦味受体结合，激活大脑味觉皮层，产生味觉感知","已有研究表明，自然界的大部分有毒物质是苦的"],a:3},{q:"经常在网上看到这样的新闻，有些司机开车前明明没 有喝酒，但在用酒精检测仪进行吹气测试时却被查出了“酒驾”，如果进行血液 检查或者 10 分钟后再次进行吹气测试则能证实确实没有喝酒，这种情况被称为 “假性酒驾”。对此，有交警提醒大家：开车期间尽量避免吃含糖量较高的水果， 否则容易造成“假性酒驾”。 以下哪项如果为真，最能支持交警的观点？",o:["荔枝含糖量较高，在食用之后立即用酒精检测仪进行吹气测试，检测结果达到 了酒驾标准","蛋黄派等甜度较高的食物属于发酵食品，若发酵时间过长，酵母进行无氧呼吸 就会产生乙醇","水果被摘下后其细胞开始进行无氧呼吸，而糖经过无氧呼吸后会转化为酒精， 食用后造成嘴里有酒精余量","易造成“假性酒驾”的食品中的酒精有可能会通过唾液进入体内，作用于大脑， 影响到安全驾驶"],a:2},{q:"我军军语惯于将数字 1、2、7、9、0 变读为幺、两、拐、勾、 洞，这些数字有个共同特点，即其原本的发音部位与发音方法使得在读这些数字 时无法发出较大声音，在噪声干扰较为强烈的战场上，通信兵使用通讯设备进行 情报交流时，话筒对这些数字的实际增音效果并不明显，可能会影响信息的准确 性。因此，在军语中将这些数字变读，是为了符合实际需要。 以下哪项如果为真，不能支持上述结论？",o:["常规数字念法中 1、7 的韵尾相同，发音相似，在嘈杂的战场环境中容易混淆， 造成信息传达错误","士兵一般都来自不同的兵源地，不可避免地带有家乡口音，将数字变读可以避 免口音问题","在国际无线电通话中，也会对字母读音进行变读，如将 A 读成 Alpha，将 D 读 成 Delta","将 0 读成“洞”时，更容易提高声音，同时也使声音更加干脆清晰，确保信息 的准确性"],a:2},{q:"电商平台个人信息泄露问题日益受到人们的关注。目前，一 些电商平台和物流企业相继推出隐私号码保护功能，收件人下单时的真实手机号 码将被隐藏，商家、物流和消费者之间将通过系统生成的虚拟号码联系，交易完 成一段时间后，该虚拟号便自动失效。有人认为这一功能将大大改善电商平台个 人信息泄露的问题。 以下哪项如果为真，最能质疑上述观点？",o:["事前对提供个人信息授权的范围加以审慎考虑，比事后使用一次性的虚拟信息 来降低影响效果更好","大部分的个人信息泄露并非发生在物流阶段，而是在用户将个人信息填写于网 络平台的那一刻就已经发生","个人信息一旦被收集，传递给其他人，实际上就已经被泄露了，即便事后采取 了惩治手段，也很难再去弥补","后台运营由电商平台掌控，网购消费者无法得知自己有哪些信息、在什么环节 被对方掌握，在权益受到侵犯时举证困难、成本高昂"],a:1},{q:"北方某市有甲、乙两条十字交叉的马路，每年冬季都有成群 的乌鸦聚集于甲路边的树上，但乙路边的树上基本没有乌鸦。有鸟类爱好者发现， 甲路两旁的杨树要比乙路多数倍。据此，该鸟类爱好者断言，乌鸦更喜欢停留在 杨树多的地方过冬。 以下哪项如果为真，最能削弱上述鸟类爱好者的断言？",o:["在夏秋之交，甲、乙两条路旁的树上都会聚集大量的乌鸦","近二十年来该市特别重视道路绿化，为鸟类提供了良好的栖息环境","乙路是南北方向，凛冽的北风长驱直入，而甲路旁边的建筑能有效阻挡北风","该市有一条与甲路平行的路，杨树的数量与乙路差不多，但冬季几乎没有乌鸦"],a:2},{q:"痛风是由嘌呤代谢紊乱引起血尿酸浓度过高，尿酸盐 结晶沉积于关节、软组织、骨骼、软骨和肾脏等处引起的代谢性疾病。检测分析 表明，长期摄入高嘌呤食物，极易导致血尿酸浓度升高，进而形成痛风石。因此， 痛风患者应少吃豆制品。 以下哪项如果为真，最能削弱上述论证？",o:["痛风患者在治疗上除了遵医嘱使用药物外，还应严格执行低嘌呤饮食计划","嘌呤因溶于水的特性，在豆制品制作过程中，大多数已经流失","长期缺乏摄入高蛋白会引发营养失衡，反倒会让嘌呤代谢能力下降，血尿酸升 高","绿豆、蚕豆的嘌呤含量很低，属于低嘌呤食物"],a:1},{q:"飞行信息记录系统，也就是俗称的黑匣子，在空难事故调查 中的重要作用不需赘言，但无论在陆上还是海上的空难事故中，搜寻黑匣子都极 其不易。有人建议，可利用现在飞速发展的互联技术，把黑匣子升级成为“云匣 子”，那么飞机在空中就能够实时与地面进行信息交互，使空难事故的分析变得 更加便捷。 以下哪项如果为真，最能质疑上述建议？",o:["飞机接入互联网，其信号稳定性受到太多外界不可控因素的影响","空难是极小概率事件，投入高昂的数据管理成本不如直接用于提升飞行安全","即使救援人员能够顺利搜寻到黑匣子，想要依靠其揭开事故真相也绝非易事","实时同步每一架飞机的海量数据，对飞行管理并无帮助，更无必要"],a:0},{q:"近年来，露营成为最受欢迎的休闲活动之一。人们带上帐篷 及食物，在城市中寻一山清水秀之处“安营扎寨”体验一段独特的露营时光。然 而，露营活动既有安全隐患，还会产生破坏环境的垃圾。据此，有专家指出，应 当出台政策遏制这类露营活动。 以下哪项如果为真，最能质疑上述专家的观点？",o:["今年与露营有关的产业预计产值将突破 350 亿元，为旅游业注入新能量","许多地方开发出“自驾游+露营”新模式，以满足游客的个性化体验需求","大多数露营者都会邀请三五好友或者以家庭为单位出游，可以互相照应","绝大多数露营爱好者为了安全会选择在城市中管理严格的地方“安营扎寨”"],a:3},{q:"人类每年生活污水的排放量约 2000 亿吨，其中很 大一部分会通过各种途径流进海洋。生活污水里的有害物质会直接危害珊瑚礁， 而且生活污水里含有的大部分物质会让海水富营养化，使得海草疯狂地生长蔓延， 吞噬珊瑚礁的生存空间，从而导致珊瑚礁生态系统崩溃。因此，有人认为，要从 根本上解决珊瑚礁生态系统崩溃的问题，需要完善生活污水的处理方式，避免让 生活污水流入海洋。 以下各项如果为真，最能质疑上述观点的是：",o:["陆地上流失的泥土流入海洋使海洋浑浊遮挡光照也可以导致珊瑚礁生态系统 崩溃","很多沿海居民滥采珊瑚作为商品出售，或者直接开采珊瑚礁作为建筑材料","气候变化使海水水温突然上升或下降是珊瑚礁生态系统崩溃的根本原因","珊瑚多样性丧失会抑制剩余珊瑚生长和生存，从而导致珊瑚礁生态系统大面积 崩溃"],a:2},{q:"某教师收集了本班学生的语文学习兴趣、每天的学习时长等 信息，结合期末考试语文成绩分析后发现，与每天语文学习时长不足 2 小时的学 生相比，学习超过 2 小时的学生学习兴致普遍更高，其语文期末考试平均分也更 高。该教师由此得出结论，增加语文学习时长能够有效培养学习兴趣，进而提高 语文成绩。 下列选项若为真，最能质疑上述结论的是（ ）。",o:["该班级期末考试语文成绩最好的学生每天学习语文 1 小时","该班级的语文期末考试平均分高于其他班级","语文学习兴趣高的学生拥有更好的学习习惯","只有语文学习兴趣高的学生才乐于花更长时间学习语文"],a:3},{q:"牛蛙这一水产品种在过去无人问津，现今却成为人们餐桌上 的美食。打工族在夜晚加班后，吃上一盘“泡椒牛蛙”或“干锅牛蛙”，顿时神 清气爽，干劲十足。但随着牛蛙美食的普及，食品安全问题引发了社会关注。有 报道称：牛蛙体内含有幼虫裂头蚴、广州管圆线虫等能够在人体寄生的寄生虫， 食入带有这些寄生虫的牛蛙，会严重影响人体健康。 以下哪项如果为真，最能削弱上述结论？",o:["经过高温烹饪，牛蛙身上的寄生虫会被全部杀死","淡水虾蟹中含有肺吸虫，人感染肺吸虫会咳血、呼吸困难","实验室对生态养殖的牛蛙进行解剖，未发现任何裂头蚴寄生虫","牛蛙身上还存在只能在牛蛙本体内寄生而不会传染给人类的寄生虫"],a:0},{q:"大约 4.4 亿年前的奥陶纪末生物大灭绝是地球自 寒武纪生物大爆发以来最古老的生物灭绝事件，当时的海洋生物遭遇了灭顶之灾。 有科学家发现，奥陶纪末地层中还存在着巨大灰烬层，并且一些生物化石中含有 大量酸性物质，说明这一时期发生了火山喷发事件，喷发过程中释放的大量温室 气体形成了酸雨，因此科学家推测是火山活动引发的海洋酸化触发并驱动了奥陶 纪末海洋生物大灭绝事件。 以下哪项如果为真，最能削弱上述科学家的推测？",o:["海洋生物通过光合作用和呼吸作用参与碳循环，当海洋生物大规模灭绝后，海 洋中的碳循环过程将会中断","这次大灭绝重创了海洋生态系统，导致 85%的海洋生物灭绝，只有大规模的火 山喷发才能引发如此严重的后果","酸雨不仅会导致海洋酸化，还会使土壤中的有害物质铝等活化，当可溶性铝达 到一定浓度时，陆地植物的生长也会受到危害","奥陶纪的大洋深部并未大范围氧化，随着奥陶纪末的气候变冷，缺氧海水逐渐 扩张并进入浅水环境，对海洋生物造成了致命伤害"],a:3},{q:"冰雪旅游是利用冰雪气候资源体验冰雪文化的旅游活动，包 括冰雪观光演艺、运动竞技等内容。H 地区冰雪旅游开展了五年，调查显示：在 近万名受访者中，有 90%的人曾以不同形式体验过冰雪旅游，平均每年有 65%的 人体验过 1~2 次冰雪旅游，有 25%的人体验过 3~4 次，且这一比例逐年升高。这 说明 H 地区冰雪旅游的需求较高，常态化多次消费正成为 H 地区越来越多人的选 择。 以下哪项如果为真，最能削弱上述结论？",o:["参与调查的受访者几乎都是了解或喜爱冰雪旅游的年轻人","近五年，H 地区冰雪旅游产业的年均投资额接近，没有增加","H 地区位于北半球北部，冬季较长，许多游客会来此体验冰雪旅游","为扩大宣传，H 地区许多冰雪项目会推出优惠组合套餐，吸引人们多次消费"],a:0},{q:"研究人员利用 1992 至 2020 年的卫星观测数据，结合气候数 据和水文模型，研究了全球 1051 个大型湖泊和 921 个水库，结果显示，整体而 言，全球湖泊水库蓄水量普遍下降，年均净减少约 220 亿吨，水体体积累计减少 了 603 立方千米。研究人员认为，气候是导致全球湖泊水库蓄水量减少的原因， 但也有观点认为，全球湖泊水库蓄水量下降并不是气候变化导致的，上游沉积物 淤积才是根本原因。 哪个选项能削弱第二种观点？",o:["人类活动引起的温室气体排放是导致气候变化的最主要原因，温室气体阻止地 球表面热量散发使得地球变得更温暖","全球湖泊水库蓄水量减少导致了人类可利用的水资源减少，致使粮食危机加剧， 而粮食危机反过来又加剧对蓄水池的争夺","随着全球变暖，野火规模变得越来越大，它们烧毁树林，破坏土壤稳定，导致 流入湖泊水库的沉积物增加","气候变化导致全球最炎热的地区气温更高，高温使得这些地区湖泊水库水分蒸 发得更快，更为缺水"],a:2},{q:"在一些相关法律与政策中，规定公共图书馆必须 向公众免费开放，而学校图书馆则没有这个义务，因此学校图书馆对外开放的责 任一直存在争议。有人认为，学校图书馆场地有限，对外开放会使学校师生的体 验变差，并且学生缴纳了学费，负担了图书馆的运行费用，因此高校的图书馆应 该把师生利益放在第一位，没有必要对公众开放。 以下哪项如果为真，最不能削弱上述观点？",o:["借阅本身是一个具有筛选性的需求，即便对外开放也不会需求暴涨，并且公众 对图书馆的需求主要是借阅，不会对场地造成太大的压力","大学、研究机构的图书馆独占很多稀缺资料，比公共图书馆更专业，仅供内部 使用会造成浪费，对公众开放才能发挥更大的价值","大学的运行费用绝非学费能够覆盖的，高校、科研机构都是由国家拨款支持， 高校图书馆也包含其中，而国家拨款源于每个公民缴税","高校可以尝试差异化定价策略，针对在校师生图书馆可免费提供借阅服务，而 针对校外人员则可在法律规定内适当收取服务费用"],a:3},{q:"研究发现，养猫和精神疾病风险上升有关。养猫的人患精神 疾病的风险比没接触猫的高 2.35 倍，这是由于养猫的人群感染了弓形虫，这是 一种以猫科动物为最终宿主的寄生虫，当它通过猫的排泄物感染其他中间宿主 （比如人）后会传入后者的中枢神经，影响相关行为。因此，养猫会增加患精神 疾病的风险。 以下哪个选项最能削弱上述观点？",o:["戴手套清理猫砂并及时洗手可减少感染弓形虫的可能性","患精神疾病的养猫人，家族普遍具有精神病史","精神疾病患者弓形虫感染的血清阳性较低","不养猫的人也可能通过直接接触等方式感染弓形虫"],a:1},{q:"近年来，极端野火事件不断打破历史纪录，引发 全球关注。这些野火夺去了许多人的生命、财产和野生动物的栖息地。澳大利亚 某大学的研究团队发现，极端野火正变得越来越频繁，在过去 20 年中，极端野 火发生的频率和强度都增加了约一倍。部分研究人员认为，这是近年来的气候变 化加剧导致的。但也有研究人员持反对意见，他们认为极端野火发生的频率和强 度增加是干旱度上升导致的。 以下哪项如果为真，最能削弱反对者的观点？",o:["气候变化加剧导致全球多地发生暴雨洪水","越是高温干燥的地区越容易出现极端野火","近年来气候的急剧变化导致了干旱度上升","控制温室气体的排放有利于减缓气候变化"],a:2},{q:"普通食盐主要成分为氯化钠，过量摄入钠盐容易引发高血压 和心脑血管疾病。近百年来，心脏病患者被告知要减少钠盐的摄入量，但最近一 项研究表明，减少钠盐摄入量并没有减少心力衰竭患者的急诊、住院或死亡风险。 据此，有人认为心脏病患者无需减少钠盐摄入量。 以下哪项如果为真，最不能质疑上述观点？",o:["长期过量摄入钠盐会增加心脏病人中风的风险","心脏病人减少钠盐的摄入量后可能会导致低钠血症","长期过量摄入钠盐会加重心脏病人的肝脏和肾脏负担","低钠盐饮食能够改善心脏病患者的肿胀、疲劳等症状"],a:1},{q:"某公司决定从甲、乙、丙、丁、戊、己 6 个景点中选择其中 3 个作为团建地点，且有以下要求：如果选甲，就不能选择乙；除非选丙，否则不 能选甲；只要选丁，就一定要选戊。据此，有以下四个推论： ①如果选甲，一定会选己； ②这三个景点可能选乙、丁、戊，也可能选甲、丙、己； ③如果没选丁，那一定也没选戊； ④如果没选甲，可能会选丙。 上述推论正确的有几项?",o:["1 项","2 项","3 项","4 项"],a:1},{q:"小周、小吴、小郑、小王每个人都只喜欢 4 种不同的 运动（足球、篮球、乒乓球、羽毛球）中的 2 种，且每种运动都只有 2 个人喜欢。 已知： ①小王不喜欢足球； ②如果小吴不喜欢乒乓球，那么小王喜欢乒乓球； ③小周不喜欢足球和篮球； ④小郑和小周喜欢的运动中有且仅有 1 种相同。 由此可以推出：",o:["小王不喜欢乒乓球","小吴喜欢篮球","小郑不喜欢足球","小周和小王喜欢的运动完全不同"],a:1},{q:"某单位所有正式编制员工都参加了周末举办的团建活动，该 单位后勤部门所有员工都不是正式编制员工，综合部门有的员工没有参加周末举 办的团建活动。 由此可以推出该单位：",o:["综合部门有的员工不是正式编制员工","有的正式编制员工不是综合部门的员工","后勤部门有的员工没有参加周末举办的团建活动","后勤部门所有员工都参加了周末举办的团建活动"],a:0},{q:"甲、乙、丙、丁、戊、己、庚 7 人报名参加象棋比赛，对于 比赛结果，大家预测如下： （1）戊、己、庚至少有 2 人获奖； （2）如果甲、丙、戊至少有 1 人获奖，则丁、己均不获奖； （3）如果乙、戊、己至少有 1 人获奖，则丁获奖而丙不获奖。 比赛结束后，发现上述预测完全正确。 根据上述信息，一定获奖的是：",o:["甲","乙","丙","丁"],a:3},{q:"功夫只有下在平时，关键时刻才能从容。小明高考时 手足无措，说明他平时没有下功夫。 以下选项存在与题干最为相似的逻辑错误的是（ ）。",o:["每个生活在数字时代的人都会不可避免地被“数字化”。老王还没有被“数字 化”，说明老王还活在过去","科普服务只有下沉基层，才能落地有声。某地级市的科普服务没有下沉到基层， 说明当地的科普服务“落地无声”","C 市建造了水利工程后，在防洪减灾方面取得了重大突破。Z 市没有建设水利 工程，因此 Z 市不能在防洪减灾上取得突破","科学是无国界的，只有合作对话才能推动科技进步。M 国与 D 国科技停滞不前， 因此他们没有进行合作对话"],a:3},{q:"国内市场只有形成完备的市场体系与商业规则环境，才能为 企业参与出口竞争提供真正的市场根基，要形成完备的市场体系，必须深化要素 市场化配置体制机制改革，只有促进要素自主有序流动，且提高要素配置效率， 才能深化要素市场化配置体制机制改革，要形成完备的商业规则环境，必须推进 全方位开放并建立全国统一大市场，且加强执法效率和市场司法保障。 根据以上陈述，可以推出下列哪项？",o:["只要深化要素市场化配置体制机制改革就能形成完备的市场体系","如果加强执法效率和司法保障，就能推进全方位开放并建立全国统一大市场","只有促进要素自主有序流动，且提高要素配置效率，才能使国内市场形成完备 的商业规则环境","除非推进全方位开放并建立全国统一大市场，且加强执法效率和司法保障，否 则不能为企业参与进出口竞争提供真正的市场根基"],a:3},{q:"某中学高三文科班要进行期中考试，需要安排六门 学科的考试顺序：语文、数学、英语、历史、地理和政治，用甲、乙、丙、丁、 戊、己代表这六门学科，已知：己比甲早，丙最早，历史比英语早，地理最晚， 政治比丁晚，数学比甲早。 以下哪项可能是这六门学科的考试安排？",o:["甲是英语、乙是政治、丙是语文、丁是数学、戊是地理、己是历史","甲是语文、乙是数学、丙是英语、丁是历史、戊是政治、己是地理","甲是历史、乙是数学、丙是政治、丁是地理、戊是英语、己是语文","甲是语文、乙是历史、丙是英语、丁是数学、戊是地理、己是政治"],a:0},{q:"某市准备从",o:["B、C、D、E、F 六家公司中评选出 几家优秀服务企业。评选需考虑以下情况： （1）要么 C 公司被选上，要么 D 公司被选上； （2）只有 B 公司被选上，F 公司才能被选上； （3）如果 E 公司没有被选上，则 D 公司也没有被选上； （4）如果 C 公司被选上，则 A 公司和 B 公司都没有被选上。 如果 F 公司被选上，则可以推出下列哪项？","共有三家公司被选上","无法确定 C 公司有没有被选上","A 公司可能被选上"],a:2},{q:"某环境部门对甲、乙、丙、丁、戊五个地区进行了水质采样 和评测，在评测结果出来之前，该部门的五位同志做出了如下预测： 小宋：甲地区是Ⅱ类水质，乙地区是Ⅲ类水质： 小韩：丙地区是Ⅳ类水质，丁地区是Ⅱ类水质； 小刘：丙地区是Ⅰ类水质，戊地区是Ⅴ类水质； 小禾：戊地区是Ⅳ类水质，丁地区是Ⅲ类水质； 小赵：乙地区是Ⅱ类水质，甲地区是Ⅴ类水质。 结果出来，五位同志都只猜对了一半。由此可以推出：",o:["丁地区Ⅰ类水质，乙地区Ⅱ类水质，丙地区Ⅲ类水质，甲地区Ⅳ类水质，戊地 区Ⅴ类水质","乙地区Ⅰ类水质，戊地区Ⅱ类水质，丙地区Ⅲ类水质，丁地区Ⅳ类水质，甲地 区Ⅴ类水质","丙地区Ⅰ类水质，丁地区Ⅱ类水质，乙地区Ⅲ类水质，戊地区Ⅳ类水质，甲地 区Ⅴ类水质","甲地区Ⅰ类水质，丁地区Ⅱ类水质，乙地区Ⅲ类水质，丙地区Ⅳ类水质，戊地 区Ⅴ类水质"],a:2},{q:"某单位邀请 7 位评标专家甲、乙、丙、丁、戊、己、庚参加 评标工作，7 位评标专家随机被分成两组，其中第一组 3 人，第二组 4 人，但分 组须符合以下要求： ①甲和丙不能在同一个小组 ②如果乙在第一组，那么丁必须在第一组 ③如果戊在第一组，那么丙必须在第二组 ④己必须在第二组 如果丙、戊在同一组，那么不可能在同一组的是：",o:["甲和乙","甲和丁","乙和庚","丙和庚"],a:2},{q:"甲、乙、丙 3 人同时申请某个课题项目。评审专家组进行评 审后，最终通过了其中 1 人的申请。专家们最初的预测如下： ①专家一：甲的申请没有通过。 ②专家二：乙的申请通过了。 ③专家三：丙的申请没有通过。 如果只有 1 名专家预测正确，则下列推论必然错误的是（ ）。",o:["专家一预测正确","专家三预测正确","甲的申请通过了","乙的申请通过了"],a:3},{q:"心脏是被神经系统控制的，调控心脏的神经是交感神经和迷 走神经。安静状态下，迷走神经对心脏的调控比较强，心跳每分钟 75 次左右； 运动或情绪激动的时候，交感神经对心脏的调控比较强，心跳会加快，收缩力也 会加强。在血管壁、胃肠道、生殖系统等处都分布着各种内脏平滑肌，平滑肌运 动同样受到神经支配。比如，胃肠道平滑肌接受交感神经和迷走神经的双重支配。 交感神经兴奋使胃肠道运动减弱，而迷走神经兴奋则使胃肠道运动加强。 由此可以推出：",o:["交感神经或迷走神经对心脏和胃肠的调控不同则产生不同的效应","调控内脏器官的神经是交感神经和迷走神经，它们不受意识支配","要保护我们的内脏器官，必须合理地使用大脑，维持良好的情绪","冠心病、胃溃疡之类的疾病也与神经系统的“功能失常”有关系"],a:0},{q:"某小区物业平均每月接到 3 起高空抛物的投诉，为 了解决这个问题，物业安装了拍摄高空抛物的摄像头，但是在安装完摄像头后， 物业发现高空抛物事件的数量更多了。 以下各项如果为真，最不能解释上述现象的是：",o:["安装的摄像头数量很多，能够覆盖到小区的每一个角落","小区的很多居民并没有意识到高空抛物可能带来的危害","之前高空抛物事件就很多且抛物速度很快，人眼不易发现","安装的摄像头具有夜视功能，能够拍到原来不易发现的夜间高空抛物行为"],a:1},{q:"某酒店张贴这样的标语：严禁携带易燃品、易爆品、危险品 入住。 以下哪项陈述中所包含的逻辑错误与题干中的最相似？",o:["许多农户养了鸡、鸭、家禽，大大增加了收入","罗先生收藏了许多古代的工笔画、写意画、山水画","花园里开着五颜六色的红花、黄花、粉花，甚为美丽","小红在文具店里购买了铅笔、橡皮、小刀等学习用品"],a:0},{q:"为响应党中央坚决打赢脱贫攻坚战的号召，某市人力 资源和社会保障局拟派遣周、王、李、张四人中的一人参加对口扶贫工作，现已 知： （1）如果张没参加，那么周参加了； （2）周参加了，但王没参加； （3）只有李参加了，周才参加； （4）除非王参加了，否则周不会参加。 若上述条件只有一句为假，则可以推出参加对口扶贫工作的人是：",o:["周","王","李","张"],a:3},{q:"近 7 年来，国内休闲零食市场每年的复合增长率均维持在 11% 以上。相比之下，以电商为主要渠道的休闲食品公司更容易将销售收入规模做大， 但其在净利润方面并不占优势。去年营收排名第一、二位的两家以电商为主要渠 道的零食企业，其净利润仅排名第五与第九。 以下最能解释上述现象的是：",o:["一般情况下，休闲食品线下销售的稳定净利率大于线上销售的净利率","从消费者的需求和购买习惯看，休闲零食 80%的销售契机还是在线下","去年多家零食企业均宣布涨价，原因在于原材料、能源等成本的上升","社区团购、直播等新兴渠道崛起，多家零食龙头企业市占率受到冲击"],a:0},{q:"遍布各地的塑料垃圾正在对人类和其他生物造成健康威胁， 塑料颗粒越小，表面积越大，其发生化学反应的可能性就越大，其危害性就越大。 在自然状态下，塑料颗粒从微米大小分解到纳米大小要百年时间。最新一项研究 发现，海洋中的轮虫可以加速这一进程，轮虫吞入塑料，最终排出更小的塑料颗 粒。经调查发现，海洋中的轮虫极可能制作了大量的纳米颗粒。 由此可以推出：",o:["纳米塑料污染是一种不可能治理的污染","轮虫是纳米塑料污染的重要因素","轮虫是纳米塑料颗粒污染的罪魁祸首","纳米塑料污染程度已远超我们的认知"],a:1},{q:"十一假期后，张磊、王虹、李林、孙静四个朋友一起 聚会，关于十一假期期间有没有去旅游，有以下几种说法： （1）张磊：李林一定去旅游了； （2）王虹：如果张磊去旅游了，那么李林也一定去了； （3）李林：我们四人中有人去旅游了； （4）孙静：我们四个人都没去旅游。 如果上述说法两真两假，那么以下哪项一定为真？",o:["李林去旅游了","孙静去旅游了","王虹没去旅游","张磊没去旅游"],a:3},{q:"一项研究发现，成年小白鼠去除一个关键生物钟基因后，昼 夜节律完全消失，虽然生活质量有所下降，但寿命并未受到显著影响，心血管健 康状况甚至有所改善。据此，研究人员推断昼夜节律缺失对健康的危害可能没有 我们想象得那么大。 回答以下哪个问题最有助于评价上述研究人员所做出的推断？",o:["成年小白鼠去除生物钟基因后出现的心血管情况改善是否会延长小白鼠的寿 命","成年小白鼠去除生物钟基因之后的休息时间是否与未去除之前的休息时间相 同","成年小白鼠去除生物钟基因后的寿命和心血管健康状况能否代表整体健康状 况","成年小白鼠去除生物钟基因之后的生活质量是否会影响小白鼠的整体健康状 况"],a:2},{q:"甲县森林覆盖率达 71.83%，拥有 20.14 万亩林地。近 年来，依托当地丰富的林地资源，该县大力推广林下菌类种植，实现了经济跨越 式发展。乙县为发展经济也开始进行菌类种植，其与科技结合的大棚种植菌类的 产量略高于甲县林下种植的产量，但最后发现综合产值远不及甲县。 下列选项如果为真，最能解释这一现象的是（ ）。",o:["甲县种植的林下作物种类较多，不仅种植了樟芝、茶树菇等林下食用菌，还套 种了岗梅、黄精等林下中药材","开展林下经济的县区较多，有的林下种植区环境好，便于通风，其产量能比传 统大棚种植高 20%左右","林下种植的菌类是在山里仿野生种植生产出的有机产品，因受消费者青睐价格 能达到大 推广的新鲜经验"],a:1},{q:"习近平新时代中国特色社会主义思想是当代中国马克思主义，二十一 世纪马克思主义是中华文化和中国精神的时代精华，实现了马克思主义中国化时代化新的飞 跃。下列有关表述正确的有几项？ ①习近平新时代中国特色社会主义思想，体现了以习近平同志为核心的党中央对共产党 执政规律、社会主义建设规律、人类社会发展规律认识的深化、拓展、升华 ②党的二十大提出的六个必须坚持概括阐述了习近平新时代中国特色社会主义思想的 世界观、方法论和贯穿其中的立场观点方法 ③“两个确立”是指“确立习近平同志党中央的核心、全党的核心地位，确立习近平新 时代中国特色社会主义思想的指导地位” ④坚持和发展中国特色社会主义，总任务是实现社会主义现代化和中华民族伟大复兴",o:["1","2","3","4"],a:3},{q:"2024 年 9 月 9 日至 10 日，全国教育大会在北京召开。中共中央总书 记、国家主席、中央军委主席习近平在大会上强调，要紧紧围绕立德树人根本任务，朝着建 成教育强国战略目标扎实迈进。下列关于中国特色社会主义教育强国的表述正确的有几项? ①《中国教育现代化 2035》提出“到 2035 年，总体实现教育现代化，迈入教育强国行 列”的奋斗目标 ②要统筹实施科教兴国战略、人才强国战略、创新驱动发展战略，一体推进教育发展、 科技创新、人才培养 ③要优化区域教育资源配置，推动义务教育优质均衡发展，逐步缩小城乡、区域、校际、 群体差距 ④要统筹职业教育、高等教育、继续教育协同创新，推进职普融通、产教融合、科教融 汇，优化职业教育类型定位 ⑤要提高教师政治地位、社会地位、职业地位，让教师享有崇高社会声望、成为最受社 会尊重的职业之一",o:["2","3","4","5"],a:3},{q:"低空经济正以惊人的速度蓬勃发展。关于低空经济，下列说法错误的 是（ ）。",o:["低空经济的空域范围不超过 2000 米","无人机、直升机均为低空领域的代表性产品","低空经济具有创新引领、绿色低碳、数实融合的特征","低空经济是战略性新兴产业的代表之一"],a:0},{q:"完善实施区域协调发展战略机制，要健全推动西部大开发形成新格局、 中部地区加快崛起。下列与之相关的举措，表述错误的是：",o:["中西部地区要有序承接产业梯度转移，优化产业布局","加强现代化交通基础设施体系建设，强化中部地区的大通道格局","中部地区超前布局建设未来产业，加快构建以新兴产业为支撑的现代化产业体系","把发展特色优势产业作为主攻方向，因地制宜发展新兴产业，加快西部地区产业转型 升级"],a:2},{q:"习近平总书记指出，人口发展是关系中华民族伟大复兴的大事，必须 着力提高人口整体素质，以人口高质量发展支撑中国式现代化。关于习近平总书记对人口高 质量发展的重要指示，下列理解正确的有几项？ ①人口减少也有一些正面效应，比如倒逼经济发展从内涵式发展向外延式扩张转向 ②更加重视“引导”和“激励”的办法，主要依靠政府力量推动人口高质量发展 ③推动人口工作由调节数量为主向提升素质、稳定总量、优化结构、畅通流动转变 ④以消费结构升级引领产业转型升级，基础设施布局要考虑人口达峰和分布变化的影响 ⑤加快发展多层次、多支柱养老保险体系，强化第二、第三支柱养老保险",o:["1 项","2 项","3 项","4 项"],a:2},{q:"2024 年是习近平总书记提出“节水优先、空间均衡、系统治理、两手 发力”治水思路十周年。关于治水，下列说法正确的有几项？ ①推进中国式现代化，要把水资源问题考虑进去，以水定城、以水定地、以水定人、以 水定产，发展节水产业 ②坚决抑制不合理用水需求，大力发展节水产业和技术，大力推进农业节水，实施全社 会节水行动，推动用水方式由粗放向节约集约转变 ③要坚持山水林田湖草沙一体化保护和系统治理，构建从山顶到海洋的保护治理大格局， 集中采用人工修复手段，持之以恒推进生态建设 ④要创新水权、排污权等交易措施，用好财税杠杆，发挥价格机制作用，倒逼提升节水 效果",o:["1 项","2 项","3 项","4 项"],a:2},{q:"民生是人民幸福之基、社会和谐之本。让老百姓过上好日子是我们一 切工作的出发点和落脚点。下列有关说法不正确的是：",o:["保障和改善民生既要尽力而为，又要量力而行","就业是最基本的民生，要促进高质量充分就业，不断增强广大劳动者的获得感幸福感 安全感","我国已建成世界上规模最大的社会保障体系，截至 2023 年底，基本医疗保险覆盖 10 亿人，基本养老保险覆盖 14 亿人","党的二十届三中全会通过的《中共中央关于进一步全面深化改革、推进中国式现代化 的决定》提出“七个聚焦”，其中一个重要方面就是“聚焦
