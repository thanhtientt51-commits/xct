<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>行测刷题 · AI错题解析</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--sub:#86868b;--accent:#5865f2;--accent2:#8b5cf6;--border:rgba(0,0,0,.06);--radius:16px;--green:#16a34a;--red:#dc2626}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
.nav{position:sticky;top:0;z-index:100;background:rgba(245,245,247,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px}
.nav-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px}
.nav-badge{font-size:.68em;padding:5px 12px;border-radius:20px;background:#fff;border:1px solid var(--border);color:var(--sub)}
.main{max-width:1300px;margin:0 auto;padding:20px 24px 40px;display:grid;grid-template-columns:300px 1fr;gap:20px}
.side-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:18px;margin-bottom:12px}
.side-card h3{font-size:.75em;font-weight:700;letter-spacing:1px;color:var(--sub);margin-bottom:12px}
.cat-item{padding:10px 14px;border-radius:10px;font-size:.82em;font-weight:600;cursor:pointer;transition:.2s;border:1px solid transparent;margin-bottom:4px}
.cat-item:hover{background:#f0f4ff}.cat-item.active{background:#f0f4ff;color:var(--accent);border-color:var(--accent)}
.main-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:28px}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.q-type-badge{padding:3px 10px;border-radius:8px;font-size:.68em;font-weight:600;background:#f0f4ff;color:var(--accent)}
.q-text{font-size:1.05em;line-height:1.8;margin-bottom:24px;font-weight:500}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.opt{padding:14px 18px;border:2px solid var(--border);border-radius:12px;font-size:.9em;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:10px}
.opt:hover{border-color:var(--accent)}.opt.selected{border-color:var(--accent);background:#f0f4ff}
.opt.correct{border-color:var(--green);background:#f0fdf4}.opt.wrong{border-color:var(--red);background:#fef2f2}
.opt .letter{width:28px;height:28px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85em;flex-shrink:0}
.opt.selected .letter{background:var(--accent);color:#fff}.opt.correct .letter{background:var(--green);color:#fff}.opt.wrong .letter{background:var(--red);color:#fff}
.btn{padding:10px 22px;border-radius:22px;font-size:.84em;font-weight:700;cursor:pointer;border:0;display:inline-flex;align-items:center;gap:6px;transition:.25s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(88,101,242,.25)}
.btn-primary:hover{transform:translateY(-1px)}.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--sub)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.explain-box{background:#fafafa;border-radius:12px;border:1px solid var(--border);padding:20px;max-height:420px;overflow-y:auto;font-size:.82em;line-height:1.8;margin-top:20px}
.explain-box::-webkit-scrollbar{display:none}.explain-box{-ms-overflow-style:none;scrollbar-width:none}
.explain-box h4{font-size:.9em;margin-bottom:8px}
.footer{text-align:center;padding:30px;color:#b0b0b8;font-size:.65em;border-top:1px solid var(--border)}
@media(max-width:900px){.main{grid-template-columns:1fr}}
</style></head><body>
<nav class="nav"><div class="nav-inner"><div style="font-size:.9em;font-weight:700">📝 行测刷题 · AI错题解析</div><div class="nav-badge">花生十三 + DeepSeek 双解析</div></div></nav>
<div class="main">
<div>
  <div class="side-card"><h3>五大模块</h3>
    <div class="cat-item active">判断推理</div><div class="cat-item">言语理解</div><div class="cat-item">数量关系</div><div class="cat-item">资料分析</div><div class="cat-item">常识判断</div>
  </div>
  <div class="side-card">
    <div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin-bottom:0">错题本</h3><button class="btn btn-ghost" style="font-size:.68em;padding:4px 10px">📥 导出Word</button></div>
  </div>
</div>
<div>
  <div class="main-card">
    <div class="q-header"><span class="q-type-badge">判断推理</span><button class="btn btn-ghost" style="font-size:.72em;padding:4px 12px">下一题 →</button></div>
    <div class="q-text">甲乙丙三人中只有一人会游泳。甲说：我会。乙说：我不会。丙说：甲不会。只有一人说真话，谁会游泳？</div>
    <div class="options">
      <div class="opt selected"><span class="letter">A</span>甲</div><div class="opt"><span class="letter">B</span>乙</div><div class="opt"><span class="letter">C</span>丙</div><div class="opt"><span class="letter">D</span>无法确定</div>
    </div>
    <div class="btn-row"><button class="btn btn-primary">提交答案</button><button class="btn btn-ghost">换一题</button></div>
    <div class="explain-box">
      <div style="text-align:center;color:var(--sub);padding:50px 20px;font-size:.85em">提交答案后，AI解析将显示在这里</div>
    </div>
  </div>
</div>
</div>
<footer class="footer">AI解析由DeepSeek驱动 · 花生十三解题方法论 · 仅供练习参考</footer>
</body></html>
